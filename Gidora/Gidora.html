            takeDamage(amount, sourcePos, knockbackForce) {
                if (this.isDead) return;
                this.hp -= amount;
                this.damageFlashTimer = 0.2;

                // Knockback Logic (like enemies)
                if (sourcePos && this.mesh.position) {
                    const dir = this.mesh.position.clone().sub(sourcePos).normalize();
                    dir.y = 0; // Only horizontal knockback
                    const force = (knockbackForce !== undefined) ? knockbackForce : amount * 0.2;
                    this.knockbackVel.add(dir.multiplyScalar(force));
                }

                if (this.hp <= 0) {
                    this.die();
                }
            }

            die() {
                this.isDead = true;
                // Game Over Logic
                alert("GAME OVER");
                location.reload();
            }

            checkCollisions(bullets) {
                if (this.isDead) return;

                // Fix: Collision check against Body Center, not feet (Y=0)
                const pPos = this.mesh.position.clone();
                pPos.y += 1.2; // Approximate Center of Mass (Body Height)

                // Adjust for Mode-Specific Body Offset & Size
                let hitRadius = 1.5;
                if (state.mode === 'duo') {
                    pPos.z += 0; // The mesh is rotated, so we can't just add Z locally unless we apply rotation?
                    // Wait, this.mesh is the Player Group. It rotates. 
                    // this.body is a child. 
                    // If this.body.position.z is 0.8, that's in Local Space.
                    // We need World Space position of the body center.
                    const bodyWorldPos = new THREE.Vector3();
                    this.body.getWorldPosition(bodyWorldPos);
                    pPos.copy(bodyWorldPos); // Use actual body position!

                    hitRadius = 1.1; // Smaller radius for Duo
                } else {
                    // Quad Mode - Body is centered at 0 local (mostly), but lets use world pos to be safe
                    // actually just use pPos as base is fine, but body might be slightly off? 
                    // Quad body z=0. So pPos (with y adjustment) is correct if rotation is ignored.
                    // But using getWorldPosition is always safer if body moves!
                    if (this.body) {
                        const bodyWorldPos = new THREE.Vector3();
                        this.body.getWorldPosition(bodyWorldPos);
                        pPos.copy(bodyWorldPos);
                    }
                }

                bullets.forEach(b => {
                    if (b.markedForDeletion || !b.isEnemy) return; // Only Enemy bullets hurt player

                    if (b.mesh.position.distanceTo(pPos) < hitRadius) {
                        b.markedForDeletion = true;
                        this.takeDamage(b.damage || 10, b.mesh.position, b.knockback);
                    }
                });
            }

            buildModel() {
                // Materials
                // We create unique material instances per part-type but shared per player?
                // Actually, if we want to Flash specific parts independently (e.g. P1 head flashes, but P1 neck doesn't?), 
                // we should probably NOT share materials if we are changing the material property directly.
                // However, the current logic updates the material color. 
                // If P1 Head and P1 Neck share 'p1Mat', changing p1Mat.color changes BOTH.
                // This is desired ("Neck and Head should correspond to player color").
                const bodyMat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.body }); // Green
                const p1Mat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.p1 }); // Red
                const p2Mat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.p2 }); // Blue
                const p3Mat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.p3 }); // Pink
                const p4Mat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.p4 }); // Cyan

                // 1. Main Body (Oval) - Different scales for Duo vs Quad
                const bodyGeo = new THREE.SphereGeometry(1.5, 16, 16);
                // Will be scaled via mesh.scale in updateVisibility based on mode
                this.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.body.position.y = 1.2;
                this.body.castShadow = true;
                this.mesh.add(this.body);

                // Legs (4) - [Refined] - Back legs hidden in Duo mode
                this.legs = [];
                const legConfigs = [
                    { id: 'fl', x: -0.9, z: 0.8, mat: bodyMat, isFront: true },
                    { id: 'fr', x: 0.9, z: 0.8, mat: bodyMat, isFront: true },
                    { id: 'bl', x: -0.9, z: -0.8, mat: bodyMat, isFront: false },
                    { id: 'br', x: 0.9, z: -0.8, mat: bodyMat, isFront: false }
                ];
                legConfigs.forEach(cfg => {
                    const legGroup = new THREE.Group();
                    legGroup.position.set(cfg.x, 0.8, cfg.z);

                    // Thicker legs
                    const legGeo = new THREE.CylinderGeometry(0.35, 0.25, 1.0, 8);
                    const leg = new THREE.Mesh(legGeo, cfg.mat);
                    leg.position.y = -0.5; // Pivot at top
                    leg.castShadow = true;

                    legGroup.add(leg);
                    this.mesh.add(legGroup);
                    this.legs.push({ group: legGroup, id: cfg.id, isFront: cfg.isFront });
                });

                // 2. Necks & Heads Structure
                this.necks = [];

                // P1 (Left), P2 (Right), P3 (Center)
                const neckConfigs = [
                    { id: 'p1', angle: 0.5, mat: p1Mat, x: -0.7, z: 1.1 },
                    { id: 'p2', angle: -0.5, mat: p2Mat, x: 0.7, z: 1.1 },
                    { id: 'p3', angle: 0, mat: p3Mat, x: 0, z: 1.0 }
                ];

                neckConfigs.forEach(cfg => {
                    const neckGroup = new THREE.Group();
                    neckGroup.position.set(cfg.x, 1.5, cfg.z);
                    neckGroup.rotation.y = cfg.angle; // Face outward slightly

                    // Neck: Simple Cylinder
                    const neckLen = 2.2;
                    const leanAngle = -0.3; // Less steep lean for stability look

                    const neckGeo = new THREE.CylinderGeometry(0.3, 0.45, neckLen, 8);
                    const neckMesh = new THREE.Mesh(neckGeo, cfg.mat);
                    // Cylinder center at (0,0,0). We want base at (0,0,0) of group.
                    // So Center at y = neckLen/2.
                    // But we rotate it by leanAngle around X.
                    // To make base pivot correctly, we move it up THEN rotate? 
                    // No, rotate then move? 
                    // Easiest: Pivot Group.
                    // But we used neckGroup for Y-rotation (facing).
                    // Let's add an inner pivot for the lean.

                    const pivotGroup = new THREE.Group();
                    pivotGroup.rotation.x = leanAngle;

                    neckMesh.position.y = neckLen / 2;
                    pivotGroup.add(neckMesh);

                    neckGroup.add(pivotGroup);

                    // Head
                    // Attach Head to PivotGroup so it moves with neck lean
                    // Position at Top of Neck Cylinder
                    const headGeo = new THREE.BoxGeometry(0.65, 0.65, 0.85);
                    const headMesh = new THREE.Mesh(headGeo, cfg.mat);

                    headMesh.position.y = neckLen; // Top of cylinder
                    headMesh.position.z = 0.2; // Slight forward offset visually
                    headMesh.rotation.x = 0.3; // Counter-rotate slightly to look forward?

                    headMesh.castShadow = true;

                    // Eyes
                    const eyeGeo = new THREE.SphereGeometry(0.12, 8, 8);
                    const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.22, 0.1, 0.35); headMesh.add(eyeL);
                    const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.22, 0.1, 0.35); headMesh.add(eyeR);

                    pivotGroup.add(headMesh);

                    this.mesh.add(neckGroup);

                    // Store ref for animation
                    // We animate 'pivotGroup.rotation.x' for smash
                    this.necks.push({ group: neckGroup, pivot: pivotGroup, head: headMesh, id: cfg.id, baseLean: leanAngle });

                    if (cfg.id === 'p1') { this.p1Part = neckGroup; this.p1HeadPart = headMesh; }
                    if (cfg.id === 'p2') { this.p2Part = neckGroup; this.p2HeadPart = headMesh; }
                    if (cfg.id === 'p3') { this.p3Part = neckGroup; this.p3HeadPart = headMesh; }
                });

                // 3. Tail (P4)
                this.tailGroup = new THREE.Group();
                this.tailGroup.position.set(0, 1.2, -1.2);

                // Tail Base
                const tailGeo = new THREE.ConeGeometry(0.6, 2.5, 8);
                tailGeo.rotateX(-Math.PI / 2);
                this.tailBase = new THREE.Mesh(tailGeo, p4Mat);
                this.tailGroup.add(this.tailBase);

                // Tail Tip
                const tipGeo = new THREE.CylinderGeometry(0.0, 0.6, 1.2, 8);
                tipGeo.rotateX(-Math.PI / 2);
                this.tailTip = new THREE.Mesh(tipGeo, p4Mat);
                this.tailTip.position.z = -1.5;
                this.tailGroup.add(this.tailTip);

                this.mesh.add(this.tailGroup);
                this.p4Part = this.tailGroup;
                this.p4HeadPart = this.tailTip;

                // 4. 光束炮 Mesh（半徑=1 單位，scale.x/y 設定粗細，scale.z 設定長度）
                const _beamBase = () => {
                    const g = new THREE.CylinderGeometry(1, 1, 1, 12);
                    g.rotateX(Math.PI / 2);
                    g.translate(0, 0, 0.5); // 起點在原點
                    return g;
                };

                // 主光束（白色核心）
                this.beamMesh = new THREE.Mesh(_beamBase(), new THREE.MeshBasicMaterial({
                    color: 0xffffff, transparent: true, opacity: 0.95, depthWrite: false
                }));
                this.beamMesh.visible = false;
                scene.add(this.beamMesh);

                // 外光暈（beam 色，加算混色，2.5 倍粗）
                this.beamGlowMesh = new THREE.Mesh(_beamBase(), new THREE.MeshBasicMaterial({
                    color: CONFIG.visuals.colors.beam,
                    transparent: true, opacity: 0.0,
                    blending: THREE.AdditiveBlending, depthWrite: false
                }));
                this.beamGlowMesh.visible = false;
                scene.add(this.beamGlowMesh);

                // 衝擊點球體閃光
                this.beamImpactMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(1, 10, 8),
                    new THREE.MeshBasicMaterial({
                        color: 0xffffff, transparent: true, opacity: 0.0,
                        blending: THREE.AdditiveBlending, depthWrite: false
                    })
                );
                this.beamImpactMesh.visible = false;
                scene.add(this.beamImpactMesh);

                // 光束原點與衝擊點的動態光源
                this.beamOriginLight = new THREE.PointLight(CONFIG.visuals.colors.beam, 0, 12);
                scene.add(this.beamOriginLight);
                this.beamImpactLight = new THREE.PointLight(0xffffff, 0, 14);
                scene.add(this.beamImpactLight);

                // 光束炮 prefire 閃光環（多層）
                const chargeRingGeo = new THREE.RingGeometry(1.2, 2.2, 32);
                chargeRingGeo.rotateX(-Math.PI / 2);
                const chargeRingMat = new THREE.MeshBasicMaterial({
                    color: CONFIG.visuals.colors.beam,
                    side: THREE.DoubleSide, transparent: true, opacity: 0.0,
                    blending: THREE.AdditiveBlending, depthWrite: false
                });
                this.beamChargeRing = new THREE.Mesh(chargeRingGeo, chargeRingMat);
                this.beamChargeRing.position.y = 0.2;
                scene.add(this.beamChargeRing);
            }



            updateDragon(dt) {
                const t = Date.now() * 0.002;

                // 1. Walk Cycle (Legs)
                if (this.legs && this.legs.length > 0) {
                    const speedSq = this.velocity.lengthSq();
                    const isMoving = speedSq > 0.001;

                    if (isMoving) {
                        const speed = Math.sqrt(speedSq);

                        // [Chinese Config Guide]
                        // walkFreq (步頻): 控制腳步的快慢。數值越高，腳步越快。
                        // 目前設定：基礎 5 + 速度 * 3.5。這表示移動越快，腳步越快。
                        const walkFreq = Math.max(4, speed * 2);

                        // [Chinese Config Guide]
                        // walkAmp (步幅): 控制腳步抬起的高度/幅度。數值越高，腳抬得越高。
                        const walkAmp = 0.8;

                        // 累積相位 (Cumulative Phase) - 解決速度變化時的瞬跳問題
                        if (!this.legPhase) this.legPhase = 0;
                        this.legPhase += dt * walkFreq;

                        this.legs.forEach((l, i) => {
                            const offset = (i === 0 || i === 3) ? 0 : Math.PI;
                            // 使用 this.legPhase 替代 t * freq
                            l.group.rotation.x = Math.sin(this.legPhase + offset) * walkAmp;
                        });
                    } else {
                        this.legs.forEach(l => {
                            l.group.rotation.x *= (1.0 - dt * 10);
                        });
                        // Reset phase slightly or keep it naturally? 
                        // Keeping it allows resuming walk from same foot position, which is natural.

                        // Stand still bobbing?
                        this.mesh.position.y = THREE.MathUtils.lerp(this.mesh.position.y, 0, dt * 5);
                    }

                    // 1.5 Body Mechanics (Banking & Bobbing)
                    // A. Banking (Lean into turns)
                    const currentRotY = this.mesh.rotation.y;
                    let deltaRot = currentRotY - this.lastRotationY;
                    // Handle wrap-around (PI to -PI)
                    if (deltaRot > Math.PI) deltaRot -= Math.PI * 2;
                    if (deltaRot < -Math.PI) deltaRot += Math.PI * 2;

                    const angVel = deltaRot / dt;
                    this.angularVelocity = THREE.MathUtils.lerp(this.angularVelocity, angVel, dt * 10); // Smooth it
                    this.lastRotationY = currentRotY;

                    // Lean: Max lean 0.3 rad
                    // [Refined] Duo mode should lean less
                    const bankFactor = (state.mode === 'duo') ? 0.03 : 0.15;
                    const maxBank = (state.mode === 'duo') ? 0.15 : 0.3;

                    const targetLean = THREE.MathUtils.clamp(-this.angularVelocity * bankFactor, -maxBank, maxBank);
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, targetLean, dt * 5);

                    // B. Bobbing (Up/Down)
                    if (isMoving) {
                        // Bounce freq = walkFreq * 2 (Two steps per cycle?)
                        // If walkFreq is ~10, bounce is ~20
                        const bounce = Math.abs(Math.sin(this.legPhase)) * 0.15;
                        this.mesh.position.y = bounce;
                    }
                }

                // 2. Necks P1-P3 Logic
                if (this.necks) {
                    ['p1', 'p2', 'p3'].forEach(p => {
                        const n = this.necks.find(x => x.id === p);
                        if (!n) return;

                        // Ensure state exists
                        if (!this.attackStates) this.attackStates = { p1: 'idle', p2: 'idle', p3: 'idle', p4: 'idle' };
                        if (!this.attackTimers) this.attackTimers = { p1: 0, p2: 0, p3: 0, p4: 0 };

                        const currentState = this.attackStates[p] || 'idle';

                        if (currentState === 'windup') {
                            this.attackTimers[p] -= dt;
                            const progress = 1 - (this.attackTimers[p] / CONFIG.combat.windupTime);
                            const ease = progress * (2 - progress); // Ease Out
                            // REVERSED: Lean BACK (Negative for this model setup? Or Positive?)
                            // Original: base + ease.
                            // User says: "Currently Forward then Back".
                            // So "base + ease" was Forward.
                            // We want Back first. So "base - ease".
                            n.pivot.rotation.x = n.baseLean - (ease * 1.0);

                            if (this.attackTimers[p] <= 0) {
                                this.triggerAttackImpact(p);
                                this.attackStates[p] = 'recovery';
                                this.attackTimers[p] = CONFIG.combat.recoveryTime;
                            }
                        } else if (currentState === 'recovery') {
                            this.attackTimers[p] -= dt;
                            const progress = 1 - (this.attackTimers[p] / CONFIG.combat.recoveryTime);

                            let targetLean = n.baseLean;
                            // Smash Phase: Go DOWN (Forward, i.e. Positive)
                            if (progress < 0.2) {
                                const p2 = progress / 0.2;
                                // From Back (base-1.0) to Forward/Down (base+1.5)
                                targetLean = (n.baseLean - 1.0) * (1 - p2) + (n.baseLean + 1.5) * p2;
                            } else {
                                // Return Phase
                                const p2 = (progress - 0.2) / 0.8;
                                const ease = p2 * p2 * (3 - 2 * p2);
                                targetLean = (n.baseLean + 1.5) * (1 - ease) + (n.baseLean) * ease;
                            }
                            n.pivot.rotation.x = targetLean;

                            if (this.attackTimers[p] <= 0) this.attackStates[p] = 'idle';
                        } else {
                            // Idle with Lag
                            // Head Lag Logic:
                            // If angularVelocity is positive (turning left), heads should lag right (negative rot).
                            const lag = -this.angularVelocity * 0.1;

                            n.group.rotation.z = Math.sin(t * 5 + (p === 'p2' ? 1 : (p === 'p3' ? 2 : 0))) * 0.05 + lag;
                            n.pivot.rotation.x = n.baseLean + Math.sin(t * 8) * 0.05;
                            n.group.position.z = (p === 'p3' ? 1.0 : 1.1);
                        }
                    });
                }

                // 3. Tail P4 Logic
                if (this.tailGroup) {
                    const p = 'p4';
                    // Ensure state exists
                    if (!this.attackStates) this.attackStates = { p1: 'idle', p2: 'idle', p3: 'idle', p4: 'idle' };
                    const currentState = this.attackStates[p] || 'idle';

                    if (currentState === 'windup') {
                        this.attackTimers[p] -= dt;
                        const progress = 1 - (this.attackTimers[p] / CONFIG.combat.windupTime);
                        // Windup: Swing LEFT (prepare)
                        this.tailGroup.rotation.y = Math.sin(progress * Math.PI * 0.5) * 1.2;

                        if (this.attackTimers[p] <= 0) {
                            this.triggerAttackImpact(p);
                            this.attackStates[p] = 'recovery';
                            this.attackTimers[p] = CONFIG.combat.recoveryTime;
                        }
                    } else if (currentState === 'recovery') {
                        this.attackTimers[p] -= dt;
                        const progress = 1 - (this.attackTimers[p] / CONFIG.combat.recoveryTime);

                        // Whip RIGHT (Attack) then Return
                        if (progress < 0.3) {
                            const p2 = progress / 0.3;
                            // From Left (+1.2) to Right (-1.5)
                            this.tailGroup.rotation.y = 1.2 * (1 - p2) + (-1.5) * p2;
                        } else {
                            // Return to Center
                            const p2 = (progress - 0.3) / 0.7;
                            const ease = p2 * p2;
                            this.tailGroup.rotation.y = -1.5 * (1 - ease);
                        }
                        if (this.attackTimers[p] <= 0) this.attackStates[p] = 'idle';
                    } else {
                        this.tailGroup.rotation.y = Math.sin(t * 2.0) * 0.1;
                    }
                }
            }

            updateSpeedLines(dt) {
                // 1. Lifecycle & Animation
                for (let i = this.speedLines.length - 1; i >= 0; i--) {
                    const line = this.speedLines[i];
                    line.life -= dt;
                    // Move
                    line.mesh.position.add(line.velocity.clone().multiplyScalar(dt));
                    // Fade
                    line.mesh.material.opacity = (line.life / line.maxLife) * 0.3; // Max opacity 0.3

                    if (line.life <= 0) {
                        if (line.mesh.parent) line.mesh.parent.remove(line.mesh); // Safe remove
                        line.mesh.geometry.dispose();
                        line.mesh.material.dispose();
                        this.speedLines.splice(i, 1);
                    }
                }

                // 2. Spawn Logic
                if (this.isBoosting) {
                    if (Math.random() > 0.5) return;

                    const geo = new THREE.BoxGeometry(0.05, 0.05, 3.0);
                    const mat = new THREE.MeshBasicMaterial({ color: 0x00ffff, transparent: true, opacity: 0.0 });
                    const mesh = new THREE.Mesh(geo, mat);

                    const angle = Math.random() * Math.PI * 2;
                    const radius = 1.2 + Math.random() * 1.3;
                    const height = 0.5 + Math.random() * 2.0;

                    const offset = new THREE.Vector3(Math.cos(angle) * radius, height, Math.sin(angle) * radius);
                    mesh.position.copy(this.mesh.position).add(offset);

                    const moveDir = (this.velocity.lengthSq() > 0.1) ? this.velocity.clone().normalize().negate() : this.getForwardVector().negate();

                    mesh.lookAt(mesh.position.clone().add(moveDir));
                    scene.add(mesh);

                    this.speedLines.push({
                        mesh: mesh,
                        velocity: moveDir.multiplyScalar(15 + Math.random() * 10),
                        life: 0.3,
                        maxLife: 0.3
                    });
                }
            }

            buildIndicators() {
                this.p1Arrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 2, 0), CONFIG.visuals.arrowLength, CONFIG.visuals.colors.p1);
                scene.add(this.p1Arrow);

                this.p2Arrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 2, 0), CONFIG.visuals.arrowLength, CONFIG.visuals.colors.p2);
                scene.add(this.p2Arrow);

                this.p3Arrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 2, 0), CONFIG.visuals.arrowLength, CONFIG.visuals.colors.p3);
                scene.add(this.p3Arrow);

                this.p4Arrow = new THREE.ArrowHelper(new THREE.Vector3(1, 0, 0), new THREE.Vector3(0, 2, 0), CONFIG.visuals.arrowLength, CONFIG.visuals.colors.p4);
                scene.add(this.p4Arrow);
            }

            getForwardVector() {
                const forward = new THREE.Vector3(0, 0, 1);
                forward.applyQuaternion(this.mesh.quaternion);
                return forward;
            }

            updateVisibility() {
                const isQuad = state.mode === 'quad';

                if (this.p3Part) this.p3Part.visible = isQuad;
                if (this.p4Part) this.p4Part.visible = isQuad;

                if (this.p3Arrow) this.p3Arrow.visible = isQuad;
                if (this.p4Arrow) this.p4Arrow.visible = isQuad;

                // Toggle back legs (only visible in Quad mode)
                if (this.legs) {
                    this.legs.forEach(leg => {
                        if (!leg.isFront) {
                            leg.group.visible = isQuad;
                        }
                    });
                }

                // Rescale body based on mode (use mesh.scale, not geometry.scale to avoid cumulative scaling)
                if (this.body) {
                    if (isQuad) {
                        // Quad mode: larger body (1, 0.8, 1.5)
                        this.body.scale.set(1, 0.8, 1.5);
                        this.body.position.z = 0; // Centered
                    } else {
                        // Duo mode: smaller body (1, 0.8, 0.9)
                        this.body.scale.set(0.8, 0.1, 0.9);
                        this.body.position.z = 0.8; // Move forward
                    }
                }
            }

            attack(playerIndex) {
                if (!this.attackStates) this.attackStates = { p1: 'idle', p2: 'idle', p3: 'idle', p4: 'idle' };
                if (this.attackStates[playerIndex] !== 'idle') return;

                this.attackStates[playerIndex] = 'windup';
                this.attackTimers[playerIndex] = CONFIG.combat.windupTime;
            }

            triggerAttackImpact(playerIndex) {
                let isTail = (playerIndex === 'p4');
                let damage = CONFIG.combat.meleeDamage;
                let radius = CONFIG.combat.attackRange;
                let color = CONFIG.visuals.colors[playerIndex];

                const forward = this.getForwardVector();
                const spawnPos = this.mesh.position.clone();
                spawnPos.y = 0.5;

                if (isTail) {
                    spawnPos.add(forward.clone().negate().multiplyScalar(3.0));
                } else {
                    // Refinement: Swapped P1/P2 positions (Left vs Right)
                    if (playerIndex === 'p1') spawnPos.add(forward.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), -0.6).multiplyScalar(3.0));
                    if (playerIndex === 'p2') spawnPos.add(forward.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), 0.6).multiplyScalar(3.0));
                    if (playerIndex === 'p3') spawnPos.add(forward.multiplyScalar(3.2));
                }

                this.createHitbox(spawnPos, radius, damage, 0.2, isTail, color);
            }

            createHitbox(pos, radius, damage, duration, isTail, color) {
                // Visuals: Ring + Sparks
                const ringGeo = new THREE.RingGeometry(0.5, radius, 32);
                ringGeo.rotateX(-Math.PI / 2);
                const ringMat = new THREE.MeshBasicMaterial({ color: color, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.position.copy(pos);
                ring.position.y = 0.1; // Slightly above ground
                scene.add(ring);

                // 2. Sparks (Particles)
                for (let i = 0; i < 8; i++) {
                    const pPos = pos.clone().add(new THREE.Vector3((Math.random() - 0.5) * radius, Math.random() * 2, (Math.random() - 0.5) * radius));
                    state.particles.push(new Particle(pPos, color));
                }

                // Hitbox Logic
                state.particles.push({
                    ring: ring,
                    life: duration,
                    maxLife: duration,
                    hitList: new Set(),
                    update: function (dt) {
                        this.life -= dt;
                        const progress = 1 - (this.life / this.maxLife);

                        // Fade
                        this.ring.material.opacity = 0.8 * (1 - progress);

                        // Expand Ring
                        const s = 1 + progress * 0.5;
                        this.ring.scale.set(s, s, s);

                        if (this.life <= 0) {
                            scene.remove(this.ring);
                            this.ring.geometry.dispose();
                            return false;
                        }

                        // Collision Check
                        if (state.enemyManager) {
                            state.enemyManager.enemies.forEach(e => {
                                if (e.isDead || this.hitList.has(e)) return;
                                if (e.mesh.position.distanceTo(ring.position) < radius + 0.5) { // Check dist to Center
                                    // HIT
                                    e.takeDamage(damage, window.gidoraInstance.mesh.position, isTail ? 15 : 10);
                                    this.hitList.add(e);

                                    // [New] Attack Recoil: Apply opposite knockback to Gidora
                                    if (!isTail) {
                                        const recoilDir = window.gidoraInstance.mesh.position.clone().sub(e.mesh.position).normalize();
                                        recoilDir.y = 0;
                                        window.gidoraInstance.knockbackVel.add(recoilDir.multiplyScalar(4)); // Recoil force
                                    }
                                }
                            });
                        }

                        // [New] Building Destruction
                        if (state.levelManager && state.levelManager.blocks) {
                            state.levelManager.blocks.forEach((block, idx) => {
                                if (block.isDead || this.hitList.has(block)) return;
                                if (block.mesh.position.distanceTo(ring.position) < radius + 2.5) {
                                    // HIT - Buildings have larger hitbox (5x5 blocks)
                                    block.hp -= damage;
                                    block.flashTimer = 0.1;
                                    this.hitList.add(block);

                                    if (block.hp <= 0) {
                                        block.isDead = true;
                                        scene.remove(block.mesh);
                                        block.mesh.geometry.dispose();
                                        block.mesh.material.dispose();
                                    }

                                    // Building recoil (stronger than enemy)
                                    if (!isTail) {
                                        const recoilDir = window.gidoraInstance.mesh.position.clone().sub(block.mesh.position).normalize();
                                        recoilDir.y = 0;
                                        window.gidoraInstance.knockbackVel.add(recoilDir.multiplyScalar(5)); // Stronger recoil for buildings
                                    }
                                }
                            });
                        }

                        return true;
                    }
                });
            }

            // --- 光束炮狀態機 ---
            _hideBeamFX() {
                this.beamMesh.visible = false;
                if (this.beamGlowMesh) this.beamGlowMesh.visible = false;
                if (this.beamImpactMesh) this.beamImpactMesh.visible = false;
                if (this.beamOriginLight) this.beamOriginLight.intensity = 0;
                if (this.beamImpactLight) this.beamImpactLight.intensity = 0;
            }

            updateBeam(dt) {
                const beamCfg = CONFIG.beam;
                const modeCfg = beamCfg[state.mode];
                const maxCharge = modeCfg.maxCharge;
                const beamWidth = modeCfg.width;
                const now = Date.now();
                const players = state.mode === 'quad' ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2'];
                const chargeCount = players.filter(p => state.input[p].charge).length;

                if (state.beamPhase === 'prefire') {
                    // 前搖：全員放開 → 立刻進入後搖
                    if (chargeCount === 0) {
                        state.beamPhase = 'postfire';
                        state.beamPostFireTimer = beamCfg.postFireDelay;
                        this.beamChargeRing.material.opacity = 0;
                        this._hideBeamFX();
                        return;
                    }

                    state.beamPreFireTimer -= dt;
                    const progress = 1.0 - (state.beamPreFireTimer / beamCfg.preFireDelay);
                    this.beamChargeRing.position.copy(this.mesh.position);
                    this.beamChargeRing.position.y = 0.2;
                    const flicker = 0.5 + Math.sin(progress * 40) * 0.5;
                    this.beamChargeRing.material.opacity = flicker;
                    this.beamChargeRing.scale.setScalar(0.8 + progress * 1.5);

                    if (state.beamPreFireTimer <= 0) {
                        state.beamPhase = 'firing';
                        state.beamFiringTimer = beamCfg.firingDuration;  // 開始3.5秒計時
                        state.beamDotTimer = 0;
                        this.beamChargeRing.material.opacity = 0;
                        this.beamMesh.visible = true;
                        if (this.beamGlowMesh) this.beamGlowMesh.visible = true;
                        if (this.beamImpactMesh) this.beamImpactMesh.visible = true;
                    }
                }
                else if (state.beamPhase === 'firing') {
                    // 固定3.5秒計時器倒數，時間到則自動結束
                    state.beamFiringTimer -= dt;
                    if (state.beamFiringTimer <= 0) {
                        state.beamCharge = 0;           // 能量瞬間歸零
                        state.beamPhase = 'postfire';
                        state.beamPostFireTimer = beamCfg.postFireDelay;
                        this._hideBeamFX();
                        return;
                    }

                    // 更新光束 Mesh 位置與長度
                    const forward = this.getForwardVector().normalize();
                    const origin = this.mesh.position.clone();
                    origin.y = 1.0;

                    // 射線碰撞測試
                    const hitRadius = beamWidth;
                    let beamLength = beamCfg.range;

                    if (state.enemyManager) {
                        state.enemyManager.enemies.forEach(e => {
                            if (e.isDead) return;
                            const toE = e.mesh.position.clone().sub(origin);
                            const along = toE.dot(forward);
                            if (along < 0 || along > beamLength) return;
                            const perp = toE.clone().sub(forward.clone().multiplyScalar(along));
                            if (perp.length() < 1.2 + hitRadius) {
                                beamLength = Math.min(beamLength, along);
                            }
                        });
                    }
                    if (state.levelManager) {
                        state.levelManager.blocks.forEach(b => {
                            if (b.isDead) return;
                            const toB = b.mesh.position.clone().sub(origin);
                            const along = toB.dot(forward);
                            if (along < 0 || along > beamLength) return;
                            const perp = toB.clone().sub(forward.clone().multiplyScalar(along));
                            const hw = (b.mesh.geometry.parameters.width || 2) / 2 + hitRadius;
                            const hd = (b.mesh.geometry.parameters.depth || 2) / 2 + hitRadius;
                            if (Math.abs(perp.x) < hw && Math.abs(perp.z) < hd) {
                                beamLength = Math.min(beamLength, along);
                            }
                        });
                    }

                    // 主光束 Mesh（scale.x/y = 粗細，scale.z = 長度）
                    this.beamMesh.position.copy(origin);
                    this.beamMesh.quaternion.copy(this.mesh.quaternion);
                    this.beamMesh.scale.set(beamWidth, beamWidth, beamLength);

                    // 外光暈（2.5 倍粗細）
                    const glowW = beamWidth * 2.5;
                    if (this.beamGlowMesh) {
                        this.beamGlowMesh.position.copy(origin);
                        this.beamGlowMesh.quaternion.copy(this.mesh.quaternion);
                        this.beamGlowMesh.scale.set(glowW, glowW, beamLength);
                    }

                    // 衝擊點閃光
                    const impactPos = origin.clone().add(forward.clone().multiplyScalar(beamLength));
                    if (this.beamImpactMesh) {
                        this.beamImpactMesh.position.copy(impactPos);
                        const impactSize = beamWidth * (1.8 + Math.sin(now * 0.025) * 0.7);
                        this.beamImpactMesh.scale.setScalar(impactSize);
                    }

                    // 閃爍效果
                    const pulse = 0.8 + Math.sin(now * 0.022) * 0.2;
                    this.beamMesh.material.opacity = pulse;
                    if (this.beamGlowMesh) this.beamGlowMesh.material.opacity = 0.22 + Math.sin(now * 0.013) * 0.08;
                    if (this.beamImpactMesh) this.beamImpactMesh.material.opacity = 0.65 + Math.sin(now * 0.035) * 0.35;

                    // PointLight 效果
                    if (this.beamOriginLight) {
                        this.beamOriginLight.position.copy(origin);
                        this.beamOriginLight.intensity = 2.5 + Math.sin(now * 0.02) * 0.8;
                    }
                    if (this.beamImpactLight) {
                        this.beamImpactLight.position.copy(impactPos);
                        this.beamImpactLight.intensity = 3.5 + Math.sin(now * 0.028) * 1.5;
                    }

                    // 傷害 tick
                    state.beamDotTimer += dt;
                    if (state.beamDotTimer >= beamCfg.tickInterval) {
                        state.beamDotTimer = 0;
                        const damage = beamCfg.damagePerTick * (state.mode === 'quad' ? beamCfg.damageScale : 1.0);

                        if (state.enemyManager) {
                            state.enemyManager.enemies.forEach(e => {
                                if (e.isDead) return;
                                const toE = e.mesh.position.clone().sub(origin);
                                const along = toE.dot(forward);
                                if (along < 0 || along > beamLength + 1.2) return;
                                const perp = toE.clone().sub(forward.clone().multiplyScalar(along));
                                if (perp.length() < 1.2 + hitRadius) {
                                    e.takeDamage(damage, origin, 0);
                                }
                            });
                        }
                        if (state.levelManager) {
                            state.levelManager.blocks.forEach(b => {
                                if (b.isDead) return;
                                const toB = b.mesh.position.clone().sub(origin);
                                const along = toB.dot(forward);
                                if (along < 0 || along > beamLength + 1.0) return;
                                const perp = toB.clone().sub(forward.clone().multiplyScalar(along));
                                const hw = (b.mesh.geometry.parameters.width || 2) / 2 + hitRadius;
                                const hd = (b.mesh.geometry.parameters.depth || 2) / 2 + hitRadius;
                                if (Math.abs(perp.x) < hw && Math.abs(perp.z) < hd) {
                                    b.hp -= damage;
                                    b.flashTimer = 0.1;
                                    if (b.hp <= 0) {
                                        b.isDead = true;
                                        scene.remove(b.mesh);
                                        b.mesh.geometry.dispose();
                                        b.mesh.material.dispose();
                                    }
                                }
                            });
                        }
                    }
                }
                else if (state.beamPhase === 'postfire') {
                    // 後搖：能量緩慢衰減（有人按住也可再充能）
                    if (chargeCount > 0) {
                        const rates = modeCfg.chargeRates;
                        const rate = rates[Math.min(chargeCount, rates.length - 1)];
                        state.beamCharge = Math.min(maxCharge, state.beamCharge + rate * dt);
                    } else {
                        state.beamCharge = Math.max(0, state.beamCharge - beamCfg.decayRate * dt);
                    }

                    // 蓄力重新蓄滿 → 取消後搖，進入前搖
                    if (state.beamCharge >= maxCharge) {
                        state.beamPhase = 'prefire';
                        state.beamPreFireTimer = beamCfg.preFireDelay;
                        this.beamChargeRing.position.copy(this.mesh.position);
                        return;
                    }

                    state.beamPostFireTimer -= dt;
                    if (state.beamPostFireTimer <= 0) {
                        // 後搖結束：回到 idle，保留當前蓄力量讓它自然衰減
                        state.beamPhase = 'idle';
                    }
                }
            }

            update(dt) {
                this.updateDragon(dt);
                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Damage Flash
                if (this.damageFlashTimer > 0) {
                    this.damageFlashTimer -= dt;
                    if (this.damageFlashTimer <= 0) {
                        // Restore colors
                        this.updateVisibility(); // Reset to base/dark colors (hacky but works)
                        // Actually we need to force reset materials in loop
                    } else {
                        // Flash Red
                        this.p1HeadPart.material.color.setHex(0xff0000);
                        this.p2HeadPart.material.color.setHex(0xff0000);
                        // ...
                    }
                }

                // --- 光束炮狀態機 ---
                const players = state.mode === 'quad' ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2'];
                const beamCfg = CONFIG.beam;
                const modeCfg = beamCfg[state.mode];
                const maxCharge = modeCfg.maxCharge;
                const isBeamActive = (state.beamPhase !== 'idle');

                // 光束期間：阻止移動，允許轉向（移動鎖定在後面 movement 段處理）
                if (isBeamActive) {
                    this.updateBeam(dt);
                    // prefire/postfire 鎖定所有輸入
                    if (state.beamPhase === 'prefire' || state.beamPhase === 'postfire') return;
                }

                // --- 蓄力邏輯（idle 中才更新；無人按時緩慢倒扣至 0）---
                if (state.beamPhase === 'idle') {
                    const chargeCount = players.filter(p => state.input[p].charge).length;
                    const rates = modeCfg.chargeRates;
                    const rate = chargeCount > 0
                        ? rates[Math.min(chargeCount, rates.length - 1)]
                        : -beamCfg.decayRate;
                    state.beamCharge = Math.min(maxCharge, Math.max(0, state.beamCharge + rate * dt));
                    state.pulseValue = (state.beamCharge / maxCharge) * 100; // 相容舊 debug 顯示

                }

                // --- 觸發 prefire ---
                if (state.beamPhase === 'idle' && state.beamCharge >= maxCharge) {
                    state.beamPhase = 'prefire';
                    state.beamPreFireTimer = beamCfg.preFireDelay;
                    this.beamChargeRing.position.copy(this.mesh.position);
                    return;
                }

                // 1. Cooldown Management
                players.forEach(p => {
                    if (this.cooldowns[p] > 0) this.cooldowns[p] -= dt;
                });

                // 2. Input Detection & Attack Trigger
                players.forEach(p => {
                    const isPress = state.input[p].attack && !this.lastAttackInput[p];
                    this.lastAttackInput[p] = state.input[p].attack;

                    if (this.cooldowns[p] <= 0) {
                        // Auto-fire enabled for Melee? Or just on press? 
                        // Let's allow hold to spam.
                        if (isPress || state.input[p].attack) {
                            this.attack(p);
                            this.cooldowns[p] = 0.5; // Melee Cooldown
                        }
                    }
                });

                // 3. Visuals Loop (Colors)
                players.forEach(p => {
                    // partMap is getting Groups (Neck/Tail Group) which don't have material.
                    // We only color the "Head" part (Head Mesh / Tail Tip).
                    const headMap = { p1: this.p1HeadPart, p2: this.p2HeadPart, p3: this.p3HeadPart, p4: this.p4HeadPart };
                    const baseMap = { p1: CONFIG.visuals.colors.p1, p2: CONFIG.visuals.colors.p2, p3: CONFIG.visuals.colors.p3, p4: CONFIG.visuals.colors.p4 };

                    const head = headMap[p];
                    if (!head) return;

                    if (this.cooldowns[p] > 0) {
                        // Cooldown Darken
                        const base = new THREE.Color(baseMap[p]);
                        base.multiplyScalar(0.5);
                        head.material.color.copy(base);
                    } else {
                        // Normal
                        head.material.color.set(baseMap[p]);
                    }

                });


                // 5. Movement Physics
                let totalInput = new THREE.Vector3();
                let totalRotationInput = new THREE.Vector3(); // [New] Separate rotation
                const activeDirs = []; // Track directions for Synergy Boost

                // [New] Check if ANY head is in windup (Input Lock)
                const isAnyWindup = ['p1', 'p2', 'p3', 'p4'].some(p => this.attackStates[p] === 'windup');

                players.forEach(p => {
                    const moveInput = state.input[p].move;
                    const hasInput = moveInput.lengthSq() > 0.01;
                    const isCharging = state.input[p].charge;
                    // [New] Is Attacking? (Windup or Cooldown)
                    const isAttacking = this.isWindup[p] || this.cooldowns[p] > 0.05;

                    // Arrow Visualization
                    const arrowMap = { p1: this.p1Arrow, p2: this.p2Arrow, p3: this.p3Arrow, p4: this.p4Arrow };
                    const arrow = arrowMap[p];

                    // 轉向：只要有輸入且不在 windup 就允許（發射中也可以，速度縮減）
                    if (hasInput && !isAnyWindup) {
                        const inputVec = new THREE.Vector3(moveInput.x, 0, moveInput.y);
                        const dir = inputVec.clone().normalize();

                        // 1. 轉向輸入：發射/蓄力中仍允許，速度在旋轉段另外縮減
                        totalRotationInput.add(inputVec);

                        // 2. 移動輸入：光束啟動中或正按蓄力鍵時鎖定
                        if (!isBeamActive && !isCharging) {
                            if (!this.isWindup[p] && (this.cooldowns[p] <= 0.05 || (this.lastShotType[p] === 'single' || this.lastShotType[p] === 'ultraSingle'))) {
                                totalInput.add(inputVec);
                                activeDirs.push(dir);
                            }
                        }

                        arrow.visible = true;
                        arrow.position.copy(this.mesh.position);
                        arrow.setDirection(dir);
                    } else {
                        arrow.visible = false;
                    }
                });

                // Check Synergy Boost (Any pair < 45 degrees)
                let speedMult = 1.0;
                if (activeDirs.length >= 2) {
                    for (let i = 0; i < activeDirs.length; i++) {
                        for (let j = i + 1; j < activeDirs.length; j++) {
                            const dot = activeDirs[i].dot(activeDirs[j]);
                            if (dot > 0.707) { // cos(45) ~ 0.707
                                speedMult = 1.5; // 50% Boost
                                break;
                            }
                        }
                        if (speedMult > 1.0) break;
                    }
                }

                // Speed Lines Trigger
                // Rotation - MOVED BEFORE MOVEMENT for Car-like steering
                // Rotate towards INPUT Direction
                let turnPenalty = 1.0;
                if (totalRotationInput.lengthSq() > 0.01 && !this.isBursting) {
                    const targetAngle = Math.atan2(totalRotationInput.x, totalRotationInput.z);
                    const currentAngle = this.mesh.rotation.y;
                    let deltaAngle = targetAngle - currentAngle;
                    while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                    while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

                    // 光束發射中轉向幅度縮小為 35%
                    const rotSpeedMult = (state.beamPhase === 'firing') ? 0.35 : 1.0;
                    const rotStep = CONFIG.movement[state.mode].rotationSpeed * rotSpeedMult * dt;
                    if (Math.abs(deltaAngle) < rotStep) this.mesh.rotation.y = targetAngle;
                    else this.mesh.rotation.y += Math.sign(deltaAngle) * rotStep;

                    // [New Turn Penalty Logic]
                    // 0 - 30 deg (0.523 rad): No Penalty (1.0)
                    // 30 - 180 deg: Linear to 0.5
                    // > 180 deg: 0.5
                    const absDelta = Math.abs(deltaAngle);
                    const deg = absDelta * (180 / Math.PI);

                    if (deg <= 30) {
                        turnPenalty = 1.0;
                    } else if (deg >= 180) {
                        turnPenalty = 0.5;
                    } else {
                        // Linear Intep
                        const t = (deg - 30) / 150.0;
                        turnPenalty = 1.0 - (t * 0.5);
                    }
                }

                // Speed Lines Trigger
                this.isBoosting = (speedMult > 1.0);
                this.updateSpeedLines(dt);

                // Car-like Physics
                const currentSpeed = this.velocity.length();
                // Apply Turn Penalty to Max Speed
                const maxSpeed = CONFIG.movement[state.mode].maxSpeed * speedMult * turnPenalty;
                const forward = this.getForwardVector();
                const isInputting = totalInput.lengthSq() > 0.01;

                if (isBeamActive) {
                    // 光束發射中：強制靜止（速度快速衰減）
                    this.velocity.multiplyScalar(Math.max(0, 1 - 20 * dt));
                } else if (isInputting) {
                    // A. Traction: Rotate velocity towards forward
                    if (currentSpeed > 0.1) {
                        const currentDir = this.velocity.clone().normalize();
                        const traction = CONFIG.movement[state.mode].traction * dt;
                        currentDir.lerp(forward, traction).normalize();
                        this.velocity.copy(currentDir.multiplyScalar(currentSpeed));
                    }
                    // B. Acceleration: Push forward
                    const accel = CONFIG.movement[state.mode].acceleration * dt;
                    this.velocity.add(forward.multiplyScalar(accel));
                    // Cap Speed
                    if (this.velocity.length() > maxSpeed) {
                        this.velocity.setLength(maxSpeed);
                    }
                } else {
                    // C. Friction
                    const friction = CONFIG.movement[state.mode].friction * dt;
                    const spd = this.velocity.length();
                    if (spd > 0) {
                        if (spd < friction) this.velocity.set(0, 0, 0);
                        else this.velocity.multiplyScalar(1 - (friction / spd));
                    }
                }
                const currentVel = this.velocity;

                this.mesh.position.add(currentVel.clone().multiplyScalar(dt));

                // Knockback Physics (like enemies)
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.knockbackVel.multiplyScalar(0.9); // Friction
                }

                // Player-Block Collision
                // Simple Circle-Box or Box-Box resolution
                // Player radius ~ 0.8
                if (state.levelManager) {
                    const pRadius = 0.8;
                    const pPos = this.mesh.position;

                    state.levelManager.blocks.forEach(b => {
                        if (b.isDead) return;

                        // AABB check first?
                        // Box Center logic
                        // b.mesh.position is center.
                        // b.mesh.geometry.parameters.width/height/depth
                        const width = b.mesh.geometry.parameters.width;
                        const depth = b.mesh.geometry.parameters.depth;

                        const minX = b.mesh.position.x - width / 2 - pRadius;
                        const maxX = b.mesh.position.x + width / 2 + pRadius;
                        const minZ = b.mesh.position.z - depth / 2 - pRadius;
                        const maxZ = b.mesh.position.z + depth / 2 + pRadius;

                        if (pPos.x > minX && pPos.x < maxX && pPos.z > minZ && pPos.z < maxZ) {
                            // Inside expanded bounds. Resolve.
                            // Find closest point on box clamp
                            const clampX = Math.max(b.mesh.position.x - width / 2, Math.min(pPos.x, b.mesh.position.x + width / 2));
                            const clampZ = Math.max(b.mesh.position.z - depth / 2, Math.min(pPos.z, b.mesh.position.z + depth / 2));

                            const diffX = pPos.x - clampX;
                            const diffZ = pPos.z - clampZ;
                            const distSq = diffX * diffX + diffZ * diffZ;

                            // Check against radius squared (allow small overlap for smooth sliding?)
                            if (distSq < pRadius * pRadius && distSq > 0.0001) {
                                const dist = Math.sqrt(distSq);
                                const pen = pRadius - dist;
                                const normalX = diffX / dist;
                                const normalZ = diffZ / dist;

                                // Push out
                                this.mesh.position.x += normalX * pen;
                                this.mesh.position.z += normalZ * pen;

                                // Kill velocity in normal direction?
                                // const vDot = this.velocity.x * normalX + this.velocity.z * normalZ;
                                // if (vDot < 0) {
                                //    this.velocity.x -= normalX * vDot;
                                //    this.velocity.z -= normalZ * vDot;
                                // }
                            }
                        }
                    });
                }

                // Rotation logic moved to before physics update

                // Camera & Follow
                camera.position.x = this.mesh.position.x;
                camera.position.z = this.mesh.position.z + 10;
                // [Fix] Target stable Y (1.2) to remove bobbing shake
                camera.lookAt(this.mesh.position.x, 1.2, this.mesh.position.z);
                // (combo group removed - beam uses scene-level mesh)

                // Scale Decay Logic (Beat Bounce) - Global
                if (!this.pulseScale) this.pulseScale = 1.0;
                if (this.pulseScale > 1.0) {
                    this.pulseScale -= (this.pulseScale - 1.0) * 10.0 * dt; // Decay speed
                    if (this.pulseScale < 1.0) this.pulseScale = 1.0;
                }
                this.mesh.scale.set(this.pulseScale, this.pulseScale, this.pulseScale);

            }
        }


        // --- Input Handling ---

        function setupInputs() {
            // P1: Keyboard
            const keys = {};
            let mouseAttack = false;
            let mouseCharge = false;

            const initAudio = () => { SoundSystem.init(); window.removeEventListener('keydown', initAudio); window.removeEventListener('mousedown', initAudio); };

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                SoundSystem.init();
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            // 視窗失焦時清除所有按鍵（避免 Alt+Tab 後按鍵卡住導致誤觸蓄力）
            window.addEventListener('blur', () => {
                Object.keys(keys).forEach(k => keys[k] = false);
                mouseAttack = false;
                mouseCharge = false;
            });

            window.addEventListener('mousedown', (e) => {
                SoundSystem.init();
                if (e.button === 0) mouseAttack = true;
                if (e.button === 2) mouseCharge = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) mouseAttack = false;
                if (e.button === 2) mouseCharge = false;
            });
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gamepad Support
            window.addEventListener("gamepadconnected", (e) => {
                console.log("Gamepad connected at index %d: %s. %d buttons, %d axes.",
                    e.gamepad.index, e.gamepad.id,
                    e.gamepad.buttons.length, e.gamepad.axes.length);
            });

            // Polling function
            state.pollInputs = () => {
                // Poll Gamepads
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

                // 蓄力按鍵狀態永遠透傳給 updateBeam，由狀態機內部決定邏輯
                const canCharge = true;

                // --- P1 (Keyboard/Mouse) ---
                let vx = 0, vy = 0;
                if (keys['KeyW']) vy -= 1;
                if (keys['KeyS']) vy += 1;
                if (keys['KeyA']) vx -= 1;
                if (keys['KeyD']) vx += 1;
                state.input.p1.move.set(vx, vy).normalize();
                // P1 Attack: Mouse Left OR Key 1
                state.input.p1.attack = mouseAttack || keys['Digit1'];
                // Charge
                const p1RawCharge = mouseCharge || keys['ShiftLeft'];
                state.input.p1.charge = canCharge && p1RawCharge;

                // --- P2 (Gamepad 0) ---
                const gp2 = gamepads[0];
                if (gp2) {
                    const axisX = Math.abs(gp2.axes[0]) > 0.1 ? gp2.axes[0] : 0;
                    const axisY = Math.abs(gp2.axes[1]) > 0.1 ? gp2.axes[1] : 0;
                    state.input.p2.move.set(axisX, axisY);
                    if (state.input.p2.move.length() > 1) state.input.p2.move.normalize();

                    state.input.p2.attack = gp2.buttons[2].pressed; // West button (X/Square)
                    // Charge logic with cooldown check
                    const p2RawCharge = gp2.buttons[7].pressed; // RT/R2
                    state.input.p2.charge = canCharge && p2RawCharge;
                } else {
                    // Debug Keys Arrows
                    let vx2 = 0, vy2 = 0;
                    if (keys['ArrowUp']) vy2 -= 1;
                    if (keys['ArrowDown']) vy2 += 1;
                    if (keys['ArrowLeft']) vx2 -= 1;
                    if (keys['ArrowRight']) vx2 += 1;
                    state.input.p2.move.set(vx2, vy2).normalize();
                    state.input.p2.attack = keys['Enter'] || keys['Digit2']; // Fixed: Added Digit2
                    // Charge logic with cooldown check
                    const p2RawCharge = keys['ShiftRight'];
                    state.input.p2.charge = canCharge && p2RawCharge;
                }
                if (keys['Digit2']) state.input.p2.attack = true;

                // --- P3 (Gamepad 1) ---
                const gp3 = gamepads[1];
                state.input.p3.charge = false; // Default
                state.input.p3.attack = false; // Default
                if (gp3) {
                    const axisX = Math.abs(gp3.axes[0]) > 0.1 ? gp3.axes[0] : 0;
                    const axisY = Math.abs(gp3.axes[1]) > 0.1 ? gp3.axes[1] : 0;
                    state.input.p3.move.set(axisX, axisY);
                    state.input.p3.attack = gp3.buttons[2].pressed; // West
                    const p3RawCharge = gp3.buttons[7].pressed; // RT
                    state.input.p3.charge = canCharge && p3RawCharge;
                }
                if (keys['Digit3']) state.input.p3.attack = true;

                // --- P4 (Gamepad 2) ---
                const gp4 = gamepads[2];
                state.input.p4.charge = false; // Default
                state.input.p4.attack = false; // Default
                if (gp4) {
                    const axisX = Math.abs(gp4.axes[0]) > 0.1 ? gp4.axes[0] : 0;
                    const axisY = Math.abs(gp4.axes[1]) > 0.1 ? gp4.axes[1] : 0;
                    state.input.p4.move.set(axisX, axisY);
                    state.input.p4.attack = gp4.buttons[2].pressed; // West
                    const p4RawCharge = gp4.buttons[7].pressed; // RT
                    state.input.p4.charge = canCharge && p4RawCharge;
                }
                if (keys['Digit4']) state.input.p4.attack = true;
            };
        }

        // --- Bullet Management ---
        function updateBullets(dt) {
            // Move and Clean
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.update(dt);
                if (b.markedForDeletion) {
                    b.destroy();
                    state.bullets.splice(i, 1);
                }
            }
            // Merging Logic REMOVED (Replaced by Input-based Duo Shot)
        }

        // --- Main Loop ---

        const gidora = new Gidora();
        window.gidoraInstance = gidora; // Global ref for state.setMode
        gidora.updateVisibility(); // Init visibility

        document.getElementById('mode-toggle').addEventListener('click', () => {
            const newMode = state.mode === 'quad' ? 'duo' : 'quad';
            state.setMode(newMode);
        });

        // Spawner Toggle
        const spawnerBtn = document.getElementById('spawner-toggle');
        spawnerBtn.addEventListener('click', () => {
            state.spawnerEnabled = !state.spawnerEnabled;
            spawnerBtn.innerText = state.spawnerEnabled ? "Enemy Spawner: ON" : "Enemy Spawner: OFF";
            spawnerBtn.style.backgroundColor = state.spawnerEnabled ? "#aa4444" : "#44aa44";

            if (state.spawnerEnabled) {
                state.hpDecayEnabled = true; // 一旦開啟就持續倒扣，不因暫停而停止
            }
            if (!state.spawnerEnabled) {
                if (state.enemyManager) state.enemyManager.killAll();
            }
        });



        // Dummy Toggle (Moved to Info Container)
        const dummyBtn = document.createElement('button');
        dummyBtn.id = 'dummy-toggle';
        dummyBtn.innerText = 'Spawn Dummy';
        // Style to match others (and Color Brown)
        dummyBtn.style.marginTop = '10px';
        dummyBtn.style.marginLeft = '10px';
        dummyBtn.style.pointerEvents = 'auto';
        dummyBtn.style.backgroundColor = '#aa8844';
        dummyBtn.style.color = 'white';

        document.getElementById('info').appendChild(dummyBtn);

        dummyBtn.addEventListener('click', () => {
            if (state.enemyManager && window.gidoraInstance) {
                state.enemyManager.spawnDummy(window.gidoraInstance.mesh.position);
            }
        });

        // Initialize Systems
        state.levelManager = new LevelManager(scene);
        state.enemyManager = new EnemyManager(scene);

        setupInputs();

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - state.lastTime) / 1000, 0.1);
            state.lastTime = time;

            gidora.update(dt);

            // HP 緩慢倒扣（開啟Spawn後啟動，光束炮中3倍速）
            if (state.hpDecayEnabled && !gidora.isDead) {
                const decayRate = (state.beamPhase === 'firing')
                    ? CONFIG.stats.hpDecayRateBeam
                    : CONFIG.stats.hpDecayRate;
                gidora.hp = Math.max(0, gidora.hp - decayRate * dt);
                if (gidora.hp <= 0) gidora.isDead = true;
            }

            gidora.checkCollisions(state.bullets); // Player check logic

            state.pollInputs();
            // Update Systems
            if (state.levelManager) {
                state.levelManager.update(dt);
                state.levelManager.checkCollisions(state.bullets);
            }
            if (state.enemyManager) {
                state.enemyManager.update(dt, gidora.mesh.position);
                state.enemyManager.checkCollisions(state.bullets);
            }

            // Update Bullets
            updateBullets(dt);

            // Update Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (!p.update(dt)) {
                    state.particles.splice(i, 1);
                }
            }

            // Update FlyingCorpses（噴飛屍體）
            for (let i = state.flyingCorpses.length - 1; i >= 0; i--) {
                if (!state.flyingCorpses[i].update(dt)) {
                    state.flyingCorpses.splice(i, 1);
                }
            }

            // Update MeatChunks（落地肉塊）
            for (let i = state.meatChunks.length - 1; i >= 0; i--) {
                if (!state.meatChunks[i].update(dt)) {
                    state.meatChunks.splice(i, 1);
                }
            }



            // Debug Info
            document.getElementById('debug').innerHTML = `
                P1: Atk=${state.input.p1.attack} Chg=${state.input.p1.charge ? 'ON' : 'OFF'}<br>
                P2: Atk=${state.input.p2.attack} Chg=${state.input.p2.charge ? 'ON' : 'OFF'}<br>
                P3: Atk=${state.input.p3.attack} Chg=${state.input.p3.charge ? 'ON' : 'OFF'}<br>
                P4: Atk=${state.input.p4.attack} Chg=${state.input.p4.charge ? 'ON' : 'OFF'}<br>
                Beam: ${state.beamPhase} | Charge: ${(state.beamCharge).toFixed(1)} | Bullets: ${state.bullets.length}
            `;

            // 蓄力條 UI 更新
            const beamMaxUI = CONFIG.beam[state.mode].maxCharge;
            const pct = Math.min(100, (state.beamCharge / beamMaxUI) * 100);
            const barFill = document.getElementById('charge-bar-fill');
            const barWrap = document.getElementById('charge-bar-wrap');
            const chargeLabel = document.getElementById('charge-label');
            barFill.style.width = pct + '%';

            // CSS class 驅動特效
            barWrap.classList.toggle('beam-firing', state.beamPhase === 'firing');
            barWrap.classList.toggle('beam-prefire', state.beamPhase === 'prefire');

            // 發射中讓填充條顏色變白，後搖變暗
            if (state.beamPhase === 'firing') {
                barFill.style.background = 'linear-gradient(90deg,#cc00cc,#ff00ff,#ffffff)';
                chargeLabel.style.color = '#ffffff';
                chargeLabel.style.textShadow = '0 0 12px #ffffff, 0 0 24px #ff00ff';
            } else if (state.beamPhase === 'postfire') {
                barFill.style.background = 'linear-gradient(90deg,#440044,#880088,#cc00cc88)';
                chargeLabel.style.color = '#cc88cc';
                chargeLabel.style.textShadow = '0 0 6px #cc00cc';
            } else {
                barFill.style.background = 'linear-gradient(90deg,#660066,#cc00cc,#ff00ff,#ffffff88)';
                chargeLabel.style.color = '#ffffff';
                chargeLabel.style.textShadow = '0 0 8px #ff00ff, 0 0 16px #ff00ff88';
            }

            const phaseText = { idle: '⚡ 蓄力', prefire: '▶▶ 即將發射！', firing: '★ 光束炮發射中！', postfire: '◀◀ 冷卻中' };
            let labelSuffix = '';
            if (state.beamPhase === 'idle') labelSuffix = ` ${pct.toFixed(0)}%`;
            else if (state.beamPhase === 'firing') labelSuffix = ` ${Math.ceil(state.beamFiringTimer)}s`;
            chargeLabel.textContent = phaseText[state.beamPhase] + labelSuffix;

            // 左下角蓄力狀態指示器
            const players4 = ['p1', 'p2', 'p3', 'p4'];
            const activePlayers = state.mode === 'quad' ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2'];
            players4.forEach(p => {
                const el = document.getElementById('ci-' + p);
                if (!el) return;
                const isActive = activePlayers.includes(p);
                el.style.display = isActive ? 'flex' : 'none';
                if (!isActive) return;
                const pressing = state.input[p].charge;
                el.classList.toggle('pressing', pressing);
                el.querySelector('.ci-status').textContent = pressing ? '蓄力中 ⚡' : '未蓄力';
            });

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>

</html>
