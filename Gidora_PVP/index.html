<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gidora Prototype - Ultra (4P)</title>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '10px';
            div.style.left = '10px';
            div.style.color = 'red';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.padding = '20px';
            div.style.zIndex = '9999';
            div.innerHTML = `<h3>Error</h3><p>${msg}</p><p>${url}:${line}:${col}</p>`;
            document.body.appendChild(div);
            return false;
        };
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #202020;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            min-width: 190px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 15;
        }

        #info button {
            pointer-events: auto;
            color: white;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 5px;
            padding: 7px 10px;
            cursor: pointer;
            font-weight: 700;
        }

        /* 蓄力條樣式 — 移除 width transition 以避免「放開時跳到 0%」的視覺異常 */
        #charge-bar-fill,
        .charge-bar-fill {
            transition: none;
        }

        @keyframes beam-pulse {
            0%, 100% { box-shadow: 0 0 12px #ff00ff, 0 0 24px #ff00ff88 }
            50% { box-shadow: 0 0 22px #ff00ff, 0 0 44px #ff00ffcc }
        }

        @keyframes label-flash {
            0%, 100% { opacity: 1 }
            50% { opacity: 0.5 }
        }

        .beam-firing #charge-bar-fill,
        .beam-firing .charge-bar-fill { animation: beam-pulse 0.4s ease-in-out infinite; }
        .beam-prefire #charge-label,
        .beam-prefire .charge-label { animation: label-flash 0.25s ease-in-out infinite; color: #ffff00 !important; }
    </style>
</head>

<body>
    <div id="info">
        <button id="spawner-toggle"
            style="background-color: #44aa44;">Neutral Enemy Spawner: OFF</button>
    </div>

    <!-- 蓄力條 UI -->
    <div id="charge-bar-wrap"
        style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);width:360px;pointer-events:none;z-index:10;">
        <div id="charge-label"
            class="charge-label"
            style="text-align:center;color:white;font-size:13px;font-weight:bold;margin-bottom:5px;text-shadow:0 0 8px #ff00ff,0 0 16px #ff00ff88;letter-spacing:2px;">
            蓄力 0%</div>
        <div id="charge-bar-track"
            style="background:rgba(0,0,0,0.7);height:22px;border-radius:11px;overflow:hidden;border:1px solid rgba(255,0,255,0.5);box-shadow:0 0 8px rgba(255,0,255,0.3);">
            <div id="charge-bar-fill"
                class="charge-bar-fill"
                style="height:100%;width:0%;background:linear-gradient(90deg,#660066,#cc00cc,#ff00ff,#ffffff88);border-radius:11px;box-shadow:0 0 10px #ff00ff;">
            </div>
        </div>
    </div>

    <!--
        模組載入順序 (對應 Unity Script Execution Order)
        ----------------------------------------------------
        1. THREE.js       — 全域 THREE
        2. config.js      — CONFIG / state
        3. core.js        — Entity / Component / EventBus (Phase 3+ 才大量使用)
        4. audio.js       — SoundSystem
        5. bullet.js      — Bullet / Particle / FlyingCorpse / MeatChunk
        6. obstacles.js   — LevelManager (Phase 2 將擴充其他障礙物)
        7. enemies.js     — Enemy 基底 / 子類 / EnemyManager / DummyEnemy
        8. gidora.js      — Vine / Gidora 主類
        9. input.js       — setupInputs / state.pollInputs
        10. buffs.js      — Buff 系統 (Phase 3+)
        11. cpu.js        — PVE CPU input controller
        12. ui.js         — DOM HUD / 按鈕
        13. main.js       — 場景組裝 + animate 主迴圈
    -->
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/core.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/bullet.js"></script>
    <script src="js/obstacles.js"></script>
    <script src="js/enemies.js"></script>
    <script src="js/gidora.js"></script>
    <script src="js/input.js"></script>
    <script src="js/buffs.js"></script>
    <script src="js/cpu.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
