        class EnemyManager {
            constructor(scene) {
                this.scene = scene;
                this.enemies = [];
                this.spawnTimer = 0;
                this.bossDelayTimer = 0; // [New]
                this.bossSpawned = false;
            }

            update(dt, playerPos) {
                // Spawning
                if (state.spawnerEnabled) {

                    // Check Enemy Limit
                    if (this.enemies.length < CONFIG.enemy.maxEnemies) {
                        this.spawnTimer += dt;

                        // Determine Rate based on Mode
                        const currentRate = (state.mode === 'quad') ? CONFIG.enemy.spawnRateQuad : CONFIG.enemy.spawnRateDuo;

                        if (this.spawnTimer >= currentRate) {
                            this.spawnTimer = 0;
                            this.spawnEnemy(playerPos);
                        }
                    } else {
                        // Limit Reached: Pause Timer (Optional: Reset? User said "Stop Timing")
                        // If we just stop adding dt, it effectively pauses.
                    }

                    // [New] Spawn Boss after delay
                    if (!this.bossSpawned) {
                        this.bossDelayTimer += dt;
                        if (this.bossDelayTimer >= CONFIG.enemy.boss.spawnDelay) {
                            this.bossSpawned = true;

                            // Find Safe Spawn Position (Avoid Blocks)
                            let spawnPos = new THREE.Vector3(0, 1, -10); // Try center-ish
                            let safe = false;
                            let attempts = 0;

                            while (!safe && attempts < 10) {
                                let hitBlock = false;
                                if (state.levelManager) {
                                    state.levelManager.blocks.forEach(b => {
                                        if (hitBlock) return;
                                        const dx = Math.abs(b.mesh.position.x - spawnPos.x);
                                        const dz = Math.abs(b.mesh.position.z - spawnPos.z);
                                        if (dx < 4.0 && dz < 4.0) hitBlock = true;
                                    });
                                }

                                if (!hitBlock) {
                                    safe = true;
                                } else {
                                    // Retry random
                                    const angle = Math.random() * Math.PI * 2;
                                    const r = 5 + Math.random() * 15;
                                    spawnPos.set(Math.sin(angle) * r, 1, Math.cos(angle) * r);
                                    attempts++;
                                }
                            }

                            const boss = new TauntEnemy(this, spawnPos);
                            this.enemies.push(boss);
                        }
                    }
                }

                // [Old Boss Spawn removed from here]

                // Update Enemies
                this.enemies.forEach(e => e.update(dt, playerPos));
                this.enemies = this.enemies.filter(e => !e.isDead);
            }

            spawnEnemy(playerPos) {
                // Random position outside radius
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 10;
                const x = Math.sin(angle) * dist;
                const z = Math.cos(angle) * dist;
                const pos = new THREE.Vector3(x, 1, z); // Y=1

                // Weighted Random Spawn
                const weights = [
                    { type: 'melee', weight: CONFIG.enemy.melee.spawnWeight },
                    { type: 'ranged', weight: CONFIG.enemy.ranged.spawnWeight },
                    { type: 'ninja', weight: CONFIG.enemy.ninja.spawnWeight || 0 }
                ];

                const totalWeight = weights.reduce((sum, item) => sum + item.weight, 0);
                let randomVal = Math.random() * totalWeight;
                let selectedType = 'melee';

                for (let item of weights) {
                    if (randomVal < item.weight) {
                        selectedType = item.type;
                        break;
                    }
                    randomVal -= item.weight;
                }

                let enemy;
                if (selectedType === 'melee') enemy = new MeleeEnemy(this, pos);
                else if (selectedType === 'ranged') enemy = new RangedEnemy(this, pos);
                else if (selectedType === 'ninja') enemy = new NinjaEnemy(this, pos);

                if (enemy) this.enemies.push(enemy);
            }

            spawnDummy(playerPos) {
                // Spawn 10 units in front
                const fwd = new THREE.Vector3(0, 0, 1); // Default if playerPos undefined?
                // But we have playerPos passed? Yes.
                // Need Window.pteroInstance for true direction
                let spawnPos;
                if (window.pteroInstance) {
                    const dir = window.pteroInstance.getForwardVector().normalize();
                    spawnPos = window.pteroInstance.mesh.position.clone().add(dir.multiplyScalar(8));
                } else {
                    spawnPos = new THREE.Vector3(0, 1, -10);
                }
                spawnPos.y = 1;

                const dummy = new DummyEnemy(this, spawnPos);
                this.enemies.push(dummy);
            }

            killAll() {
                this.enemies.forEach(e => e.die());
                this.enemies = [];
            }

            checkCollisions(bullets) {
                const box = new THREE.Box3();
                bullets.forEach(b => {
                    if (b.markedForDeletion || b.isEnemy) return; // Player bullets only
                    if (b.damage <= 0) return;

                    for (let e of this.enemies) {
                        if (e.isDead) continue;

                        // 2D Check (XZ Plane only for reliability)
                        // Bullet Radius ~ 0.2-0.6, Enemy Radius ~ 0.5 (box is 0.8 width)
                        // Let's use simple distance check
                        const distSq = (e.mesh.position.x - b.mesh.position.x) ** 2 + (e.mesh.position.z - b.mesh.position.z) ** 2;
                        const hitDist = 1.0 + b.size; // Generous hitbox

                        if (distSq < hitDist * hitDist) {

                            if (b.hitEntities.has(e.mesh.uuid)) continue;
                            b.hitEntities.add(e.mesh.uuid);

                            e.takeDamage(b.damage, b.mesh.position, b.knockback); // Pass knockback

                            // Penetration Logic
                            b.penetration--;
                            if (b.penetration < 0) {
                                b.markedForDeletion = true;
                            }

                            break;
                        }
                    }
                });
            }
        }

        class Ptero {
            constructor() {
                this.mesh = new THREE.Group();
                this.velocity = new THREE.Vector3();
                this.hp = CONFIG.stats.playerHP;
                this.maxHP = CONFIG.stats.playerHP;
                this.isDead = false;
                this.damageFlashTimer = 0;

                // UI
                this.hpBar = new HealthBar(scene, 4.5, 2.0, 0.2);

                // Combat State
                this.cooldowns = { p1: 0, p2: 0, p3: 0, p4: 0 };
                this.wingStates = {
                    p1: { currentAngle: 0, targetAngle: 0, swinging: false, timer: 0 },
                    p2: { currentAngle: 0, targetAngle: 0, swinging: false, timer: 0 },
                    p3: { currentAngle: 0, targetAngle: 0, swinging: false, timer: 0 },
                    p4: { currentAngle: 0, targetAngle: 0, swinging: false, timer: 0 }
                };

                // Combo State
                this.comboState = 'idle';
                this.comboTimer = 0;
                this.comboTargetPos = new THREE.Vector3();
                this.dropVelocity = 0;

                // Wind & Flight State
                this.windPower = 0;
                this.isFlying = false;
                this.flightHeight = CONFIG.flight.heightGround;

                // Propulsion State (Stackable Array)
                this.propulsions = []; // Array of { timer, duration, totalDist, dir, lastEaseVal }

                this.buildModel();
                this.buildIndicators();
                this.buildShadow(); // [New]

                scene.add(this.mesh);
            }

            buildShadow() {
                const shadowGeo = new THREE.CircleGeometry(0.8, 16);
                const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
                this.shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadowMesh.rotation.x = -Math.PI / 2;
                this.shadowMesh.position.y = 0.02; // Ground bias
                scene.add(this.shadowMesh);
            }

            getStats() {
                return this.isFlying ? { combat: CONFIG.combat.duo.flight, movement: CONFIG.movement.flight } : { combat: CONFIG.combat.duo, movement: CONFIG.movement.ground }; // Assuming Duo for now as base, or check mode
            }

            getCombatStats() {
                const base = (state.mode === 'quad') ? CONFIG.combat.quad : CONFIG.combat.duo;
                return this.isFlying ? base.flight : base;
            }

            getMovementStats() {
                return this.isFlying ? CONFIG.movement.flight : CONFIG.movement.ground;
            }

            takeDamage(amount) {
                if (this.isDead) return;
                if (this.isFlying) return; // Invincible during flight

                this.hp -= amount;
                this.damageFlashTimer = 0.2;
                if (this.hp <= 0) this.die();
            }

            die() {
                this.isDead = true;
                alert("GAME OVER");
                location.reload();
            }

            checkCollisions(bullets) {
                if (this.isDead) return;
                // Hit by Enemy Bullets
                const pPos = this.mesh.position;
                bullets.forEach(b => {
                    if (b.markedForDeletion || !b.isEnemy) return;
                    if (b.mesh.position.distanceTo(pPos) < 1.0) {
                        b.markedForDeletion = true;
                        this.takeDamage(b.damage);
                    }
                });
            }

            buildModel() {
                this.mesh.children.forEach(c => this.mesh.remove(c));

                // Body (Dragon-like)
                const bodyGeo = new THREE.ConeGeometry(0.8, 2.5, 8); // Long body
                // Rotate Geo to point +Z? Cone points +Y. +Z is forward.
                // Rotate X -PI/2 points it +Z.
                bodyGeo.rotateX(-Math.PI / 2);

                const bodyMat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.body });
                this.body = new THREE.Mesh(bodyGeo, bodyMat);
                this.body.position.y = 1.0;
                this.body.castShadow = true;
                this.mesh.add(this.body);

                // Head
                const headGeo = new THREE.BoxGeometry(0.7, 0.7, 1.0);
                const headMat = new THREE.MeshLambertMaterial({ color: CONFIG.visuals.colors.head });
                this.head = new THREE.Mesh(headGeo, headMat);
                this.head.position.set(0, 1.25, 1.2); // Front of body
                this.mesh.add(this.head);

                // Wings
                this.wings = {};
                // Helper
                const createWing = (id, color, x, z, angle) => {
                    const pivot = new THREE.Group();
                    pivot.position.set(x, 1.0, z);
                    pivot.rotation.y = angle;

                    // Simple Box Wing
                    const wGeo = new THREE.BoxGeometry(2.5, 0.1, 1.0);
                    // Shift center so it rotates from edge (Pivot at 0, wing extends +X)
                    wGeo.translate(1.25, 0, 0);

                    const wMat = new THREE.MeshLambertMaterial({ color: color });
                    const wMesh = new THREE.Mesh(wGeo, wMat);
                    wMesh.castShadow = true;

                    pivot.add(wMesh);
                    this.mesh.add(pivot);
                    this.wings[id] = { pivot: pivot, mesh: wMesh, baseAngle: angle };
                };

                // Create all wings (positions refined later in updateVisibility)
                createWing('p1', CONFIG.visuals.colors.p1, 0, 0, 0);
                createWing('p2', CONFIG.visuals.colors.p2, 0, 0, 0);
                createWing('p3', CONFIG.visuals.colors.p3, 0, 0, 0);
                createWing('p4', CONFIG.visuals.colors.p4, 0, 0, 0);

                // Combo Indicator (Ground Ring)
                this.comboRing = new THREE.Mesh(
                    new THREE.RingGeometry(1, 1.2, 32),
                    new THREE.MeshBasicMaterial({ color: 0xff0000, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
                );
                this.comboRing.rotation.x = -Math.PI / 2;
                this.comboRing.visible = false;
                scene.add(this.comboRing);
            }

            buildIndicators() {
                this.arrows = {};
                const arrowShape = new THREE.Shape();
                arrowShape.moveTo(0, 0);
                arrowShape.lineTo(-0.4, -0.6);
                arrowShape.lineTo(0, 1.0);
                arrowShape.lineTo(0.4, -0.6);
                arrowShape.lineTo(0, 0);

                const arrowGeo = new THREE.ShapeGeometry(arrowShape);
                arrowGeo.rotateX(-Math.PI / 2); // Lay flat on ground

                ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                    const mat = new THREE.MeshBasicMaterial({ color: CONFIG.visuals.colors[p], side: THREE.DoubleSide });
                    const mesh = new THREE.Mesh(arrowGeo, mat);
                    mesh.visible = false;

                    // Wrapper to match previous interface
                    const wrapper = {
                        mesh: mesh,
                        visible: false,
                        position: mesh.position, // Direct ref
                        set visible(v) { this.mesh.visible = v; },
                        setDirection: (dir) => {
                            // Dir is Vector3(x, 0, z)
                            const angle = Math.atan2(dir.x, dir.z);
                            this.mesh.rotation.y = angle;
                        }
                    };

                    scene.add(mesh);
                    this.arrows[p] = wrapper;
                });
            }

            getForwardVector() {
                const forward = new THREE.Vector3(0, 0, 1);
                forward.applyQuaternion(this.mesh.quaternion);
                return forward;
            }

            updateVisibility() {
                const isQuad = state.mode === 'quad';
                const dist = CONFIG.visuals.wings.distance;
                const height = CONFIG.visuals.wings.height;

                // Reset Wings
                ['p3', 'p4'].forEach(p => this.wings[p].pivot.visible = isQuad);

                // Position logic
                if (!isQuad) {
                    // 2P: P1 Left (-X), P2 Right (+X)
                    this.wings['p1'].pivot.position.set(-dist, height, 0);
                    this.wings['p1'].baseAngle = Math.PI;
                    this.wings['p1'].pivot.rotation.y = Math.PI;

                    this.wings['p2'].pivot.position.set(dist, height, 0);
                    this.wings['p2'].baseAngle = 0;
                    this.wings['p2'].pivot.rotation.y = 0;
                } else {
                    // 4P: X Shape
                    const d = dist * 0.707; // 45 degree components

                    this.wings['p1'].pivot.position.set(-d, height, d);
                    this.wings['p1'].baseAngle = Math.PI - Math.PI / 4;
                    this.wings['p1'].pivot.rotation.y = this.wings['p1'].baseAngle;

                    this.wings['p2'].pivot.position.set(d, height, d);
                    this.wings['p2'].baseAngle = Math.PI / 4;
                    this.wings['p2'].pivot.rotation.y = this.wings['p2'].baseAngle;

                    this.wings['p3'].pivot.position.set(-d, height, -d);
                    this.wings['p3'].baseAngle = Math.PI + Math.PI / 4;
                    this.wings['p3'].pivot.rotation.y = this.wings['p3'].baseAngle;

                    this.wings['p4'].pivot.position.set(d, height, -d);
                    this.wings['p4'].baseAngle = -Math.PI / 4;
                    this.wings['p4'].pivot.rotation.y = this.wings['p4'].baseAngle;
                }
            }

            performWingAttack(p) {
                const wState = this.wingStates[p];
                if (wState.swinging) return;

                wState.swinging = true;
                wState.timer = 0;

                wState.swinging = true;
                wState.timer = 0;

                const stats = this.getCombatStats();
                const range = stats.range;
                const angleDeg = stats.angle;
                const damage = stats.damage;
                const angleRad = angleDeg * Math.PI / 180;

                // 1. Visual Indicator (Sector)
                // Spawn a temporary mesh for the attack area
                const sectorGeo = new THREE.RingGeometry(0.5, range, 32, 1, -angleRad / 2, angleRad);
                // Rotate to lie flat (X=-PI/2) and then align with wing
                sectorGeo.rotateX(-Math.PI / 2);

                const color = CONFIG.visuals.colors[p];
                const sectorMat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4, side: THREE.DoubleSide });
                const sectorMesh = new THREE.Mesh(sectorGeo, sectorMat);

                // Align to player + wing offset
                sectorMesh.position.copy(this.mesh.position);
                sectorMesh.position.y = 0.5 + (Math.random() * 0.1); // Random fix for Z-fighting
                // Rotation: Player Rotation + Wing Base Angle
                sectorMesh.rotation.y = this.mesh.rotation.y + this.wings[p].baseAngle;

                scene.add(sectorMesh);

                // Fade out and remove
                state.particles.push({
                    life: 0.3, maxLife: 0.3,
                    mesh: sectorMesh,
                    update: function (dt) {
                        this.life -= dt;
                        if (this.life <= 0) {
                            scene.remove(this.mesh);
                            this.mesh.geometry.dispose();
                            this.mesh.material.dispose();
                            return false;
                        }
                        this.mesh.material.opacity = (this.life / this.maxLife) * 0.4;
                        return true;
                    }
                });


                // 2. Damage Logic
                const wingDir = new THREE.Vector3(1, 0, 0); // Local wing forward (X+)
                // Apply ONLY Wing Angle first to get "Center" of swing sector
                // Actually the current BaseAngle points to "Center" of the wing?
                // Yes, updateVisibility sets rotation to baseAngle.
                // So (1,0,0) rotated by baseAngle is the centerline of the wing.
                wingDir.applyAxisAngle(new THREE.Vector3(0, 1, 0), this.mesh.rotation.y + this.wings[p].baseAngle);

                // Enemies
                if (state.enemyManager) {
                    state.enemyManager.enemies.forEach(e => {
                        if (e.isDead) return;

                        // Distance Check
                        const dx = e.mesh.position.x - this.mesh.position.x;
                        const dz = e.mesh.position.z - this.mesh.position.z;
                        const distSq = dx * dx + dz * dz;

                        if (distSq < range * range) {
                            // Angle Check
                            const toEnemy = new THREE.Vector3(dx, 0, dz).normalize();
                            const dot = toEnemy.dot(wingDir);
                            // Dot threshold: cos(half_angle)
                            const threshold = Math.cos(angleRad / 2);

                            if (dot > threshold) {
                                e.takeDamage(damage);
                                // Knockback
                                const kb = CONFIG.combat.knockbackBase;
                                e.mesh.position.add(toEnemy.multiplyScalar(kb)); // Small push
                                e.knockbackVel.add(toEnemy.multiplyScalar(kb * 5.0)); // Vel push
                            }
                        }
                    });

                    // [New] Gain Wind Power on successful attack (at least one hit? Or per hit? Let's do ONCE per swing if hit anything? Or per swing?
                    // Request: "When any player attacks, just like flapping wings, helps character gain wind power."
                    // -> So simply ATTACKING gives wind.
                    this.windPower = Math.min(CONFIG.wind.max, this.windPower + CONFIG.wind.gainPerAttack);

                    // [New] Propulsion (Self Knockback)
                    // Move opposite to wingSwing direction? Or Player Forward?
                    // Request: "Normal attack pushes character in opposite direction of wing flap"
                    // Wing Flap Direction:
                    // If P1 (Left), Flap is Outwards? Or Forward?
                    // Base Angle: P1=PI (Back/Left?).
                    // Let's use the Sector Center Direction `wingDir` calculated above.
                    // Propulsion = -wingDir
                    const propDir = wingDir.clone().negate();

                    // OutCubic Easing Setup
                    const pConfig = this.isFlying ? CONFIG.combat.propulsion.flight : CONFIG.combat.propulsion.ground;

                    if (pConfig.force > 0) {
                        // Push new propulsion instance
                        this.propulsions.push({
                            timer: 0,
                            duration: pConfig.duration,
                            totalDist: pConfig.force,
                            dir: propDir,
                            lastEaseVal: 0
                        });
                    }
                }

                // Level Blocks
                if (state.levelManager) {
                    state.levelManager.blocks.forEach(b => {
                        if (b.isDead) return;
                        const dx = b.mesh.position.x - this.mesh.position.x;
                        const dz = b.mesh.position.z - this.mesh.position.z;
                        const distSq = dx * dx + dz * dz;

                        if (distSq < (range + 1.0) * (range + 1.0)) { // Slightly larger check for blocks
                            const toBlock = new THREE.Vector3(dx, 0, dz).normalize();
                            const dot = toBlock.dot(wingDir);
                            const threshold = Math.cos(angleRad / 2); // Same angle check

                            if (dot > threshold) {
                                b.hp -= damage;
                                b.flashTimer = 0.1;
                                if (b.hp <= 0) {
                                    b.isDead = true;
                                    scene.remove(b.mesh);
                                }
                            }
                        }
                    });
                }
            }

            activateCombo() {
                state.comboActive = true;
                this.comboState = 'precast';
                this.comboTimer = CONFIG.combo.preCastDelay;

                this.comboTargetPos.copy(this.mesh.position);
                this.comboTargetPos.y = 0.1;

                const config = CONFIG.combo[state.mode];
                const r = config.radius;

                this.comboRing.geometry.dispose();
                this.comboRing.geometry = new THREE.RingGeometry(r - 0.5, r, 32);
                this.comboRing.visible = true;
                this.comboRing.position.copy(this.comboTargetPos);
                this.comboRing.material.opacity = 1.0;

                // Combo Timer Ring (Visual Countdown)
                if (!this.comboTimerRing) {
                    this.comboTimerRing = new THREE.Mesh(
                        new THREE.RingGeometry(0.5, 1.0, 32),
                        new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.8, side: THREE.DoubleSide })
                    );
                    this.comboTimerRing.rotation.x = -Math.PI / 2;
                    scene.add(this.comboTimerRing);
                }
                this.comboTimerRing.geometry.dispose();
                this.comboTimerRing.geometry = new THREE.RingGeometry(r - 0.5, r, 32); // Start at full size
                this.comboTimerRing.visible = true;
                this.comboTimerRing.position.copy(this.comboTargetPos);
                this.comboTimerRing.position.y = 0.15; // Slightly above main ring
                this.comboTimerRing.scale.set(1, 1, 1);
            }

            update(dt) {
                // Wind Decay logic
                if (this.windPower > 0) {
                    this.windPower -= CONFIG.wind.decayRate * dt;
                    if (this.windPower < 0) this.windPower = 0;
                }

                // Flight Check
                if (this.windPower > CONFIG.wind.threshold) {
                    this.isFlying = true;
                } else {
                    this.isFlying = false;
                }

                // Visual Height Smoothing
                // [Fix] Only apply visual height smoothing if NOT in combo (Combo controls Y/height manually)
                if (!state.comboActive) {
                    const targetH = this.isFlying ? CONFIG.flight.height : CONFIG.flight.heightGround;
                    this.flightHeight = THREE.MathUtils.lerp(this.flightHeight, targetH, dt * CONFIG.flight.smoothSpeed);
                    this.mesh.position.y = this.flightHeight;
                }

                // Shadow Update
                if (this.shadowMesh) {
                    this.shadowMesh.position.set(this.mesh.position.x, 0.02, this.mesh.position.z);
                    // Fade shadow when high?
                    const hRatio = 1.0 - Math.min(1.0, (this.mesh.position.y - 1.0) / 20.0); // Use actual mesh Y
                    this.shadowMesh.scale.setScalar(1.0 * hRatio + 0.5); // Shrink slightly
                    this.shadowMesh.material.opacity = 0.5 * hRatio;
                }



                // Eased Propulsion Update (Stackable)
                if (this.propulsions.length > 0) {
                    // Iterate backwards to allow removal
                    for (let i = this.propulsions.length - 1; i >= 0; i--) {
                        const p = this.propulsions[i];
                        p.timer += dt;
                        const t = Math.min(1.0, p.timer / p.duration);

                        // OutCubic: 1 - pow(1 - x, 3)
                        const ease = 1 - Math.pow(1 - t, 3);

                        const deltaEase = ease - p.lastEaseVal;
                        p.lastEaseVal = ease;

                        const moveStep = p.totalDist * deltaEase;
                        this.mesh.position.add(p.dir.clone().multiplyScalar(moveStep));

                        if (t >= 1.0) {
                            this.propulsions.splice(i, 1);
                        }
                    }
                }
                // UI Update - Wind
                const windBar = document.getElementById('wind-bar');
                const windText = document.getElementById('wind-text');
                if (windBar) {
                    windBar.style.width = (this.windPower / CONFIG.wind.max * 100) + '%';
                    windText.innerText = `WIND: ${Math.floor(this.windPower)}`;

                    // Dynamic Threshold Marker Position & Zone Background
                    const marker = document.getElementById('wind-marker');
                    const container = document.getElementById('wind-container-central');

                    if (marker && container) {
                        const pct = (CONFIG.wind.threshold / CONFIG.wind.max) * 100;
                        marker.style.left = `${pct}%`;

                        // Dynamic Background Zone: Dark before threshold, Gold-tint after
                        // linear-gradient(90deg, dark X%, gold X%)
                        container.style.background = `linear-gradient(90deg, rgba(0,0,0,0.6) ${pct}%, rgba(100,80,0,0.5) ${pct}%)`;
                    }

                    // Color Indication for Threshold
                    if (this.windPower > CONFIG.wind.threshold) {
                        windBar.style.background = 'linear-gradient(90deg, #ddffaa, #ffff00)'; // Gold/Yellow indicating Flight
                    } else {
                        windBar.style.background = 'linear-gradient(90deg, #88ccff, #ffffff)';
                    }
                }

                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Damage Flash
                if (this.damageFlashTimer > 0) {
                    this.damageFlashTimer -= dt;
                    if (this.damageFlashTimer <= 0) {
                        this.body.material.color.setHex(CONFIG.visuals.colors.body);
                        this.head.material.color.setHex(CONFIG.visuals.colors.head);
                    } else {
                        // Flash White if Invincible/Flight? No, Flash logic is for damage taken. 
                        // If Flying, no damage taken, so no flash.
                        this.body.material.color.setHex(0xff0000);
                        this.head.material.color.setHex(0xff0000);
                    }
                }

                // --- Wings Animation (Configurable Speed) ---
                ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                    const ws = this.wingStates[p];
                    if (ws.swinging) {
                        ws.timer += dt;
                        const duration = CONFIG.combat.swingSpeed; // Use config
                        if (ws.timer > duration) {
                            ws.swinging = false;
                            ws.currentAngle = 0;
                        } else {
                            const progress = ws.timer / duration;
                            // Simple Swing: 0 -> Max -> 0
                            // Or Sweep? User said "Swing". 
                            // Using sine wave for smooth back/forth or kick?
                            // Let's do a sharp strike.
                            const kick = Math.sin(progress * Math.PI) * (Math.PI / 3);
                            ws.currentAngle = kick;
                        }
                    } else {
                        ws.currentAngle = 0;
                    }
                    if (this.wings[p] && this.wings[p].pivot) {
                        this.wings[p].pivot.rotation.y = this.wings[p].baseAngle + ws.currentAngle;
                    }
                });

                // --- Rainbow Wings on Charge ---
                ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                    if (state.input[p].charge) {
                        const time = Date.now() * 0.002;
                        const hue = (time + (p === 'p1' ? 0 : 0.25)) % 1.0;
                        const color = new THREE.Color().setHSL(hue, 1.0, 0.5);
                        if (this.wings[p]) this.wings[p].mesh.material.color.copy(color);
                    } else {
                        // Restore original color
                        if (this.wings[p]) this.wings[p].mesh.material.color.setHex(CONFIG.visuals.colors.wing); // Uniform Wing Color
                        // Wait, originally wings had player colors in P1/P2 mode?
                        // In buildModel I used CONFIG.visuals.colors.p1 etc for wing MAT.
                        // But 'colors.wing' is defined as Gold.
                        // Let's replicate what buildModel did: use p1/p2 colors.
                        const baseCol = CONFIG.visuals.colors[p] || CONFIG.visuals.colors.wing;
                        if (this.wings[p]) this.wings[p].mesh.material.color.setHex(baseCol);
                    }
                });

                // --- Input Handling (Attacks) ---
                if (!state.comboActive) {
                    ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                        // Input Filter for Attack (Duo Mode)
                        if (state.mode === 'duo' && (p === 'p3' || p === 'p4')) return;

                        if (this.cooldowns[p] > 0) this.cooldowns[p] -= dt;

                        if (state.input[p].attack && this.cooldowns[p] <= 0) {
                            this.performWingAttack(p);
                            this.cooldowns[p] = CONFIG.combat.cooldown;
                        }
                    });
                }

                // --- Combo Logic ---
                if (state.comboActive) {
                    if (this.comboState === 'precast') {
                        this.comboTimer -= dt;

                        // Control Circle
                        let moveVec = new THREE.Vector3();
                        ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                            // Input Filter
                            if (state.mode === 'duo' && (p === 'p3' || p === 'p4')) {
                                this.arrows[p].visible = false;
                                return;
                            }

                            const inp = state.input[p].move;
                            moveVec.x += inp.x;
                            moveVec.z += inp.y;

                            // Show Arrows on Ring Perimeter
                            if (inp.lengthSq() > 0.01) {
                                this.arrows[p].visible = true;
                                const dir = new THREE.Vector3(inp.x, 0, inp.y).normalize();
                                const r = CONFIG.combo[state.mode].radius;

                                // Position on perimeter: Center + Dir * Radius
                                const perimeterPos = this.comboTargetPos.clone().add(dir.clone().multiplyScalar(r));
                                this.arrows[p].position.copy(perimeterPos);
                                this.arrows[p].position.y = 0.2; // Slightly above ring

                                // Point OUTWARD? or Direction of input?
                                // User said "arrow should display player input". Usually means direction they are pushing.
                                // If pushing RIGHT, arrow points RIGHT.
                                // Fix Mirroring: Previous logic might have been opposite.
                                const lookDir = dir.clone(); // If opposite, use .negate()
                                // The User reported it's opposite. So we FLIP it.
                                lookDir.negate();

                                this.arrows[p].mesh.lookAt(this.arrows[p].position.clone().add(lookDir));
                            } else {
                                this.arrows[p].visible = false;
                            }
                        });

                        // Update Timer Ring
                        // Update Timer Ring
                        if (this.comboTimerRing) {
                            const progress = Math.max(0, 1.0 - (this.comboTimer / CONFIG.combo.preCastDelay));
                            this.comboTimerRing.scale.set(progress, progress, progress);
                            this.comboTimerRing.position.copy(this.comboTargetPos);
                            this.comboTimerRing.position.y = 0.15;
                        }

                        if (moveVec.lengthSq() > 0.1) {
                            moveVec.normalize().multiplyScalar(10 * dt); // Circle Speed
                            this.comboTargetPos.add(moveVec);
                        }
                        this.comboRing.position.copy(this.comboTargetPos);

                        // Camera follows Circle (Steeper)
                        camera.position.x = THREE.MathUtils.lerp(camera.position.x, this.comboTargetPos.x, dt * 1.5); // Slower camera (5 -> 1.5)
                        camera.position.z = THREE.MathUtils.lerp(camera.position.z, this.comboTargetPos.z + 12, dt * 1.5);
                        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 25, dt * 1.5);
                        camera.lookAt(this.comboTargetPos);

                        const s = 1.0 + Math.sin(Date.now() * 0.01) * 0.1;
                        this.comboRing.scale.set(s, s, s);

                        if (this.comboTimer <= 0) {
                            this.comboState = 'fly';
                            this.comboTimer = 1.0;
                        }
                    } else if (this.comboState === 'fly') {
                        this.comboTimer -= dt;
                        this.mesh.position.y += CONFIG.combo.flySpeed * dt;

                        // Camera stays on Target (Steeper)
                        camera.position.x = THREE.MathUtils.lerp(camera.position.x, this.comboTargetPos.x, dt * 1.5);
                        camera.position.z = THREE.MathUtils.lerp(camera.position.z, this.comboTargetPos.z + 12, dt * 1.5);
                        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 25, dt * 1.5);
                        camera.lookAt(this.comboTargetPos);

                        if (this.comboTimer <= 0) {
                            this.comboState = 'drop';
                            this.mesh.position.x = this.comboTargetPos.x;
                            this.mesh.position.z = this.comboTargetPos.z;
                            this.mesh.position.y = CONFIG.combo.flyHeight;
                            this.dropVelocity = 0;
                        }
                    } else if (this.comboState === 'drop') {
                        this.dropVelocity += CONFIG.combo.dropSpeed * dt;
                        this.mesh.position.y -= this.dropVelocity * dt;

                        // Camera STILL stays on Target (waiting for impact)
                        camera.position.x = THREE.MathUtils.lerp(camera.position.x, this.comboTargetPos.x, dt * 1.5);
                        camera.position.z = THREE.MathUtils.lerp(camera.position.z, this.comboTargetPos.z + 12, dt * 1.5);
                        camera.position.y = THREE.MathUtils.lerp(camera.position.y, 25, dt * 1.5);
                        camera.lookAt(this.comboTargetPos);

                        if (this.mesh.position.y <= 0) {
                            this.mesh.position.y = 0;
                            // Impact Effect
                            // Scale with radius
                            const config = CONFIG.combo[state.mode];
                            const r = config.radius;

                            // Ring shockwave
                            const waveGeo = new THREE.RingGeometry(0.5, r, 32);
                            waveGeo.rotateX(-Math.PI / 2);
                            const wave = new THREE.Mesh(waveGeo, new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.8, side: THREE.DoubleSide }));
                            wave.position.copy(this.mesh.position);
                            wave.position.y = 0.1;
                            scene.add(wave);

                            state.particles.push({
                                life: 0.5, maxLife: 0.5, mesh: wave,
                                update: function (dt) {
                                    this.life -= dt;
                                    if (this.life <= 0) { scene.remove(this.mesh); this.mesh.geometry.dispose(); return false; }
                                    this.mesh.material.opacity = (this.life / this.maxLife);
                                    this.mesh.scale.multiplyScalar(1.0 + dt * 2);
                                    return true;
                                }
                            });

                            // Simple Particles
                            for (let i = 0; i < 30; i++) {
                                state.particles.push({
                                    life: 0.5, maxLife: 0.5,
                                    mesh: new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: 0xffaa00 })),
                                    vel: new THREE.Vector3((Math.random() - 0.5) * 10, Math.random() * 10, (Math.random() - 0.5) * 10),
                                    update: function (dt) {
                                        this.life -= dt;
                                        if (this.life <= 0) { scene.remove(this.mesh); return false; }
                                        this.mesh.position.add(this.vel.clone().multiplyScalar(dt));
                                        return true;
                                    }
                                });
                                scene.add(state.particles[state.particles.length - 1].mesh);
                                state.particles[state.particles.length - 1].mesh.position.copy(this.mesh.position);
                            }

                            this.comboState = 'idle';
                            state.comboActive = false;
                            state.pulse = 0;
                            state.pulseValue = 0;
                            state.comboCooldown = state.comboCooldownMax;
                            this.comboRing.visible = false;

                            this.comboRing.visible = false;
                            if (this.comboTimerRing) this.comboTimerRing.visible = false;

                            const comboConfig = CONFIG.combo[state.mode];
                            if (state.enemyManager) {
                                state.enemyManager.enemies.forEach(e => {
                                    if (e.isDead) return;
                                    // 3D Distance check for aerial enemies? Or Cylinder check?
                                    // Use Cylinder (XZ distance only)
                                    const dx = e.mesh.position.x - this.mesh.position.x;
                                    const dz = e.mesh.position.z - this.mesh.position.z;
                                    const dist = Math.sqrt(dx * dx + dz * dz);

                                    if (dist <= comboConfig.radius) {
                                        e.takeDamage(comboConfig.damage);
                                    }
                                });
                            }
                            if (state.levelManager) {
                                state.levelManager.blocks.forEach(b => {
                                    const dist = b.mesh.position.distanceTo(this.mesh.position);
                                    if (dist < comboConfig.radius + 2) {
                                        b.hp -= comboConfig.damage;
                                        b.flashTimer = 0.1;
                                        if (b.hp <= 0) {
                                            b.isDead = true;
                                            scene.remove(b.mesh);
                                        }
                                    }
                                });
                            }
                        }
                    }
                } else {
                    // --- Normal Movement (Velocity Based) ---
                    let totalInput = new THREE.Vector3();
                    let totalRotationInput = new THREE.Vector3();

                    ['p1', 'p2', 'p3', 'p4'].forEach(p => {
                        // Input Filtering for Duo Mode
                        if (state.mode === 'duo' && (p === 'p3' || p === 'p4')) return;

                        const m = state.input[p].move;
                        const isCharging = state.input[p].charge;
                        // const isAttacking = this.wingStates[p].swinging; // Old check
                        const ws = this.wingStates[p];
                        // Lock movement if swinging AND within lock duration
                        // We use ws.timer which counts up from 0 during swing.
                        const isLocked = ws.swinging && (ws.timer < CONFIG.combat.movementLockDuration);

                        // Disable movement input if charging OR locked
                        if (isCharging || isLocked) return;

                        if (m.lengthSq() > 0.01) {
                            const v = new THREE.Vector3(m.x, 0, m.y);
                            totalInput.add(v);
                            totalRotationInput.add(v);

                            this.arrows[p].visible = true;
                            // Push arrow out from center
                            const vNorm = v.clone().normalize();
                            const arrowPos = this.mesh.position.clone().add(vNorm.multiplyScalar(CONFIG.visuals.arrowDist));
                            this.arrows[p].position.copy(arrowPos);

                            // Use lookAt for correct rotation (Fix "North" issue)
                            // Point arrow in direction of movement
                            this.arrows[p].mesh.lookAt(this.arrows[p].position.clone().add(vNorm.negate()));
                        } else {
                            this.arrows[p].visible = false;
                        }
                    });

                    // --- Physics Update ---
                    const moveStats = this.getMovementStats();

                    // 1. Calculate Target Velocity from Input
                    // If multiple players press, length might be > 1. Normalize if needed? 
                    // Let's allowing summing for Co-op speed boost idea (later), but for now Clamp to 1.0 magnitude for direction?
                    // Actually if 2 players push, speed is separate.
                    // Standard: Normalize direction, then apply maxSpeed.
                    let targetVelocity = new THREE.Vector3();
                    if (totalInput.lengthSq() > 0.1) {
                        totalInput.normalize(); // Direction
                        targetVelocity.copy(totalInput).multiplyScalar(moveStats.maxSpeed);
                    }

                    // 2. Acceleration / Friction
                    // We need a persistent velocity for movement. 
                    // We have `this.velocity` but it was used for slide/propulsion hack.
                    // Let's use `this.moveVelocity` to separate from propulsion or external forces if needed.
                    // actually `this.velocity` is fine if we manage it well. 
                    // But `this.velocity` is currently 0 in constructor and added to for propulsion.
                    // Let's use `this.moveVelocity` for player control.
                    if (!this.moveVelocity) this.moveVelocity = new THREE.Vector3();

                    const currentVel = this.moveVelocity;
                    const diff = targetVelocity.clone().sub(currentVel);

                    if (totalInput.lengthSq() > 0.1) {
                        // Accelerating towards target
                        // v = v + a * dt
                        // We want to move towards targetVelocity.
                        // Clamp change to acceleration * dt
                        const maxChange = moveStats.acceleration * dt;
                        if (diff.lengthSq() > maxChange * maxChange) {
                            diff.normalize().multiplyScalar(maxChange);
                        }
                        currentVel.add(diff);
                    } else {
                        // Decelerating (Friction)
                        // v = v - friction * dt * dir
                        const speed = currentVel.length();
                        if (speed > 0.01) {
                            const drop = moveStats.friction * dt;
                            // Don't reverse direction
                            let newSpeed = speed - drop;
                            if (newSpeed < 0) newSpeed = 0;
                            currentVel.normalize().multiplyScalar(newSpeed);
                        } else {
                            currentVel.set(0, 0, 0);
                        }
                    }

                    // 3. Apply Velocity to Position
                    // Combine Player Control + Slide/Propulsion
                    const combinedVel = currentVel.clone();

                    if (this.slideVelocity) {
                        combinedVel.add(this.slideVelocity);
                        // Apply friction to slideVelocity separately (or use same?)
                        // User wants specific friction control.
                        // Flight Friction is 10 (very slippery). Ground is 80 (very sticky).
                        // Let's apply config friction to slide as well? 
                        // "Pushed back" should probably use the same environment friction.
                        const slideSpeed = this.slideVelocity.length();
                        if (slideSpeed > 0.01) {
                            const drop = moveStats.friction * dt;
                            let newSpeed = slideSpeed - drop;
                            if (newSpeed < 0) newSpeed = 0;
                            this.slideVelocity.normalize().multiplyScalar(newSpeed);
                        } else {
                            this.slideVelocity.set(0, 0, 0);
                        }
                    }

                    // Apply
                    this.mesh.position.add(combinedVel.multiplyScalar(dt));


                    // Player-Block Collision - DISABLE IN FLIGHT?
                    // Request: "Flying role is invincible" - collision usually implied?
                    // If flying high (Height 18/8), blocks (Height 2-8) are below.
                    // Collision check logic uses XZ. If we fly over, we should ignore.
                    // Let's add Check:
                    if (!this.isFlying && state.levelManager) {
                        const pRadius = 0.8;
                        const pPos = this.mesh.position;
                        state.levelManager.blocks.forEach(b => {
                            if (b.isDead) return;
                            const width = b.mesh.geometry.parameters.width;
                            const depth = b.mesh.geometry.parameters.depth;

                            const minX = b.mesh.position.x - width / 2 - pRadius;
                            const maxX = b.mesh.position.x + width / 2 + pRadius;
                            const minZ = b.mesh.position.z - depth / 2 - pRadius;
                            const maxZ = b.mesh.position.z + depth / 2 + pRadius;

                            if (pPos.x > minX && pPos.x < maxX && pPos.z > minZ && pPos.z < maxZ) {
                                const clampX = Math.max(b.mesh.position.x - width / 2, Math.min(pPos.x, b.mesh.position.x + width / 2));
                                const clampZ = Math.max(b.mesh.position.z - depth / 2, Math.min(pPos.z, b.mesh.position.z + depth / 2));
                                const diffX = pPos.x - clampX;
                                const diffZ = pPos.z - clampZ;
                                const distSq = diffX * diffX + diffZ * diffZ;

                                if (distSq < pRadius * pRadius && distSq > 0.0001) {
                                    const dist = Math.sqrt(distSq);
                                    const pen = pRadius - dist;
                                    const normalX = diffX / dist;
                                    const normalZ = diffZ / dist;
                                    this.mesh.position.x += normalX * pen;
                                    this.mesh.position.z += normalZ * pen;

                                    // Kill Velocity on Hit Normal?
                                    // Simple bounce or stop? Stop relative to normal.
                                    // For now just position fix is fine for smoothfeel.
                                }
                            }
                        });
                    }

                    if (totalRotationInput.lengthSq() > 0.01) {
                        const targetAngle = Math.atan2(totalRotationInput.x, totalRotationInput.z);
                        // Smooth Rotation
                        let deltaAngle = targetAngle - this.mesh.rotation.y;
                        while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                        while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;

                        const rotStep = moveStats.rotationSpeed * dt;
                        if (Math.abs(deltaAngle) < rotStep) {
                            this.mesh.rotation.y = targetAngle;
                        } else {
                            this.mesh.rotation.y += Math.sign(deltaAngle) * rotStep;
                        }
                    }

                    camera.position.x = this.mesh.position.x;
                    camera.position.z = this.mesh.position.z + CONFIG.visuals.camera.defaultZ;
                    camera.position.y = THREE.MathUtils.lerp(camera.position.y, CONFIG.visuals.camera.defaultY, dt * 2);
                    camera.lookAt(this.mesh.position);

                    // Charge logic
                    let chargeCount = 0;
                    ['p1', 'p2', 'p3', 'p4'].forEach(p => { if (state.input[p].charge) chargeCount++; });

                    let rate = -CONFIG.combo.decayRate;
                    if (chargeCount >= 1) rate = (chargeCount >= 2) ? CONFIG.combo.chargeRateDuo : CONFIG.combo.chargeRateIndividual;

                    state.pulseValue = Math.min(100, Math.max(0, state.pulseValue + rate * dt));
                    state.pulse = state.pulseValue;

                    if (state.pulseValue >= 100 && state.comboCooldown <= 0) {
                        this.activateCombo();
                    }
                }
            }
        }

        function setupInputs() {
            // P1: Keyboard
            const keys = {};
            let mouseAttack = false;
            let mouseCharge = false;

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            window.addEventListener('mousedown', (e) => {
                if (e.button === 0) mouseAttack = true;
                if (e.button === 2) mouseCharge = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) mouseAttack = false;
                if (e.button === 2) mouseCharge = false;
            });
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gamepad Support
            window.addEventListener("gamepadconnected", (e) => {
                console.log("Gamepad connected at index %d: %s. %d buttons, %d axes.",
                    e.gamepad.index, e.gamepad.id,
                    e.gamepad.buttons.length, e.gamepad.axes.length);
            });

            // Polling function
            state.pollInputs = () => {
                // Poll Gamepads
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

                // Update Cooldown State
                if (state.comboCooldown > 0) {
                    state.comboCooldown -= 0.016; // Approx per frame
                    if (state.comboCooldown < 0) state.comboCooldown = 0;

                    // Update UI
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.add('pulse-locked');
                    pulseBar.style.width = '100%'; // Full bar but gray
                    pulseBar.style.background = '#555'; // Gray
                    pulseText.innerText = `COOLDOWN: ${Math.ceil(state.comboCooldown)}`;
                } else {
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.remove('pulse-locked');
                    pulseBar.style.width = (state.pulse / state.maxPulse * 100) + '%';
                    pulseBar.style.background = 'linear-gradient(90deg, #ff00ff, #00ffff)';
                    pulseText.innerText = 'PULSE(Hold Skill Button)';
                }

                // --- P1 (Keyboard/Mouse) ---
                let vx = 0, vy = 0;
                if (keys['KeyW']) vy -= 1;
                if (keys['KeyS']) vy += 1;
                if (keys['KeyA']) vx -= 1;
                if (keys['KeyD']) vx += 1;
                state.input.p1.move.set(vx, vy).normalize();
                // P1 Attack: Mouse Left OR Key 1
                state.input.p1.attack = mouseAttack || keys['Digit1'];
                // Charge logic with cooldown check
                const p1RawCharge = mouseCharge || keys['ShiftLeft'];
                state.input.p1.charge = (state.comboCooldown <= 0) && p1RawCharge;

                // --- P2 (Gamepad 0) ---
                const gp2 = gamepads[0];
                if (gp2) {
                    const axisX = Math.abs(gp2.axes[0]) > 0.1 ? gp2.axes[0] : 0;
                    const axisY = Math.abs(gp2.axes[1]) > 0.1 ? gp2.axes[1] : 0;
                    state.input.p2.move.set(axisX, axisY);
                    if (state.input.p2.move.length() > 1) state.input.p2.move.normalize();

                    state.input.p2.attack = gp2.buttons[2].pressed; // West button (X/Square)
                    // Charge logic with cooldown check
                    const p2RawCharge = gp2.buttons[7].pressed; // RT/R2
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                } else {
                    // Debug Keys Arrows
                    let vx2 = 0, vy2 = 0;
                    if (keys['ArrowUp']) vy2 -= 1;
                    if (keys['ArrowDown']) vy2 += 1;
                    if (keys['ArrowLeft']) vx2 -= 1;
                    if (keys['ArrowRight']) vx2 += 1;
                    state.input.p2.move.set(vx2, vy2).normalize();
                    state.input.p2.attack = keys['Enter'] || keys['Digit2']; // Fixed: Added Digit2
                    // Charge logic with cooldown check
                    const p2RawCharge = keys['ShiftRight'];
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                }
                if (keys['Digit2']) state.input.p2.attack = true;

                // --- P3 (Gamepad 1) ---
                const gp3 = gamepads[1];
                state.input.p3.charge = false; // Default
                state.input.p3.attack = false; // Default
                if (gp3) {
                    const axisX = Math.abs(gp3.axes[0]) > 0.1 ? gp3.axes[0] : 0;
                    const axisY = Math.abs(gp3.axes[1]) > 0.1 ? gp3.axes[1] : 0;
                    state.input.p3.move.set(axisX, axisY);
                    state.input.p3.attack = gp3.buttons[2].pressed; // West
                    const p3RawCharge = gp3.buttons[7].pressed; // RT
                    state.input.p3.charge = (state.comboCooldown <= 0) && p3RawCharge;
                }
                if (keys['Digit3']) state.input.p3.attack = true;

                // --- P4 (Gamepad 2) ---
                const gp4 = gamepads[2];
                state.input.p4.charge = false; // Default
                state.input.p4.attack = false; // Default
                if (gp4) {
                    const axisX = Math.abs(gp4.axes[0]) > 0.1 ? gp4.axes[0] : 0;
                    const axisY = Math.abs(gp4.axes[1]) > 0.1 ? gp4.axes[1] : 0;
                    state.input.p4.move.set(axisX, axisY);
                    state.input.p4.attack = gp4.buttons[2].pressed; // West
                    const p4RawCharge = gp4.buttons[7].pressed; // RT
                    state.input.p4.charge = (state.comboCooldown <= 0) && p4RawCharge;
                }
                if (keys['Digit4']) state.input.p4.attack = true;
            };
        }

        // --- Bullet Management ---
        function updateBullets(dt) {
            // Move and Clean
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.update(dt);
                if (b.markedForDeletion) {
                    b.destroy();
                    state.bullets.splice(i, 1);
                }
            }
            // Merging Logic REMOVED (Replaced by Input-based Duo Shot)
        }

        // --- Main Loop ---

        const ptero = new Ptero();
        window.pteroInstance = ptero; // Global ref for state.setMode
        ptero.updateVisibility(); // Init visibility

        document.getElementById('mode-toggle').addEventListener('click', () => {
            const newMode = state.mode === 'quad' ? 'duo' : 'quad';
            state.setMode(newMode);
        });

        // Spawner Toggle
        const spawnerBtn = document.getElementById('spawner-toggle');
        spawnerBtn.addEventListener('click', () => {
            state.spawnerEnabled = !state.spawnerEnabled;
            spawnerBtn.innerText = state.spawnerEnabled ? "Enemy Spawner: ON" : "Enemy Spawner: OFF";
            spawnerBtn.style.backgroundColor = state.spawnerEnabled ? "#aa4444" : "#44aa44";

            if (!state.spawnerEnabled) {
                if (state.enemyManager) state.enemyManager.killAll();
            }
        });

        // Dummy Toggle (Moved to Info Container)
        const dummyBtn = document.createElement('button');
        dummyBtn.id = 'dummy-toggle';
        dummyBtn.innerText = 'Spawn Dummy';
        // Style to match others (and Color Brown)
        dummyBtn.style.marginTop = '10px';
        dummyBtn.style.marginLeft = '10px';
        dummyBtn.style.pointerEvents = 'auto';
        dummyBtn.style.backgroundColor = '#aa8844';
        dummyBtn.style.color = 'white';

        document.getElementById('info').appendChild(dummyBtn);

        dummyBtn.addEventListener('click', () => {
            if (state.enemyManager && window.pteroInstance) {
                state.enemyManager.spawnDummy(window.pteroInstance.mesh.position);
            }
        });

        // Initialize Systems
        state.levelManager = new LevelManager(scene);
        state.enemyManager = new EnemyManager(scene);

        setupInputs();

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - state.lastTime) / 1000, 0.1);
            state.lastTime = time;

            ptero.update(dt);
            ptero.checkCollisions(state.bullets); // Player check logic

            state.pollInputs();
            // Update Systems
            if (state.levelManager) {
                state.levelManager.update(dt);
                state.levelManager.checkCollisions(state.bullets);
            }
            if (state.enemyManager) {
                state.enemyManager.update(dt, ptero.mesh.position);
                state.enemyManager.checkCollisions(state.bullets);
            }

            // Update Bullets
            updateBullets(dt);

            // Update Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (!p.update(dt)) {
                    state.particles.splice(i, 1);
                }
            }

            // Update Pulse Bar
            const bar = document.getElementById('pulse-bar'); // Renamed to 'bar' to match original
            bar.style.width = state.pulseValue + '%';

            // Debug Info
            document.getElementById('debug').innerHTML = `
                P1: Atk=${state.input.p1.attack} Chg=${state.input.p1.charge ? 'ON' : 'OFF'}<br>
                P2: Atk=${state.input.p2.attack} Chg=${state.input.p2.charge ? 'ON' : 'OFF'}<br>
                P3: Atk=${state.input.p3.attack} Chg=${state.input.p3.charge ? 'ON' : 'OFF'}<br>
                P4: Atk=${state.input.p4.attack} Chg=${state.input.p4.charge ? 'ON' : 'OFF'}<br>
                Pulse: ${state.pulseValue.toFixed(1)}% | Bullets: ${state.bullets.length}
            `;

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
