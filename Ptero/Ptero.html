<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ptero Prototype - Duo Mode</title>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '10px';
            div.style.left = '10px';
            div.style.color = 'red';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.padding = '20px';
            div.style.zIndex = '9999';
            div.innerHTML = `<h3>Error</h3><p>${msg}</p><p>${url}:${line}:${col}</p>`;
            document.body.appendChild(div);
            return false;
        };
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #202020;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            min-width: 300px;
        }

        #wind-container-central {
            position: absolute;
            bottom: 65px;
            /* Above Pulse Meter (30px + 25px + 10px margin) */
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 15px;
            /* Thinner than Pulse */
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        #wind-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #88ccff, #ffffff);
            transition: width 0.1s linear;
        }

        #wind-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 10px;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }

        #pulse-bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #777;
            position: relative;
            /* Ensure children absolute positioning works */
        }

        #wind-marker {
            position: absolute;
            top: 0;
            left: 0%;
            width: 3px;
            /* Thicker line */
            height: 100%;
            background-color: #ff0000;
            z-index: 5;
            box-shadow: 0 0 5px red;
        }

        #pulse-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transition: width 0.1s linear;
        }

        #pulse-container-central {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 25px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        #pulse-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 14px;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="info">
        <h3>Ptero Duo Prototype</h3>
        <p>1P (Red): WASD to Move, Click to Attack, R-Click to Charge</p>
        <p>2P (Blue): Gamepad / Arrows to Move, Enter/East to Attack, Shift/RT to Charge</p>
        <div id="debug"></div>
        <button id="mode-toggle" style="margin-top:10px; pointer-events:auto;">Switch to 2P Mode</button>
        <button id="spawner-toggle"
            style="margin-top:10px; pointer-events:auto; background-color: #44aa44; color: white;">Start Enemy
            Spawn</button>
    </div>

    <!-- Wind Meter - Above Pulse Meter -->
    <div id="wind-container-central">
        <div id="wind-bar"></div>
        <div id="wind-marker"></div>
        <div id="wind-text">WIND: 0</div>
    </div>

    <!-- Pulse Meter - Moved to Center Bottom -->
    <div id="pulse-container-central">
        <div id="pulse-bar"></div>
        <div id="pulse-text">PULSE</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const CONFIG = {
            // 一般數值
            stats: {
                playerHP: 200,          // 玩家生命值
                structureHPBase: 0.5    // 建築物基礎生命值
            },

            // 風力與飛行設定
            wind: {
                max: 100,
                threshold: 70,       // 飛行閾值
                decayRate: 9.0,      // 每秒扣除風力
                gainPerAttack: 4,  // 每次攻擊獲得風力 (需要調整)
            },

            // 飛行參數 (與地面區分)
            flight: {

                heightGround: 0.5,    // 地面高度

            // 敵人設定
            enemy: {
                maxEnemies: 10,         // 最大同時存在敵人數
                spawnRateDuo: 7.0,      // 雙人模式生成間隔 (秒)
                spawnRateQuad: 2.6,     // 四人模式生成間隔 (秒)
                waveInterval: 15.0,     // 波次間隔 (秒)

                // 敵人種類數值
                melee: {
                    hp: 24, damage: 4, speed: 3, attackRange: 2.0, attackRate: 1.0,
                    color: 0xff4444, spawnWeight: 52
                },
                ranged: {
                    hp: 6, damage: 6, speed: 2, attackRange: 15.0, attackRate: 2.0,
                    projectileSpeed: 15, color: 0xaa44ff, spawnWeight: 26
                },
                ninja: {
                    hp: 9, damage: 8, speed: 4.0, attackRange: 2.5, attackRate: 2.0,
                    teleportDist: 8, warningTime: 1.0, color: 0x222222, spawnWeight: 18
                },
                boss: {
                    hp: 600, damage: 25, speed: 2.0, attackRange: 4.0,
                    spawnDelay: 15.0, color: 0x8800ff
                }
            },

            // 移動參數 (地面/飛行拆分)
            movement: {
                ground: {
                    maxSpeed: 5,
                    acceleration: 30,
                    friction: 80,
                    rotationSpeed: 4,
                },
                flight: {
                    maxSpeed: 9,       // 飛行時更快? 或不同? User didn't specify exact nums, assume diff config possible
                    acceleration: 20,
                    friction: 15,        // 飛行慣性大 (摩擦小)
                    rotationSpeed: 3,
                }
            },

            // 戰鬥參數 (Ptero專用)
            combat: {
                cooldown: 0.5,          // 攻擊冷卻時間
                swingSpeed: 0.15,       // 翅膀揮動速度 (秒)
                movementLockDuration: 0.2, // [New] 攻擊時鎖定移動的時間
                propulsion: {      // [New] 普攻推進 (距離/時間)
                    ground: { force: 0, duration: 0.2 },
                    flight: { force: 2.2, duration: 0.4 } // Adjusted defaults for smoother feel
                },

                // 2P 模式 (左/右翅膀)
                duo: {
                    damage: 15,
                    range: 5.0,
                    angle: 140,
                    // Flight override
                    flight: {
                        damage: 25,     // 飛行傷害
                        range: 6.0,
                        angle: 160,
                        knockback: 5.0
                    }
                },

                // 4P 模式 (四方位)
                quad: {
                    damage: 12,
                    range: 5,
                    angle: 140,
                    flight: {
                        damage: 20,
                        range: 8.0,
                        angle: 160,
                        knockback: 5.0
                    }
                },

                knockbackBase: 2,     // 地面擊退
            },

            // 組合技 (紅圈 -> 飛天 -> 重壓)
            combo: {
                chargeRateIndividual: 40, // 單人充能速率
                chargeRateDuo: 110,       // 雙人充能速率
                decayRate: 30,            // 自然衰退速率

                preCastDelay: 5.0,        // 預備時間 (紅圈控制)
                flyHeight: 18.0,          // 飛行高度 (Combo Only)
                flySpeed: 70.0,           // 上升速度
                dropSpeed: 90.0,          // 下墜速度

                moveSpeedFactor: 0.0,     // 施法時本體移動速度 (0 = 禁止移動)

                // 組合技傷害參數
                duo: {
                    radius: 8.0,          // 傷害半徑
                    damage: 100            // 傷害數值
                },
                quad: {
                    radius: 10.0,
                    damage: 140
                }
            },

            // 視覺參數
            visuals: {
                arrowLength: 4,         // 箭頭長度
                arrowDist: 3.5,         // [修改] 箭頭離身體距離 (更往外擺)

                // Camera 設定
                camera: {
                    defaultY: 18,       // 預設高度 (垂直)
                    defaultZ: 12,       // 預設距離 (水平)
                    smooth: 1.0         // 平滑速度
                },

                colors: {
                    p1: 0xff4444,     // 紅
                    p2: 0x4444ff,     // 藍
                    p3: 0xff69b4,     // 粉
                    p4: 0x00ffff,     // 青
                    body: 0x6666CC,   // 身體顏色
                    wing: 0xCCAA44,   // 翅膀顏色
                    mouth: 0xFFFF00,  // 嘴巴
                    head: 0x5555AA    // 頭部
                },
                // 翅膀位置微調
                wings: {
                    distance: 0,    // 翅膀離身體中心的距離 (原約 0.6~0.7)
                    height: 1.0,      // 高度
                    scale: 1.5        // 大小縮放
                }
            }
        };

        // --- Game State ---
        const state = {
            comboCooldown: 0, // [New] Cooldown timer
            comboCooldownMax: 30.0, // 30 Seconds
            pulse: 0,
            maxPulse: 100,
            mode: 'quad', // 'duo' or 'quad'
            playerCount: 4,

            setMode: function (m) {
                this.mode = m;
                this.playerCount = m === 'quad' ? 4 : 2;
                document.getElementById('mode-toggle').innerText = m === 'quad' ? 'Switch to 2P Mode' : 'Switch to 4P Mode';
                if (window.pteroInstance) window.pteroInstance.updateVisibility();
            },

            input: {
                p1: { move: new THREE.Vector2(), attack: false, charge: false },
                p2: { move: new THREE.Vector2(), attack: false, charge: false },
                p3: { move: new THREE.Vector2(), attack: false, charge: false },
                p4: { move: new THREE.Vector2(), attack: false, charge: false }
            },
            bullets: [],
            particles: [], // Array for simple particles
            pulseValue: 0, // 0 to 100
            comboActive: false,
            // Rhythm State
            rhythmTime: 0, // 0 to 1

            // Input Feedback
            showInputFeedback: (type) => { // 'p1', 'p2', 'duo'
                const container = document.getElementById('rhythm-helper');
                const el = document.createElement('div');
                el.className = `input-indicator indicator-${type}`;

                // Start Center
                el.style.left = '50%';
                el.style.top = '50%';
                el.style.marginTop = '-10px';
                el.style.marginLeft = '-10px';

                if (type === 'duo') {
                    el.style.width = '40px';
                    el.style.height = '40px';
                    el.style.marginTop = '-20px';
                    el.style.marginLeft = '-20px';
                }

                container.appendChild(el);

                // Calculate animation duration based on rhythm speed
                const cycleTime = CONFIG.combat.preFireDelay + CONFIG.combat.cooldown;
                // It travels 50% of the screen (50% -> 100%).
                const travelDuration = cycleTime / 2;

                // Animate
                requestAnimationFrame(() => {
                    // Move Right
                    el.style.transition = `left ${travelDuration}s linear`;
                    el.style.left = '100%';
                    el.style.opacity = '1';
                    el.style.transform = 'scale(1)';

                    // Fade out near end (at 80% of travel time)
                    setTimeout(() => {
                        el.style.transition = `left ${travelDuration}s linear, opacity 0.2s ease-out`;
                        el.style.opacity = '0';
                        setTimeout(() => el.remove(), 200);
                    }, travelDuration * 1000 * 0.8);
                });

                return el;
            },

            lastTime: 0
        };

        // --- Sound System Removed ---


        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Expose Camera mainly for UI lookAt
        window.camera = camera;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground Protocol Grid
        const gridHelper = new THREE.GridHelper(100, 100, 0x555555, 0x444444);
        scene.add(gridHelper);

        // --- Classes ---

        class Bullet {
            constructor(owner, position, direction, speed, life, gravity, size, stats = {}) {
                this.owner = owner;
                this.velocity = direction.clone().multiplyScalar(speed);
                this.gravity = gravity;
                this.maxLife = life;
                this.lifeTimer = 0;
                this.markedForDeletion = false;

                // Stats
                this.damage = stats.damage || 5;
                this.penetration = stats.penetration || 0;
                this.knockback = stats.knockback;
                this.hitEntities = new Set();
                this.isEnemy = true; // Default to enemy bullet for now as Player doesn't use bullets

                const geo = new THREE.SphereGeometry(size);
                const mat = new THREE.MeshBasicMaterial({ color: 0xff00ff }); // Enemy Bullet Color
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);
                scene.add(this.mesh);
            }

            update(dt) {
                if (this.gravity !== 0) this.velocity.y -= this.gravity * dt;
                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));

                this.lifeTimer += dt;
                if (this.lifeTimer >= this.maxLife) this.markedForDeletion = true;
                if (this.mesh.position.y < 0) this.markedForDeletion = true;
            }

            destroy() {
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
            }
        }

        class Particle {
            constructor(position, color) {
                this.life = 0.5; // Seconds
                this.maxLife = 0.5;
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                );

                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);

                scene.add(this.mesh);
            }

            update(dt) {
                this.life -= dt;
                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
                this.mesh.rotation.x += dt * 5;
                this.mesh.rotation.y += dt * 5;

                // Scale down
                const s = this.life / this.maxLife;
                this.mesh.scale.set(s, s, s);

                if (this.life <= 0) {
                    scene.remove(this.mesh);
                    this.mesh.geometry.dispose();
                    this.mesh.material.dispose();
                    return false; // Dead
                }
                return true; // Alive
            }
        }

        // --- Vine Removed ---


        // --- Level System ---
        class LevelManager {
            constructor(scene) {
                this.scene = scene;
                this.blocks = [];
                this.generateLevel();
            }

            generateLevel() {
                const count = 20;
                const range = 40;

                // Clear existing
                if (this.blocks) {
                    this.blocks.forEach(b => {
                        this.scene.remove(b.mesh);
                        b.mesh.geometry.dispose();
                        b.mesh.material.dispose();
                    });
                }
                this.blocks = [];
                const blockBoxes = []; // Cache Box3 for overlap check

                let attempts = 0;
                while (this.blocks.length < count && attempts < 200) {
                    attempts++;

                    // Random Size
                    const sx = 2 + Math.random() * 3;
                    const sy = 2 + Math.random() * 6; // Height
                    const sz = 2 + Math.random() * 3;

                    // Random Position (Avoid center 0,0)
                    const x = (Math.random() - 0.5) * range;
                    const z = (Math.random() - 0.5) * range;

                    // Distance check from center
                    if (x * x + z * z < 100) continue; // Min radius 10

                    // Overlap Check (AABB)
                    const tempBox = new THREE.Box3();
                    // Y is always sy/2 (on ground)
                    tempBox.min.set(x - sx / 2 - 0.5, 0, z - sz / 2 - 0.5); // Add spacing padding
                    tempBox.max.set(x + sx / 2 + 0.5, sy, z + sz / 2 + 0.5);

                    let overlap = false;
                    for (let box of blockBoxes) {
                        if (tempBox.intersectsBox(box)) {
                            overlap = true;
                            break;
                        }
                    }

                    if (overlap) continue;

                    // Valid Placement
                    const geo = new THREE.BoxGeometry(sx, sy, sz);
                    const mat = new THREE.MeshLambertMaterial({ color: 0x888888 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, sy / 2, z);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    this.scene.add(mesh);

                    // HP Calculation
                    const volume = sx * sy * sz;
                    const maxHP = volume * CONFIG.stats.structureHPBase; // [Updated] Base Value

                    this.blocks.push({
                        mesh: mesh,
                        hp: maxHP,
                        maxHP: maxHP,
                        isDead: false,
                        flashTimer: 0,
                        id: Math.random().toString(36).substr(2, 9) // ID for bullet tracking
                    });
                    blockBoxes.push(tempBox);
                }
            }

            checkCollisions(bullets) {
                // Bullet vs Block
                const box = new THREE.Box3();
                bullets.forEach(b => {
                    if (b.markedForDeletion) return;
                    if (b.damage <= 0) return; // Spent bullet

                    for (let block of this.blocks) {
                        if (block.isDead) continue;

                        // Optimization: Check cooldown per bullet for this block?
                        // For now: Simple hit
                        box.setFromObject(block.mesh);
                        if (box.containsPoint(b.mesh.position)) {
                            // Hit!
                            // Check if bullet already hit this block (if we want to prevent multi-hit per frame? No, penetration handles flow)
                            // But usually a bullet hits a block and STOPS or goes through.
                            // If it hits, we decrement penetration.

                            // Prevent hitting same block multiple times?
                            if (b.hitEntities.has(block.id)) continue;

                            b.hitEntities.add(block.id);

                            // Damage Block
                            block.hp -= b.damage;
                            block.flashTimer = 0.1;

                            // Penetration Logic -> DISABLED FOR BLOCKS (Walls block bullets)
                            b.markedForDeletion = true; // Always stop on block collision
                            b.penetration = -1;

                            if (block.hp <= 0) {
                                block.isDead = true;
                                this.scene.remove(block.mesh);
                                block.mesh.geometry.dispose();
                                block.mesh.material.dispose();

                                // Spawn Debris
                                this.spawnDebris(block.mesh.position, block.mesh.scale);
                            }

                            if (b.markedForDeletion) break; // Bullet died
                        }
                    }
                });
            }

            update(dt) {
                // Update visuals (Flash)
                this.blocks.forEach(b => {
                    if (b.isDead) return;
                    if (b.flashTimer > 0) {
                        b.flashTimer -= dt;
                        b.mesh.material.emissive.setHex(b.flashTimer > 0 ? 0xff0000 : 0x000000);
                    }
                });
            }

            spawnDebris(pos, scale) {
                // Simple particles
                const count = 5;
                for (let i = 0; i < count; i++) {
                    const p = new Particle(pos, 0x555555);
                    state.particles.push(p);
                }
            }
        }


        // --- Helper: Health Bar ---
        class HealthBar {
            constructor(scene, yOffset, width = 1.5, height = 0.15) {
                this.group = new THREE.Group();
                this.yOffset = yOffset;
                this.initialWidth = width;

                // Attach to Scene (World Space) so rotation is independent of parent
                scene.add(this.group);

                // BG (Red)
                const bgGeo = new THREE.PlaneGeometry(width, height);
                const bgMat = new THREE.MeshBasicMaterial({ color: 0x550000, depthTest: false, transparent: true });
                this.bg = new THREE.Mesh(bgGeo, bgMat);
                this.bg.renderOrder = 999;
                this.group.add(this.bg);

                // FG (Green)
                const fgGeo = new THREE.PlaneGeometry(width, height);
                const fgMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, depthTest: false, transparent: true });
                this.fg = new THREE.Mesh(fgGeo, fgMat);
                this.fg.position.z = 0.01; // Front
                this.fg.renderOrder = 1000;
                this.group.add(this.fg);

                // Ensure render order if depthTest issue (optional)
            }

            update(position, current, max) {
                // Sync Position
                this.group.position.copy(position);
                this.group.position.y += this.yOffset;

                const pct = Math.max(0, current / max);
                this.fg.scale.x = pct;
                this.fg.position.x = (pct - 1) * this.initialWidth / 2;

                // Billboard (Screen Aligned)
                if (window.camera) {
                    this.group.quaternion.copy(window.camera.quaternion);
                }
            }

            destroy() {
                // Cleanup
                if (this.group.parent) this.group.parent.remove(this.group);
            }
        }

        // --- Enemy System ---
        class Enemy {
            constructor(manager, pos, config) {
                this.manager = manager;
                this.hp = config.hp;
                this.damage = config.damage;
                this.speed = config.speed;
                this.attackRange = config.attackRange;
                this.attackRate = config.attackRate;
                this.color = config.color;

                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 2.0, 0.8), // Taller (2.0 Height)
                    new THREE.MeshLambertMaterial({ color: this.color })
                );
                this.mesh.position.copy(pos);
                // Adjust Height visual center 
                // Box is 2.0 High. Center should be +1.0 from ground.
                this.mesh.position.y = 1.0;

                this.mesh.castShadow = true;
                manager.scene.add(this.mesh);

                // Shadow
                const shadowGeo = new THREE.CircleGeometry(0.6, 16);
                const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
                this.shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadowMesh.rotation.x = -Math.PI / 2;
                this.shadowMesh.position.set(0, -0.98, 0); // Relative to mesh center (at 1.0). Shadow at 0.02.
                // Actually easier to add to scene and track position, OR add to mesh and offset y.
                // If added to mesh, if mesh rotates, shadow rotates (fine for circle).
                this.mesh.add(this.shadowMesh);

                this.attackTimer = 0;
                this.isDead = false;
                this.flashTimer = 0;
                this.knockbackVel = new THREE.Vector3(); // [New]

                // HP Bar
                this.maxHP = this.hp;
                this.hpBar = new HealthBar(this.manager.scene, 1.2); // Attached to scene, tracking mesh
            }

            takeDamage(amount, sourcePos, knockbackForce) {
                this.hp -= amount;
                this.flashTimer = 0.1;

                // Knockback Logic
                if (sourcePos) {
                    const dir = this.mesh.position.clone().sub(sourcePos).normalize();
                    dir.y = 0; // Flatten the force to horizontal plane
                    // Use passed force, or default base if not provided (fallback)
                    const force = (knockbackForce !== undefined) ? knockbackForce : amount * CONFIG.combat.knockbackBase;
                    this.knockbackVel.add(dir.multiplyScalar(force));
                }

                if (this.hp <= 0) this.die();
            }

            die() {
                this.isDead = true;
                this.manager.scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
                // Particles
                for (let i = 0; i < 8; i++) {
                    state.particles.push(new Particle(this.mesh.position, this.color));
                }
                // HP Bar Cleanup
                if (this.hpBar) this.hpBar.destroy();
            }

            update(dt, playerPos) {
                if (this.isDead) return;

                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Flash Logic
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // Movement & Attack
                const dist = this.mesh.position.distanceTo(playerPos);

                // Knockback Physics
                // Knockback Physics
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.mesh.position.y = 1.0; // Enforce floor level
                    // Friction: v = v - (v * friction * dt)
                    const friction = 5.0; // Damping factor
                    this.knockbackVel.sub(this.knockbackVel.clone().multiplyScalar(friction * dt));
                    if (this.knockbackVel.lengthSq() < 0.1) this.knockbackVel.set(0, 0, 0);
                }

                if (dist > this.attackRange) {
                    // Chase
                    const dir = playerPos.clone().sub(this.mesh.position).normalize();
                    dir.y = 0; // Keep flat
                    this.mesh.position.add(dir.multiplyScalar(this.speed * dt));
                    this.mesh.lookAt(playerPos);
                } else {
                    // Attack
                    if (this.attackTimer <= 0) {
                        this.performAttack(playerPos);
                        this.attackTimer = this.attackRate;
                    }
                }
                if (this.attackTimer > 0) this.attackTimer -= dt;
            }

            performAttack(targetPos) {
                // Override
            }
        }

        class NinjaEnemy extends Enemy {
            constructor(manager, pos) {
                super(manager, pos, CONFIG.enemy.ninja);
                this.teleportCooldown = 0;
                this.warningTimer = 0;
                this.isWarning = false;
                this.recoveryTimer = 0; // [New]
                // Add Trails or visuals?
            }

            update(dt, playerPos) {
                if (this.isDead) return;
                // Base update (HP bar etc)
                super.update(dt, playerPos); // Wait, super.update handles movement...
                // We need to override movement if warning
            }

            update(dt, playerPos) {
                if (this.isDead) return;

                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Flash Logic
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // Knockback
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.mesh.position.y = 1.0; // Enforce floor level
                    this.knockbackVel.multiplyScalar(0.9);
                    return;
                }

                // Recovery State (Post-Attack Animation Lock)
                if (this.recoveryTimer > 0) {
                    this.recoveryTimer -= dt;
                    return; // Don't move
                }

                // Warning State (Pre-Attack)
                if (this.isWarning) {
                    this.warningTimer -= dt;
                    // Pulse or Indicator
                    this.mesh.rotation.y += 10 * dt; // Spin fast?

                    if (this.warningTimer <= 0) {
                        this.performAttack(playerPos);
                        this.isWarning = false;
                        this.teleportCooldown = 5.0; // Cooldown
                    }
                    return; // Don't move
                }

                if (this.teleportCooldown > 0) this.teleportCooldown -= dt;

                const dist = this.mesh.position.distanceTo(playerPos);

                // Teleport Logic
                if (dist < CONFIG.enemy.ninja.teleportDist && this.teleportCooldown <= 0) {
                    // Teleport BEHIND player
                    let backPos;
                    if (window.pteroInstance) {
                        const fwd = window.pteroInstance.getForwardVector().normalize();
                        backPos = playerPos.clone().sub(fwd.multiplyScalar(3.0));
                    } else {
                        backPos = playerPos.clone().add(new THREE.Vector3(3, 0, 0));
                    }

                    // Clamp to floor
                    backPos.y = 1.0;

                    // Visual: Teleport Effect (Old Position)
                    const smokeGeo = new THREE.SphereGeometry(1, 8, 8);
                    const smokeMat = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.8 });
                    const smoke = new THREE.Mesh(smokeGeo, smokeMat);
                    smoke.position.copy(this.mesh.position);
                    this.manager.scene.add(smoke);

                    // Animate Smoke Fade
                    let sOp = 0.8;
                    const animSmoke = () => {
                        sOp -= 0.05;
                        if (sOp <= 0) {
                            this.manager.scene.remove(smoke);
                            smoke.geometry.dispose();
                            smoke.material.dispose();
                            return;
                        }
                        smoke.material.opacity = sOp;
                        smoke.scale.multiplyScalar(1.1); // Expand
                        requestAnimationFrame(animSmoke);
                    };
                    animSmoke();

                    this.mesh.position.copy(backPos);

                    // Start Warning
                    this.isWarning = true;
                    this.warningTimer = CONFIG.enemy.ninja.warningTime;

                } else {
                    // Standard Chase
                    if (dist > this.attackRange) {
                        const dir = playerPos.clone().sub(this.mesh.position).normalize();
                        dir.y = 0;
                        this.mesh.position.add(dir.multiplyScalar(this.speed * dt));
                        this.mesh.lookAt(playerPos);
                    }
                    // No normal attack
                }
            }

            performAttack(playerPos) {
                // Reset Color
                this.mesh.material.color.setHex(this.color);

                // Always Play Visual (Commit to attack)
                // [Adjusted Size]: Inner 1, Outer 4 to match Range 4.0
                const slashGeo = new THREE.RingGeometry(1.0, 2.5, 32, 1, 0, Math.PI); // Semi-circle
                const slashMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                const slash = new THREE.Mesh(slashGeo, slashMat);

                // Position and Orient
                slash.position.copy(this.mesh.position);
                slash.position.y = 1.0;
                slash.lookAt(playerPos);
                slash.rotateX(-Math.PI / 2); // Flat on ground
                slash.rotateZ(Math.PI);      // Flip 180 to face player correctly

                this.manager.scene.add(slash);

                // Animate Fade Out
                const startTime = Date.now();
                const duration = 200;

                const animateSlash = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > duration) {
                        this.manager.scene.remove(slash);
                        slash.geometry.dispose();
                        slash.material.dispose();
                        return;
                    }
                    slash.material.opacity = 1.0 - (elapsed / duration);
                    slash.scale.setScalar(1.0 + (elapsed / duration) * 0.5); // Expand
                    requestAnimationFrame(animateSlash);
                };
                animateSlash();

                // Damage Check (AOE in front)
                const slashRange = 4.0;
                if (this.mesh.position.distanceTo(playerPos) < slashRange) {
                    window.pteroInstance.takeDamage(this.damage);
                }

                // Lock Movement
                this.recoveryTimer = 0.5;
            }
        }

                // So we need offset > 3.5 - 1.0 = 2.5 relative to center?

                // Need offset 3.0?
                if (this.hpBar) {
                    this.hpBar.yOffset = 4.0; // Higher for Boss

            update(dt, playerPos) {
                if (this.isDead) return;

                // Flash
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // HP Bar
                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Knockback
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.knockbackVel.multiplyScalar(0.9);
                }

                // AI: Random Walk with Collision Check
                if (this.waitTime > 0) {
                    this.waitTime -= dt;
                    return;
                }

                // If close to target, pick new one
                const dist = this.mesh.position.distanceTo(this.targetPos);
                if (dist < 1.0) {
                    this.pickNewTarget();
                } else {
                    const dir = this.targetPos.clone().sub(this.mesh.position).normalize();
                    const moveStep = dir.multiplyScalar(this.speed * dt);
                    const nextPos = this.mesh.position.clone().add(moveStep);

                    // Block Collision Check
                    let hitBlock = false;
                    if (state.levelManager) {
                        // Simple Point vs AABB (inflated) check
                        // Block radius ~2.5 (5x5 block). Boss Radius ~1.2 (Scale 2.5).
                        // Safe margin ~4.0 check
                        state.levelManager.blocks.forEach(b => {
                            if (hitBlock) return;
                            const dx = Math.abs(b.mesh.position.x - nextPos.x);
                            const dz = Math.abs(b.mesh.position.z - nextPos.z);
                            // Block is 5x5. Half=2.5. Boss Radius ~1.2.
                            // Total Radius ~3.7. Let's use 4.0 margin.
                            if (dx < 4.0 && dz < 4.0) {
                                hitBlock = true;
                            }
                        });
                    }

                    if (hitBlock) {
                        // Hit wall, immediately pick new target away from wall?
                        // Just picking random might pick into wall again.
                        // But for simplicity: Pick new target.
                        this.pickNewTarget();
                    } else {
                        this.mesh.position.add(moveStep);
                        this.mesh.lookAt(this.targetPos);
                    }
                }
            }

            pickNewTarget() {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * 20; // Wander area
                this.targetPos.set(Math.sin(angle) * r, 1, Math.cos(angle) * r);

                div.style.top = '50%';
                div.style.left = '50%';

                div.style.fontFamily = 'Impact, sans-serif';

                state.spawnerEnabled = false;

                // Kill all other enemies?
