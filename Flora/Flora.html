<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Prototype - Duo Mode</title>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '10px';
            div.style.left = '10px';
            div.style.color = 'red';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.padding = '20px';
            div.style.zIndex = '9999';
            div.innerHTML = `<h3>Error</h3><p>${msg}</p><p>${url}:${line}:${col}</p>`;
            document.body.appendChild(div);
            return false;
        };
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #202020;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            min-width: 300px;
        }

        #pulse-bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #777;
        }

        #pulse-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transition: width 0.1s linear;
        }

        /* Rhythm Assist UI */
        #rhythm-helper {
            position: absolute;
            bottom: 120px;
            /* Moved up */
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 60px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pulse Meter - Moved to Center Bottom */
        #pulse-container-central {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            height: 30px;
            background: #222;
            border: 2px solid #555;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pulse-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transition: width 0.1s linear;
        }

        .pulse-locked {
            filter: grayscale(100%);
            background: #444 !important;
        }

        #pulse-text {
            position: absolute;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }



        .beat-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .center-target {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            transform: scale(1);
            transition: transform 0.1s;
        }

        .beat-cursor {
            position: absolute;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background-color: white;
            left: 0%;
            box-shadow: 0 0 10px white;
        }

        .input-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: scale(0);
            opacity: 0;
            transition: transform 0.2s ease-out, opacity 0.3s ease-out;
        }

        .indicator-p1 {
            background-color: #ff4444;
        }

        .indicator-p2 {
            background-color: #4444ff;
        }

        .indicator-p3 {
            background-color: #ff69b4;
        }

        .indicator-p4 {
            background-color: #00ffff;
        }

        .indicator-duo {
            background-color: #ffff00;
            width: 40px;
            height: 40px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="info">
        <h3>Flora Duo Prototype</h3>
        <p>1P (Red): WASD to Move, Click to Attack, R-Click to Charge</p>
        <p>2P (Blue): Gamepad / Arrows to Move, Enter/East to Attack, Shift/RT to Charge</p>
        <div id="debug"></div>
        <button id="mode-toggle" style="margin-top:10px; pointer-events:auto;">Switch to 2P Mode</button>
    </div>

    <div id="rhythm-helper">
        <div class="beat-line"></div>
        <div class="center-target" id="rhythm-target"></div>
        <div class="beat-cursor" id="rhythm-cursor"></div>
    </div>

    <!-- New Location for Pulse Meter -->
    <div id="pulse-container-central">
        <div id="pulse-bar"></div>
        <div id="pulse-text">PULSE</div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- Configuration (數值設定) ---
        const CONFIG = {
            // 移動相關 (Movement)
            movement: {
                maxSpeed: 9,      // 最大合力速度 (World units per second)
                acceleration: 60,  // 起步加速度
                friction: 80,      // 停止時的摩擦力 (慣性減速)
                rotationSpeed: 18,  // 轉身速度
            },

            // 戰鬥相關 (Combat)
            combat: {
                preFireDelay: 0.5,       // 攻擊前搖時間 (秒)
                duoWindow: 0.25,          // 雙人子彈合體判定窗口 (秒)
                cooldown: 0.3,           // 攻擊冷卻時間 (秒) - 發射後開始計算
                bufferWindow: 0.15        // 輸入預緩衝窗口 (秒)
            },

            // 子彈參數 (Bullets)
            bullet: {
                single: {
                    size: 0.4,           // [單人] 子彈大小
                    speedMin: 18,        // [單人] 飛行速度最小值
                    speedMax: 22,        // [單人] 飛行速度最大值
                    lifeMin: 0.9,        // [單人] 存在時間最小值 (秒)
                    lifeMax: 1.3,        // [單人] 存在時間最大值 (秒)
                    spread: 0.4,        // [單人] 散射角度 (弧度)
                    gravity: 25,         // [單人] 重力下墜值
                },
                duo: {
                    size: 0.7,           // [雙人] 子彈大小
                    speed: 25,           // [雙人] 飛行速度 (固定)
                    life: 4.0,           // [雙人] 存在時間 (固定)
                    gravity: 0,          // [雙人] 重力 (無)
                },
                trio: {
                    size: 0.9,
                    speed: 29,
                    life: 5.0,
                    gravity: 0,
                    shockwave: {
                        radius: 6,         // [半徑] 震波傳播多遠 (數值越大飛越遠)
                        angle: Math.PI / 1.5 // [角度] 震波扇形寬度 (弧度)
                    }
                },
                quad: {
                    size: 1.2, // Burst shots are smaller? Or maybe larger. Let's keep distinct.
                    speed: 33,
                    life: 5.0,
                    gravity: 0,
                    burstCount: 3,
                    burstInterval: 0.17, // Seconds between burst shots
                    shockwave: {
                        radius: 6,          // [半徑] 震波傳播多遠 (數值越大飛越遠)
                        angle: Math.PI / 1.5  // [角度] 震波扇形寬度 (弧度: PI=180度, PI/2=90度, PI/4=45度)
                    }
                }
            },

            // 合體技相關 (Combo / Charge)
            combo: {
                chargeRateIndividual: 40, // 單人蓄力時脈衝增加速度 (每秒)
                chargeRateDuo: 110,        // 雙人蓄力時脈衝增加速度 (每秒) - 鼓勵合作
                decayRate: 30,            // 沒人蓄力時脈衝消退速度 (每秒)

                preCastDelay: 2.3,        // 前搖時間 (秒)
                vineSpeed: 2.0,           // 揮舞速度
                moveSpeedFactor: 0.4,     // 施法時移動速度倍率

                mergeDistance: 1.0,       // 子彈合併判定距離
                mergeWindow: 500,         // 子彈合併判定時間窗口 (毫秒)

                // [New] Mode Specific Settings
                maxVineCount: 6, // Pool Size (Max needed for Quad)
                duo: {
                    activeDuration: 5.0,  // 傷害持續時間
                    radius: 10.0,         // 攻擊半徑
                    vineCount: 2          // 藤蔓數量
                },
                quad: {
                    activeDuration: 5.0,  // 傷害持續時間
                    radius: 16.0,         // 攻擊半徑
                    vineCount: 4          // 藤蔓數量
                }
            },

            // 視覺相關 (Visuals)
            visuals: {
                arrowLength: 4,           // 方向箭頭長度
                colors: {
                    p1: 0xff4444,     // 1P 顏色 (紅)
                    p2: 0x4444ff,     // 2P 顏色 (藍)
                    p3: 0xff69b4,     // 3P 顏色 (粉紅 - HotPink)
                    p4: 0x00ffff,     // 4P 顏色 (青)
                    body: 0x44aa44,   // 身體顏色 (綠)
                    head: 0x44aa44,   // 頭部顏色 (紫)
                    mouth: 0x00ffff,  // 嘴巴顏色 (黃)
                    beam: 0xff00ff    // 射線顏色
                }
            },

            // 節奏相關 (Rhythm)
            rhythm: {
                beatInterval: 1 // 每一拍的時間 (秒) - 獨立設定
            }
        };

        // --- Game State ---
        const state = {
            comboCooldown: 0, // [New] Cooldown timer
            comboCooldownMax: 20.0, // 20 Seconds
            pulse: 0,
            maxPulse: 100,
            mode: 'quad', // 'duo' or 'quad'
            playerCount: 4,

            setMode: function (m) {
                this.mode = m;
                this.playerCount = m === 'quad' ? 4 : 2;
                document.getElementById('mode-toggle').innerText = m === 'quad' ? 'Switch to 2P Mode' : 'Switch to 4P Mode';
                if (window.floraInstance) window.floraInstance.updateVisibility();
            },

            input: {
                p1: { move: new THREE.Vector2(), attack: false, charge: false },
                p2: { move: new THREE.Vector2(), attack: false, charge: false },
                p3: { move: new THREE.Vector2(), attack: false, charge: false },
                p4: { move: new THREE.Vector2(), attack: false, charge: false }
            },
            bullets: [],
            particles: [], // Array for simple particles
            pulseValue: 0, // 0 to 100
            comboActive: false,
            // Rhythm State
            rhythmTime: 0, // 0 to 1

            // Input Feedback
            showInputFeedback: (type) => { // 'p1', 'p2', 'duo'
                const container = document.getElementById('rhythm-helper');
                const el = document.createElement('div');
                el.className = `input-indicator indicator-${type}`;

                // Start Center
                el.style.left = '50%';
                el.style.top = '50%';
                el.style.marginTop = '-10px';
                el.style.marginLeft = '-10px';

                if (type === 'duo') {
                    el.style.width = '40px';
                    el.style.height = '40px';
                    el.style.marginTop = '-20px';
                    el.style.marginLeft = '-20px';
                }

                container.appendChild(el);

                // Calculate animation duration based on rhythm speed
                const cycleTime = CONFIG.combat.preFireDelay + CONFIG.combat.cooldown;
                // It travels 50% of the screen (50% -> 100%).
                const travelDuration = cycleTime / 2;

                // Animate
                requestAnimationFrame(() => {
                    // Move Right
                    el.style.transition = `left ${travelDuration}s linear`;
                    el.style.left = '100%';
                    el.style.opacity = '1';
                    el.style.transform = 'scale(1)';

                    // Fade out near end (at 80% of travel time)
                    setTimeout(() => {
                        el.style.transition = `left ${travelDuration}s linear, opacity 0.2s ease-out`;
                        el.style.opacity = '0';
                        setTimeout(() => el.remove(), 200);
                    }, travelDuration * 1000 * 0.8);
                });

                return el;
            },

            lastTime: 0
        };

        // --- Sound System (Synthesizer) ---
        const SoundSystem = {
            ctx: null,
            init: function () {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } else if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playKick: function () {
                if (!this.ctx) return;
                const t = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();

                osc.connect(gain);
                gain.connect(this.ctx.destination);

                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.5);

                gain.gain.setValueAtTime(1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.5);

                osc.start(t);
                osc.stop(t + 0.5);
            },
            playHiHat: function () {
                if (!this.ctx) return;
                // White noise buffer
                const bufferSize = this.ctx.sampleRate * 0.1; // 0.1s
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                // Filter Highpass
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start();
            }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground Protocol Grid
        const gridHelper = new THREE.GridHelper(100, 100, 0x555555, 0x444444);
        scene.add(gridHelper);

        // --- Classes ---

        class Bullet {
            constructor(owner, position, direction, speed, life, gravity, size) {
                this.owner = owner;
                this.direction = direction.clone();
                this.velocity = this.direction.clone().multiplyScalar(speed);
                this.gravity = gravity;
                this.maxLife = life;
                this.lifeTimer = 0;
                this.markedForDeletion = false;

                // Color Logic
                let color;
                if (owner === 'merged' || owner === 'quad' || owner === 'trio' || owner === 'duo') color = 0xffff00;
                else if (CONFIG.visuals.colors[owner]) color = CONFIG.visuals.colors[owner];
                else color = 0xffff00;

                // Special Case: P4 bullet should be Cyan (fixed in previous step via CONFIG colors, but ensuring here)
                // Actually owner 'p4' will hit CONFIG.visuals.colors['p4'] which is Cyan.
                // But for 'quad', 'trio' etc we might want special colors? 
                // Usually Synergy = Yellow/Gold. 
                // Let's stick to Yellow for 'merged'/'quad'/'trio' types unless specified.

                let geo;
                this.isRotator = false;
                this.size = size; // Save size for trail particles
                this.hasTrail = (owner === 'quad');
                this.trailTimer = 0;

                if (owner === 'quad') {
                    // Quad: Sharp Octahedron (Diamond shape) - Looks aggressive
                    geo = new THREE.OctahedronGeometry(size, 0);
                    this.isRotator = true;
                    this.rotationSpeed = 8.0;
                } else if (owner === 'trio') {
                    // Trio: Icosahedron (Crystal shape) - Looks mystical
                    geo = new THREE.IcosahedronGeometry(size, 0);
                    this.isRotator = true;
                    this.rotationSpeed = 4.0;
                } else {
                    // Duo or Normal: Sphere
                    geo = new THREE.SphereGeometry(size);
                }

                // Material - Wireframe for Trio/Quad looks cool? Or Lambert?
                // Let's stick to Basic for brightness as requested (Yellow), maybe wireframe overlay?
                // User said "Visual distinction".
                // Let's keep it simple: BasicMaterial for maximum visibility.

                const mat = new THREE.MeshBasicMaterial({ color: color, wireframe: false });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);

                // Initial Random Rotation for non-spheres
                if (this.isRotator) {
                    this.mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                }

                scene.add(this.mesh);

                // Shadow
                const shadowGeo = new THREE.CircleGeometry(size, 8);
                const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
                this.shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadowMesh.rotation.x = -Math.PI / 2;
                this.shadowMesh.position.set(position.x, 0.02, position.z); // Slightly above ground
                scene.add(this.shadowMesh);
            }

            update(dt) {
                // Apply Gravity
                if (this.gravity !== 0) {
                    this.velocity.y -= this.gravity * dt;
                }

                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));

                // Update Shadow Position
                this.shadowMesh.position.x = this.mesh.position.x;
                this.shadowMesh.position.z = this.mesh.position.z;
                // Optional: Scale shadow based on height to give depth cue? 
                // Simple drop shadow is usually enough.

                // Life check
                this.lifeTimer += dt;
                if (this.lifeTimer >= this.maxLife) {
                    this.markedForDeletion = true;
                }

                // Floor check (Simple)
                if (this.mesh.position.y < 0) {
                    this.markedForDeletion = true;
                }

                // Visual Rotation for Trio/Quad
                if (this.isRotator) {
                    this.mesh.rotation.x += this.rotationSpeed * dt;
                    this.mesh.rotation.y += this.rotationSpeed * dt;
                }

                // Trail for Quad
                if (this.hasTrail) {
                    this.trailTimer += dt;
                    if (this.trailTimer > 0.05) { // Emit every 0.05s
                        this.trailTimer = 0;
                        // Spawn simple particle
                        // We need access to state.particles. state is global.
                        if (typeof state !== 'undefined') {
                            // Capture size in closure or use instance prop if accessible
                            // But here 'this' inside create function? No, arrow func inherits 'this' from update? 
                            // Actually 'update' is a method of Bullet instance, so 'this' is Bullet.
                            // But inside state.particles which is an object literal? No wait.
                            // The particle update function has 'this' as the particle object.
                            // So we need to capture Bullet's size in a variable for the closure.
                            const pSize = this.size;

                            state.particles.push({
                                life: 0.3, maxLife: 0.3,
                                mesh: (() => {
                                    const m = new THREE.Mesh(new THREE.BoxGeometry(pSize * 0.3, pSize * 0.3, pSize * 0.3), new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5 }));

                                    m.position.copy(this.mesh.position);
                                    scene.add(m);
                                    return m;
                                })(),
                                velocity: new THREE.Vector3(0, 0, 0), // Stationary trail
                                update: function (dt) {
                                    this.life -= dt;
                                    const s = this.life / this.maxLife;
                                    this.mesh.scale.set(s, s, s);
                                    this.mesh.rotation.x += 5 * dt;
                                    if (this.life <= 0) { scene.remove(this.mesh); return false; }
                                    return true;
                                }
                            });
                        }
                    }
                }
            }

            destroy() {
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();

                scene.remove(this.shadowMesh);
                this.shadowMesh.geometry.dispose();
                this.shadowMesh.material.dispose();
            }
        }

        class Particle {
            constructor(position, color) {
                this.life = 0.5; // Seconds
                this.maxLife = 0.5;
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                );

                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);

                scene.add(this.mesh);
            }

            update(dt) {
                this.life -= dt;
                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
                this.mesh.rotation.x += dt * 5;
                this.mesh.rotation.y += dt * 5;

                // Scale down
                const s = this.life / this.maxLife;
                this.mesh.scale.set(s, s, s);

                if (this.life <= 0) {
                    scene.remove(this.mesh);
                    this.mesh.geometry.dispose();
                    this.mesh.material.dispose();
                    return false; // Dead
                }
                return true; // Alive
            }
        }

        class Vine {
            constructor(parent, index, total, radius) {
                this.mesh = new THREE.Group();
                parent.add(this.mesh);

                this.segments = [];
                const segmentCount = 6;
                const length = radius; // Use passed radius
                const segLen = length / segmentCount;

                // Create segments
                let parentObj = this.mesh;

                for (let i = 0; i < segmentCount; i++) {
                    const pivot = new THREE.Group();
                    pivot.position.z = i === 0 ? 0 : segLen;

                    const geo = new THREE.BoxGeometry(0.8, 0.8, segLen);
                    // Green gradient
                    const color = new THREE.Color().lerpColors(
                        new THREE.Color(0x228822),
                        new THREE.Color(0x88dd88),
                        i / (segmentCount - 1)
                    );
                    const mat = new THREE.MeshLambertMaterial({ color: color });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.z = segLen / 2; // Forward from pivot
                    mesh.castShadow = true;

                    pivot.add(mesh);
                    parentObj.add(pivot);

                    this.segments.push({ pivot: pivot, mesh: mesh });

                    // Next segment attaches to this pivot
                    parentObj = pivot;
                }

                // Initial Rotation
                this.baseAngle = (index / total) * Math.PI * 2;
                this.mesh.rotation.y = this.baseAngle;

                this.isActive = false;
                this.timer = 0;

                // Randomization Props
                this.rndSpeed = 0.5 + Math.random() * 1.5; // range 0.5 - 2.0
                this.rndPhase = Math.random() * 100;
                this.rndAmp = 0.8 + Math.random() * 0.4;   // range 0.8 - 1.2
            }

            setVisible(v) {
                this.mesh.visible = v;
            }

            update(dt, isSweeping) {
                this.timer += dt;

                if (isSweeping) {
                    // Chaotic Thrashing (Horizontal Mainly)
                    const baseSpeed = CONFIG.combo.vineSpeed * this.rndSpeed;

                    // 1. Root Rotation (Overall Sweep)
                    // Large amplitude sweep from base to cover wide area
                    // Use noise-like sum of sines
                    const t = this.timer * baseSpeed + this.rndPhase;

                    const sweep = Math.sin(t) * 1.5 + Math.sin(t * 0.3) * 0.5; // Wide angles
                    this.mesh.rotation.y = this.baseAngle + sweep * this.rndAmp;

                    // 2. Segment Wiggle (Whip effect)
                    this.segments.forEach((seg, i) => {
                        const segT = t - (i * 0.3); // Delay for wave

                        // Horizontal Wiggle (Strong)
                        seg.pivot.rotation.y = Math.sin(segT * 3.0) * (Math.PI / 4) * (1 + i * 0.2);

                        // Vertical (Keeping it FLAT as requested)
                        // Just a tiny breathing idle motion, near zero
                        seg.pivot.rotation.x = Math.sin(t * 2.0 + i) * 0.05;
                    });

                } else {
                    // Rumble (Pre-cast)
                    this.segments.forEach((seg, i) => {
                        seg.pivot.rotation.x = (Math.random() - 0.5) * 0.1;
                        // const jitter = (Math.random() - 0.5) * 0.1;
                        // seg.pivot.rotation.y = jitter; // Keep Y mostly stable in pre-cast?
                    });
                }
            }
            destroy() {
                this.segments.forEach(s => {
                    s.mesh.geometry.dispose();
                    s.mesh.material.dispose();
                });
                if (this.mesh.parent) this.mesh.parent.remove(this.mesh);
            }
        }

            getForwardVector() {
                const forward = new THREE.Vector3(0, 0, 1);
                forward.applyQuaternion(this.mesh.quaternion);
                return forward;
            }

            updateVisibility() {
                const isQuad = state.mode === 'quad';
                this.p3Part.visible = isQuad;
                this.p4Part.visible = isQuad;
                this.p3HeadPart.visible = isQuad;
                this.p4HeadPart.visible = isQuad;

            shoot(type) {
                // Removed static spawnPos capture

                let speed, life, gravity, direction, size, config;

                // Direction capturing helper
                const getDynamicDirection = () => this.getForwardVector();

                // Helper to spawn one bullet
                const spawnBullet = (bType, offsetTime = 0, useDynamicDir = false) => {
                    setTimeout(() => {
                        // Recalculate spawn position DYNAMICALLY
                        const currentSpawnPos = new THREE.Vector3();
                        this.mouth.getWorldPosition(currentSpawnPos);
                        currentSpawnPos.add(this.getForwardVector().multiplyScalar(0.5));

                        // Recalculate direction if dynamic (for Quad)
                        const finalDir = useDynamicDir ? getDynamicDirection() : direction;

                        const bullet = new Bullet(bType, currentSpawnPos, finalDir, speed, life, gravity, size);
                        state.bullets.push(bullet);
                    }, offsetTime * 1000);
                };

                // Spawn Shockwave Helper
                const spawnShockwave = (waveConfig) => {
                    // Create a visible shockwave ring/fan
                    // For prototype: Just a yellow expanding ring particle


                    // Animate in Main Loop or simple closure loop?
                    // Let's make a specialized Particle for Shockwave later. 
                    // For now, use existing Particle system just for burst visual?
                    // Or just reusing Particle class implies small boxes. 
                    // Let's create a temporary Shockwave logic inside the bullet or standalone?
                    // Let's just spawn a bunch of particles in a fan shape.
                    // Shockwave Particles
                    const count = 20;
                    const angle = waveConfig.angle;
                    const baseDir = this.getForwardVector(); // Note: baseDir is captured at call time (which is delayed for Burst)

                    // Recalculate spawn position DYNAMICALLY
                    const currentSpawnPos = new THREE.Vector3();
                    this.mouth.getWorldPosition(currentSpawnPos);
                    currentSpawnPos.add(this.getForwardVector().multiplyScalar(0.5));

                    // Radius = Speed * Life
                    // Let's fix speed at 20 for "impact", so Life = Radius / 20
                    const waveSpeed = 20;
                    const waveLife = waveConfig.radius / waveSpeed;

                    for (let i = 0; i < count; i++) {
                        const a = (i / count - 0.5) * angle;
                        const dir = baseDir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), a);

                        // Custom "Shockwave Particle"
                        state.particles.push({
                            life: waveLife, maxLife: waveLife,
                            mesh: (() => {
                                const m = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.1, 0.5), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
                                m.position.copy(currentSpawnPos);
                                scene.add(m);
                                return m;
                            })(),
                            velocity: dir.multiplyScalar(waveSpeed),
                            update: function (dt) {
                                this.life -= dt;
                                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
                                const s = this.life / this.maxLife;
                                this.mesh.scale.set(s, s, s);
                                if (this.life <= 0) { scene.remove(this.mesh); return false; }
                                return true;
                            }
                        });
                    }
                };

                if (type === 'quad') {
                    config = CONFIG.bullet.quad;
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    direction = this.getForwardVector(); // Fallback initial dir

                    // Burst Fire - Dynamic Direction
                    for (let i = 0; i < config.burstCount; i++) {
                        spawnBullet('quad', i * config.burstInterval, true); // Use dynamic dir
                    }
                    // Shockwave x3
                    for (let i = 0; i < 3; i++) {
                        setTimeout(() => spawnShockwave(config.shockwave), i * config.burstInterval * 1000);
                    }
                } else if (type === 'trio') {
                    config = CONFIG.bullet.trio;
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    direction = this.getForwardVector();

                    spawnBullet('trio');
                    spawnShockwave(config.shockwave);
                } else if (type === 'duo') {
                    config = CONFIG.bullet.duo;
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    direction = this.getForwardVector();
                    spawnBullet('duo');
                } else {
                    // Single
                    config = CONFIG.bullet.single;
                    speed = CONFIG.bullet.single.speedMin + Math.random() * (CONFIG.bullet.single.speedMax - CONFIG.bullet.single.speedMin);
                    life = CONFIG.bullet.single.lifeMin + Math.random() * (CONFIG.bullet.single.lifeMax - CONFIG.bullet.single.lifeMin);
                    gravity = config.gravity;
                    size = config.size;

                    // Spread
                    const spread = (Math.random() - 0.5) * CONFIG.bullet.single.spread;
                    direction = this.getForwardVector().applyAxisAngle(new THREE.Vector3(0, 1, 0), spread);

                    spawnBullet(type); // type is 'p1', 'p2' etc
                }


            }

            activateCombo() {
                state.comboActive = true;

                // Initialize Combo State Machine
                this.comboState = 'precast';
                this.comboTimer = CONFIG.combo.preCastDelay;

                // Update Geometry/Visuals based on Mode
                const config = CONFIG.combo[state.mode];

                // 1. Update Ring Radius
                const r = config.radius;
                this.comboRing.geometry.dispose();
                this.comboRing.geometry = new THREE.RingGeometry(r - 0.5, r, 64);
                this.comboRing.geometry.rotateX(-Math.PI / 2);

                // Visuals Setup
                this.comboRing.visible = true;
                this.comboRing.material.opacity = 0.5;
                this.comboRing.scale.set(0, 0, 0);

                // Rebuild Vines Dynamically
                if (this.vines) this.vines.forEach(v => v.destroy());
                this.vines = [];

                for (let i = 0; i < config.vineCount; i++) {
                    // Pass radius explicitly
                    const vine = new Vine(this.comboGroup, i, config.vineCount, config.radius);
                    vine.setVisible(false); // Hide initially
                    vine.timer = 0;
                    this.vines.push(vine);
                }
            }

            update(dt) {
                // --- Combo Skill State ---
                if (state.comboActive) {
                    this.comboTimer -= dt;

                    // 1. Pre-Cast Phase
                    if (this.comboState === 'precast') {
                        // Expand Ring Warning
                        const progress = 1.0 - (this.comboTimer / CONFIG.combo.preCastDelay);
                        this.comboRing.scale.set(progress, progress, progress);

                        // Flash Ring
                        this.comboRing.material.opacity = 0.5 + Math.sin(progress * 20) * 0.3;

                        if (this.comboTimer <= 0) {
                            // Transition to Active
                            this.comboState = 'active';

                            // Get config again
                            const config = CONFIG.combo[state.mode];
                            this.comboTimer = config.activeDuration;

                            // Visual Pop
                            this.comboRing.material.opacity = 0.8;
                            this.comboRing.scale.set(1, 1, 1);

                            // Show Vines
                            this.vines.forEach(v => v.setVisible(true));
                        }
                        return;
                    }
                    // 2. Active Phase
                    else if (this.comboState === 'active') {
                        const config = CONFIG.combo[state.mode];
                        // Update All Active Vines
                        this.vines.forEach(v => v.update(dt, true));

                        const remain = this.comboTimer / config.activeDuration;
                        this.comboRing.material.opacity = remain * 0.8;
                        if (this.comboTimer <= 0) {
                            state.comboActive = false;

                            // Start Cooldown
                            state.comboCooldown = state.comboCooldownMax;
                            state.pulse = 0; // Reset Pulse

                            // Hide visuals
                            this.comboRing.material.opacity = 0;
                            this.vines.forEach(v => v.setVisible(false));
                        }
                    }
                }

                // --- 4-Player Logic Setup ---
                const players = state.mode === 'quad' ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2'];

                // --- Charge Logic ---
                // Any member holding charge enters charge state
                const chargers = players.filter(p => state.input[p].charge);
                const chargeCount = chargers.length;

                // Pulse Meter Update
                let rate = -CONFIG.combo.decayRate;
                if (chargeCount >= 2) rate = CONFIG.combo.chargeRateDuo;
                else if (chargeCount === 1) rate = CONFIG.combo.chargeRateIndividual;

                state.pulseValue = Math.min(100, Math.max(0, state.pulseValue + rate * dt));
                state.pulse = state.pulseValue; // Keep state.pulse in sync with state.pulseValue

                // Trigger Combo?
                if (state.pulseValue >= 100 && !state.comboActive && state.comboCooldown <= 0) {
                    this.activateCombo();
                    return; // Start combo frame
                }

                // --- Rhythm UI Update ---
                const cycleTime = CONFIG.rhythm.beatInterval;
                const prevRhythm = state.rhythmTime;
                state.rhythmTime = (state.rhythmTime + (dt / cycleTime)) % 1.0;

                // Sound Triggers
                if (prevRhythm < 0.5 && state.rhythmTime >= 0.5) SoundSystem.playKick();
                if (state.rhythmTime < prevRhythm) SoundSystem.playHiHat();

                const cursor = document.getElementById('rhythm-cursor');
                const target = document.getElementById('rhythm-target');
                cursor.style.left = (state.rhythmTime * 100) + '%';
                const distToCenter = Math.abs(state.rhythmTime - 0.5);
                if (distToCenter < 0.05) {
                    target.style.transform = 'scale(1.3)';
                    cursor.style.backgroundColor = '#ffff00';
                } else {
                    target.style.transform = 'scale(1)';
                    cursor.style.backgroundColor = 'white';
                }

                // --- Combat Logic Updates ---

                // 1. Cooldown Management
                players.forEach(p => {
                    if (this.cooldowns[p] > 0) this.cooldowns[p] -= dt;
                });

                // 2. Input Detection (Fresh Press) & Buffer
                players.forEach(p => {
                    const isPress = state.input[p].attack && !this.lastAttackInput[p];
                    this.lastAttackInput[p] = state.input[p].attack;
                    const isCharging = state.input[p].charge;

                    // Trigger Check
                    const checkTrigger = () => {
                        if (this.bufferedInput[p] && this.cooldowns[p] <= 0) {
                            this.bufferedInput[p] = false;
                            return true;
                        }
                        if (isPress) {
                            if (this.cooldowns[p] <= 0) return true;
                            else if (this.cooldowns[p] <= CONFIG.combat.bufferWindow) {
                                this.bufferedInput[p] = true;
                                return false;
                            }
                        }
                        return false;
                    };

                    if (checkTrigger() && !isCharging && !this.isWindup[p]) {
                        this.isWindup[p] = true;
                        this.windupTimer[p] = CONFIG.combat.preFireDelay;

                        // Rhythm Check
                        const timeDiff = Math.abs(state.rhythmTime - 0.5) * cycleTime;
                        this.rhythmBonus[p] = timeDiff <= (CONFIG.combat.duoWindow / 2);

                        console.log(`${p.toUpperCase()} Rhythm: ${this.rhythmBonus[p]}`);

                        // Spawn Feedback Dot
                        if (this.activeIndicators[p]) this.activeIndicators[p].remove();
                        this.activeIndicators[p] = state.showInputFeedback(p);
                    }
                });

                // 3. Synergy Check
                // Find all players who are Winding Up AND have Valid Rhythm
                const readyPlayers = players.filter(p => this.isWindup[p] && this.rhythmBonus[p]);

                // Determine Synergy Level (4=Quad, 3=Trio, 2=Duo)
                // Only upgrade if we haven't already locked in a higher level?
                // Actually, dynamic upgrade is fine as long as we haven't fired.

                let synergyLevel = 0;
                let synergyName = '';

                if (readyPlayers.length === 4) { synergyLevel = 4; synergyName = 'quad'; }
                else if (readyPlayers.length === 3) { synergyLevel = 3; synergyName = 'trio'; }
                else if (readyPlayers.length === 2) { synergyLevel = 2; synergyName = 'duo'; }

                if (synergyLevel > 0) {
                    // Sync Timers: All ready players sync to the smallest timer (closest to fire)
                    const minTimer = Math.min(...readyPlayers.map(p => this.windupTimer[p]));
                    readyPlayers.forEach(p => this.windupTimer[p] = minTimer);

                    // Mark as Synergy Pending (to prevent single fire)
                    this.synergyPending = synergyLevel;
                    this.synergyType = synergyName;

                    // Update Visuals: Remove individual dots and show Synergy Dot
                    // Naive approach: Just remove all and show one big one if not already shown?
                    // Ideally we identify if this is a NEW synergy state.
                    // For now: Always refresh synergy feedback if changed

                    if (this.lastSynergyLevel !== synergyLevel) {
                        readyPlayers.forEach(p => {
                            if (this.activeIndicators[p]) { this.activeIndicators[p].remove(); this.activeIndicators[p] = null; }
                        });
                        // We might want to clear previous synergy dot if we upgraded (e.g. Duo -> Trio)
                        // But `showInputFeedback` just spawns a new one. 
                        // Let's just spawn the new one.
                        state.showInputFeedback('duo'); // Re-use 'duo' style or make new ones?
                        // Task says "reuse Duo bullet values" but for UI? 
                        // Let's allow 'duo' style for all synergies in UI for now, maybe scale it?
                    }
                }
                this.lastSynergyLevel = synergyLevel;

                // 4. Visuals & Logic Loop
                players.forEach(p => {
                    const isCharging = state.input[p].charge;

                    // Element Map
                    const partMap = { p1: this.p1Part, p2: this.p2Part, p3: this.p3Part, p4: this.p4Part };
                    const headMap = { p1: this.p1HeadPart, p2: this.p2HeadPart, p3: this.p3HeadPart, p4: this.p4HeadPart };
                    const baseMap = { p1: this.baseColorP1, p2: this.baseColorP2, p3: this.baseColorP3, p4: this.baseColorP4 };
                    const darkMap = { p1: this.darkColorP1, p2: this.darkColorP2, p3: this.darkColorP3, p4: this.darkColorP4 };

                    const part = partMap[p];
                    const headPart = headMap[p];

                    if (isCharging) {
                        const time = Date.now() * 0.005;
                        const hue = time % 1.0;
                        const rainbow = new THREE.Color().setHSL(hue, 1.0, 0.5);
                        part.material.color.copy(rainbow);
                        headPart.material.color.copy(rainbow);
                    }
                    else if (this.isWindup[p]) {
                        this.windupTimer[p] -= dt;

                        const base = baseMap[p];
                        const t = 1.0 - (this.windupTimer[p] / CONFIG.combat.preFireDelay);
                        const targetHex = this.rhythmBonus[p] ? 0xffff00 : 0xffffff;
                        const c = new THREE.Color().lerpColors(base, new THREE.Color(targetHex), t);

                        part.material.color.copy(c);
                        headPart.material.color.copy(c);

                        if (this.windupTimer[p] <= 0) {
                            // FIRE!
                            this.isWindup[p] = false;

                            // Check for Synergy Fire
                            // If I am part of the Ready Set, dealing with Synergy
                            if (this.synergyPending > 0 && readyPlayers.includes(p)) {
                                // Execute Synergy Shot ONCE per group
                                // Check if we are the "leader" (e.g. first in list of readyPlayers)
                                // OR check if synergyPending is still set.

                                if (this.synergyPending > 0) {
                                    this.shoot(this.synergyType);

                                    // Reset Synergy Logic
                                    const type = this.synergyType;
                                    this.synergyPending = 0;
                                    this.synergyType = '';
                                    this.lastSynergyLevel = 0;

                                    // Reset ALL ready players cooldowns
                                    readyPlayers.forEach(rp => {
                                        this.isWindup[rp] = false;
                                        this.cooldowns[rp] = CONFIG.combat.cooldown;
                                        // Slight extra delay for Quad? No, use standard.
                                    });
                                }
                            } else {
                                // Single Fire
                                this.shoot(p);
                                this.cooldowns[p] = CONFIG.combat.cooldown;
                            }
                        }
                    } else {
                        // Cooldown / Idle
                        const color = this.cooldowns[p] > 0 ? darkMap[p] : baseMap[p];
                        part.material.color.copy(color);
                        headPart.material.color.copy(color);
                    }
                });


                // 5. Movement Physics
                let totalInput = new THREE.Vector3();

                players.forEach(p => {
                    const moveInput = state.input[p].move;
                    const canMove = moveInput.lengthSq() > 0.01 && !state.input[p].charge;

                    // Arrow Visibility
                    const arrowMap = { p1: this.p1Arrow, p2: this.p2Arrow, p3: this.p3Arrow, p4: this.p4Arrow };
                    const arrow = arrowMap[p];

                    if (canMove) {
                        const dir = new THREE.Vector3(moveInput.x, 0, moveInput.y).normalize();
                        arrow.visible = true;
                        arrow.position.copy(this.mesh.position);
                        arrow.setDirection(dir);

                        // Add to Total
                        totalInput.add(new THREE.Vector3(moveInput.x, 0, moveInput.y));
                    } else {
                        arrow.visible = false;
                    }
                });

                const targetVel = new THREE.Vector3();
                if (totalInput.lengthSq() > 0.001) {
                    totalInput.normalize().multiplyScalar(CONFIG.movement.maxSpeed);
                    if (state.comboActive && this.comboState === 'active') {
                        totalInput.multiplyScalar(CONFIG.combo.moveSpeedFactor);
                    }
                    targetVel.copy(totalInput);
                }

                // Apply Acceleration vs Friction
                const currentVel = this.velocity;
                const diff = targetVel.clone().sub(currentVel);
                const dist = diff.length();

                if (dist > 0.001) {
                    const isMoving = targetVel.lengthSq() > 0.001;
                    const changeRate = isMoving ? CONFIG.movement.acceleration : CONFIG.movement.friction;
                    const step = changeRate * dt;
                    if (dist < step) currentVel.copy(targetVel);
                    else currentVel.add(diff.normalize().multiplyScalar(step));
                }

                this.mesh.position.add(currentVel.clone().multiplyScalar(dt));

                // Rotation
                if (currentVel.lengthSq() > 0.1) {
                    const targetAngle = Math.atan2(currentVel.x, currentVel.z);
                    const currentAngle = this.mesh.rotation.y;
                    let deltaAngle = targetAngle - currentAngle;
                    while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                    while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                    const rotStep = CONFIG.movement.rotationSpeed * dt;
                    if (Math.abs(deltaAngle) < rotStep) this.mesh.rotation.y = targetAngle;
                    else this.mesh.rotation.y += Math.sign(deltaAngle) * rotStep;
                }

                // Camera & Follow
                camera.position.x = this.mesh.position.x;
                camera.position.z = this.mesh.position.z + 10;
                camera.lookAt(this.mesh.position);
                if (this.comboGroup) this.comboGroup.position.copy(this.mesh.position);

            }
        }

        // --- Input Handling ---

        function setupInputs() {
            // P1: Keyboard
            const keys = {};
            let mouseAttack = false;
            let mouseCharge = false;

            const initAudio = () => { SoundSystem.init(); window.removeEventListener('keydown', initAudio); window.removeEventListener('mousedown', initAudio); };

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                SoundSystem.init();
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            window.addEventListener('mousedown', (e) => {
                SoundSystem.init();
                if (e.button === 0) mouseAttack = true;
                if (e.button === 2) mouseCharge = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) mouseAttack = false;
                if (e.button === 2) mouseCharge = false;
            });
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gamepad Support
            window.addEventListener("gamepadconnected", (e) => {
                console.log("Gamepad connected at index %d: %s. %d buttons, %d axes.",
                    e.gamepad.index, e.gamepad.id,
                    e.gamepad.buttons.length, e.gamepad.axes.length);
            });

            // Polling function
            state.pollInputs = () => {
                // Poll Gamepads
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

                // Update Cooldown State
                if (state.comboCooldown > 0) {
                    state.comboCooldown -= 0.016; // Approx per frame
                    if (state.comboCooldown < 0) state.comboCooldown = 0;

                    // Update UI
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.add('pulse-locked');
                    pulseBar.style.width = '100%'; // Full bar but gray
                    pulseBar.style.background = '#555'; // Gray
                    pulseText.innerText = `COOLDOWN: ${Math.ceil(state.comboCooldown)}`;
                } else {
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.remove('pulse-locked');
                    pulseBar.style.width = (state.pulse / state.maxPulse * 100) + '%';
                    pulseBar.style.background = 'linear-gradient(90deg, #ff00ff, #00ffff)';
                    pulseText.innerText = 'PULSE(Hold Skill Button)';
                }

                // --- P1 (Keyboard/Mouse) ---
                let vx = 0, vy = 0;
                if (keys['KeyW']) vy -= 1;
                if (keys['KeyS']) vy += 1;
                if (keys['KeyA']) vx -= 1;
                if (keys['KeyD']) vx += 1;
                state.input.p1.move.set(vx, vy).normalize();
                // P1 Attack: Mouse Left OR Key 1
                state.input.p1.attack = mouseAttack || keys['Digit1'];
                // Charge logic with cooldown check
                const p1RawCharge = mouseCharge || keys['ShiftLeft'];
                state.input.p1.charge = (state.comboCooldown <= 0) && p1RawCharge;

                // --- P2 (Gamepad 0) ---
                const gp2 = gamepads[0];
                if (gp2) {
                    const axisX = Math.abs(gp2.axes[0]) > 0.1 ? gp2.axes[0] : 0;
                    const axisY = Math.abs(gp2.axes[1]) > 0.1 ? gp2.axes[1] : 0;
                    state.input.p2.move.set(axisX, axisY);
                    if (state.input.p2.move.length() > 1) state.input.p2.move.normalize();

                    state.input.p2.attack = gp2.buttons[2].pressed; // West button (X/Square)
                    // Charge logic with cooldown check
                    const p2RawCharge = gp2.buttons[7].pressed; // RT/R2
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                } else {
                    // Debug Keys Arrows
                    let vx2 = 0, vy2 = 0;
                    if (keys['ArrowUp']) vy2 -= 1;
                    if (keys['ArrowDown']) vy2 += 1;
                    if (keys['ArrowLeft']) vx2 -= 1;
                    if (keys['ArrowRight']) vx2 += 1;
                    state.input.p2.move.set(vx2, vy2).normalize();
                    state.input.p2.attack = keys['Enter'] || keys['Digit2']; // Fixed: Added Digit2
                    // Charge logic with cooldown check
                    const p2RawCharge = keys['ShiftRight'];
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                }
                if (keys['Digit2']) state.input.p2.attack = true;

                // --- P3 (Gamepad 1) ---
                const gp3 = gamepads[1];
                state.input.p3.charge = false; // Default
                state.input.p3.attack = false; // Default
                if (gp3) {
                    const axisX = Math.abs(gp3.axes[0]) > 0.1 ? gp3.axes[0] : 0;
                    const axisY = Math.abs(gp3.axes[1]) > 0.1 ? gp3.axes[1] : 0;
                    state.input.p3.move.set(axisX, axisY);
                    state.input.p3.attack = gp3.buttons[2].pressed; // West
                    const p3RawCharge = gp3.buttons[7].pressed; // RT
                    state.input.p3.charge = (state.comboCooldown <= 0) && p3RawCharge;
                }
                if (keys['Digit3']) state.input.p3.attack = true;

                // --- P4 (Gamepad 2) ---
                const gp4 = gamepads[2];
                state.input.p4.charge = false; // Default
                state.input.p4.attack = false; // Default
                if (gp4) {
                    const axisX = Math.abs(gp4.axes[0]) > 0.1 ? gp4.axes[0] : 0;
                    const axisY = Math.abs(gp4.axes[1]) > 0.1 ? gp4.axes[1] : 0;
                    state.input.p4.move.set(axisX, axisY);
                    state.input.p4.attack = gp4.buttons[2].pressed; // West
                    const p4RawCharge = gp4.buttons[7].pressed; // RT
                    state.input.p4.charge = (state.comboCooldown <= 0) && p4RawCharge;
                }
                if (keys['Digit4']) state.input.p4.attack = true;
            };
        }

        // --- Bullet Management ---
        function updateBullets(dt) {
            // Move and Clean
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.update(dt);
                if (b.markedForDeletion) {
                    b.destroy();
                    state.bullets.splice(i, 1);
                }
            }
            // Merging Logic REMOVED (Replaced by Input-based Duo Shot)
        }

        // --- Main Loop ---

        const flora = new Flora();
        window.floraInstance = flora; // Global ref for state.setMode
        flora.updateVisibility(); // Init visibility

        document.getElementById('mode-toggle').addEventListener('click', () => {
            const newMode = state.mode === 'quad' ? 'duo' : 'quad';
            state.setMode(newMode);
        });

        setupInputs();

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - state.lastTime) / 1000, 0.1);
            state.lastTime = time;

            flora.update(dt); // Flora update moved to before input polling
            state.pollInputs();
            // Update Bullets
            updateBullets(dt);

            // Update Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (!p.update(dt)) {
                    state.particles.splice(i, 1);
                }
            }

            // Update Pulse Bar
            const bar = document.getElementById('pulse-bar'); // Renamed to 'bar' to match original
            bar.style.width = state.pulseValue + '%';

            // Debug Info
            document.getElementById('debug').innerHTML = `
                P1: Atk=${state.input.p1.attack} Chg=${state.input.p1.charge ? 'ON' : 'OFF'}<br>
                P2: Atk=${state.input.p2.attack} Chg=${state.input.p2.charge ? 'ON' : 'OFF'}<br>
                P3: Atk=${state.input.p3.attack} Chg=${state.input.p3.charge ? 'ON' : 'OFF'}<br>
                P4: Atk=${state.input.p4.attack} Chg=${state.input.p4.charge ? 'ON' : 'OFF'}<br>
                Pulse: ${state.pulseValue.toFixed(1)}% | Bullets: ${state.bullets.length}
            `;

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
