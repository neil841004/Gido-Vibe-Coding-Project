<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flora Prototype - Duo Mode</title>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            const div = document.createElement('div');
            div.style.position = 'absolute';
            div.style.top = '10px';
            div.style.left = '10px';
            div.style.color = 'red';
            div.style.background = 'rgba(0,0,0,0.8)';
            div.style.padding = '20px';
            div.style.zIndex = '9999';
            div.innerHTML = `<h3>Error</h3><p>${msg}</p><p>${url}:${line}:${col}</p>`;
            document.body.appendChild(div);
            return false;
        };
    </script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #202020;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            min-width: 300px;
        }

        #pulse-bar-container {
            width: 100%;
            height: 20px;
            background-color: #444;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #777;
        }

        #pulse-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transition: width 0.1s linear;
        }

        /* Rhythm Assist UI */
        #rhythm-helper {
            position: absolute;
            bottom: 22%;
            /* Moved up */
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 60px;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Pulse Meter - Moved to Center Bottom */
        #pulse-container-central {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 500px;
            height: 30px;
            background: #222;
            border: 2px solid #555;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pulse-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            transition: width 0.1s linear;
        }

        .pulse-locked {
            filter: grayscale(100%);
            background: #444 !important;
        }

        #pulse-text {
            position: absolute;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 2px black;
            z-index: 10;
        }



        .beat-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }

        .center-target {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid white;
            border-radius: 50%;
            transform: scale(1);
            transition: transform 0.1s;
        }

        .beat-cursor {
            position: absolute;
            top: 10px;
            bottom: 10px;
            width: 4px;
            background-color: white;
            left: 0%;
            box-shadow: 0 0 10px white;
        }

        .input-indicator {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            transform: scale(0);
            opacity: 0;
            transition: transform 0.2s ease-out, opacity 0.3s ease-out;
        }

        .indicator-p1 {
            background-color: #ff4444;
        }

        .indicator-p2 {
            background-color: #4444ff;
        }

        .indicator-p3 {
            background-color: #ff69b4;
        }

        .indicator-p4 {
            background-color: #00ffff;
        }






        .indicator-duo {
            background-color: #ffff00;
            width: 40px;
            height: 40px;
            z-index: 10;
        }
    </style>
</head>

<body>
    <div id="info">
        <h3>Flora Duo Prototype</h3>
        <p>1P (Red): WASD to Move, Click to Attack, R-Click to Charge</p>
        <p>2P (Blue): Gamepad / Arrows to Move, Enter/East to Attack, Shift/RT to Charge</p>
        <div id="debug"></div>
        <button id="mode-toggle" style="margin-top:10px; pointer-events:auto;">Switch to 2P Mode</button>
        <button id="spawner-toggle"
            style="margin-top:10px; pointer-events:auto; background-color: #44aa44; color: white;">Start Enemy
            Spawn</button>
    </div>

    <div id="rhythm-helper">
        <div class="beat-line"></div>
        <div class="center-target" id="rhythm-target"></div>
        <div class="beat-cursor" id="rhythm-cursor"></div>
    </div>

    <!-- New Location for Pulse Meter -->
    <div id="pulse-container-central">
        <div id="pulse-bar"></div>
        <div id="pulse-text">PULSE</div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';

        // --- Configuration (數值設定) ---
        const CONFIG = {
            // [New] General Stats
            stats: {
                playerHP: 200,        // 角色血量
                structureHPBase: 0.5   // 建築血量基值 (per unit volume)
            },

            // [New] Enemy Stats
            enemy: {
                maxEnemies: 10,          // [New] Max enemies on screen
                spawnRateDuo: 7.0,       // [Duo] Spawn interval
                spawnRateQuad: 2.6,      // [Quad] Faster spawn
                melee: {
                    hp: 24,
                    damage: 4,
                    speed: 3,
                    attackRange: 2.0,
                    attackRate: 1.0,  // Seconds
                    color: 0xff4444,
                    spawnWeight: 52      // [New] 權重 (機率)
                },
                ranged: {
                    hp: 6,
                    damage: 6,
                    speed: 2,
                    attackRange: 15.0, // Stop distance
                    attackRate: 2.0,
                    projectileSpeed: 15,
                    color: 0xaa44ff,
                    spawnWeight: 26      // [New] 權重 (機率)
                },
                ninja: {                 // [New] 瞬移忍者
                    hp: 9,
                    damage: 8,
                    speed: 4.0,
                    attackRange: 2.5,
                    attackRate: 2.0,
                    teleportDist: 8,     // 觸發瞬移距離
                    warningTime: 1.0,    // 瞬移後停頓警告時間
                    color: 0x222222,     // Dark Grey
                    spawnWeight: 18      // [New] 權重 (機率)
                },
                boss: {                  // [New] Boss Config
                    hp: 600,
                    damage: 25,
                    speed: 2.0,
                    attackRange: 4.0,
                    spawnDelay: 15.0,    // [New] 按下開始後延遲 10秒 出現
                    color: 0x8800ff
                }
            },

            // 移動相關 (Movement)
            movement: {
                maxSpeed: 6,      // 最大合力速度 (World units per second)
                acceleration: 25,  // 起步加速度
                friction: 80,      // 停止時的摩擦力 (慣性減速)
                rotationSpeed: 4,  // 轉身速度
            },

            // 戰鬥相關 (Combat)
            combat: {
                preFireDelay: 0.5,       // 攻擊前搖時間 (秒)
                duoWindow: 0.22,          // 雙人子彈合體判定窗口 (秒)
                quadWindow: 0.28,         // [New] 四人容許窗口 (更寬鬆)
                cooldown: 0.3,           // 攻擊冷卻時間 (秒) - 發射後開始計算
                bufferWindow: 0.15,       // 輸入預緩衝窗口 (秒)
                recoilForce: 10,           // [New] Recoil Force base (scaled by bullet type)
                knockbackBase: 0.2         // [New] Enemy Knockback = Damage * kickbackBase
            },

            // 子彈參數 (Bullets)
            bullet: {
                single: {
                    damage: 6,           // [單人] 傷害
                    size: 0.4,           // [單人] 子彈大小
                    speedMin: 18,        // [單人] 飛行速度最小值
                    speedMax: 22,        // [單人] 飛行速度最大值
                    lifeMin: 0.9,        // [單人] 存在時間最小值 (秒)
                    lifeMax: 1.3,        // [單人] 存在時間最大值 (秒)
                    spread: 0.4,         // [單人] 散射角度 (弧度)
                    gravity: 25,         // [單人] 重力下墜值
                    penetration: 0,      // [New] 穿透人數 (0 = hit 1)
                    recoil: 0,          // [New] 後座力係數 (x recoilForce)
                    knockback: 6         // [New] Bullet Knockback (Small)
                },
                duo: {
                    damage: 14,          // [雙人] 傷害
                    size: 0.7,           // [雙人] 子彈大小
                    speed: 25,           // [雙人] 飛行速度 (固定)
                    life: 4.0,           // [雙人] 存在時間 (固定)
                    gravity: 0,          // [雙人] 重力 (無)
                    penetration: 1,      // [New] 穿透人數
                    recoil: 1.5,
                    knockback: 14         // [New] Bullet Knockback
                },
                // [New] 四人獸專用強化版 (Stronger Single/Duo)
                ultraSingle: {
                    damage: 6,          // [四人-單] 傷害 (Buffed from 6)
                    size: 0.55,           // [四人-單] 稍大
                    speedMin: 20,        // [四人-單] 更快
                    speedMax: 24,
                    lifeMin: 1.2,
                    lifeMax: 1.7,
                    spread: 0.4,         // [四人-單] 更準
                    gravity: 25,         // [四人-單] 較輕
                    penetration: 0,      // [四人-單] 穿透1人!
                    recoil: 0,
                    knockback: 6         // [New] Bullet Knockback
                },
                ultraDuo: {
                    damage: 14,          // [四人-雙] 傷害 (Buffed from 14)
                    size: 0.8,           // [四人-雙] 巨大
                    speed: 30,           // [四人-雙] 很快
                    life: 4.0,
                    gravity: 0,
                    penetration: 2,      // [四人-雙] 穿透2人!
                    recoil: 1.5,
                    knockback: 14,        // [New] Bullet Knockback
                    shockwave: {
                        radius: 5,
                        angle: Math.PI / 0.5,
                        damage: 6,
                        knockback: 30    // [New] Shockwave Knockback
                    }
                },
                trio: {
                    damage: 24,          // [三人] 傷害
                    size: 1,
                    speed: 32,
                    life: 5.0,
                    gravity: 0,
                    penetration: 3,
                    recoil: 1.6,
                    knockback: 18,       // [New] Bullet Knockback
                    shockwave: {
                        radius: 6.5,
                        angle: Math.PI / 0.5,
                        damage: 6,
                        knockback: 33    // [New] Shockwave Knockback
                    }
                },
                quad: {
                    damage: 20,          // [四人] 傷害
                    size: 1.2,
                    speed: 32,
                    life: 5.0,
                    gravity: 0,
                    burstCount: 3,
                    burstInterval: 0.17,
                    penetration: 10,
                    recoil: 1.6,
                    knockback: 18,       // [New] Bullet Knockback
                    shockwave: {
                        radius: 7.5,
                        angle: Math.PI / 0.5,
                        damage: 6,
                        knockback: 36    // [New] Shockwave Knockback
                    }
                }
            },

            // 合體技相關 (Combo / Charge)
            combo: {
                chargeRateIndividual: 40, // 單人蓄力時脈衝增加速度 (每秒)
                chargeRateDuo: 110,        // 雙人蓄力時脈衝增加速度 (每秒) - 鼓勵合作
                decayRate: 30,            // 沒人蓄力時脈衝消退速度 (每秒)

                preCastDelay: 2.3,        // 前搖時間 (秒)
                vineSpeed: 2.0,           // 揮舞速度
                moveSpeedFactor: 0.5,     // 施法時移動速度倍率

                // [New] DoT Settings (Damage over Time)
                dotInterval: 0.5,         // 傷害頻率 (秒/次)
                dotDamage: 8,            // 每次傷害數值

                // [New] Mode Specific Settings
                maxVineCount: 6, // Pool Size (Max needed for Quad)
                duo: {
                    activeDuration: 5.0,  // 傷害持續時間
                    radius: 8.0,         // 攻擊半徑
                    vineCount: 2          // 藤蔓數量
                },
                quad: {
                    activeDuration: 7.0,  // 傷害持續時間
                    radius: 12.0,         // 攻擊半徑
                    vineCount: 4          // 藤蔓數量
                }
            },

            // 視覺相關 (Visuals)
            visuals: {
                arrowLength: 4,           // 方向箭頭長度
                colors: {
                    p1: 0xff4444,     // 1P 顏色 (紅)
                    p2: 0x4444ff,     // 2P 顏色 (藍)
                    p3: 0xff69b4,     // 3P 顏色 (粉紅 - HotPink)
                    p4: 0x00ffff,     // 4P 顏色 (青)
                    body: 0x44aa44,   // 身體顏色 (綠)
                    head: 0x44aa44,   // 頭部顏色 (紫)
                    mouth: 0x00ffff,  // 嘴巴顏色 (黃)
                    beam: 0xff00ff    // 射線顏色
                }
            },

            // 節奏相關 (Rhythm)
            rhythm: {
                beatInterval: 1 // 每一拍的時間 (秒) - 獨立設定
            }
        };

        // --- Game State ---
        const state = {
            comboCooldown: 0, // [New] Cooldown timer
            comboCooldownMax: 30.0, // 30 Seconds
            pulse: 0,
            maxPulse: 100,
            mode: 'quad', // 'duo' or 'quad'
            playerCount: 4,

            setMode: function (m) {
                this.mode = m;
                this.playerCount = m === 'quad' ? 4 : 2;
                document.getElementById('mode-toggle').innerText = m === 'quad' ? 'Switch to 2P Mode' : 'Switch to 4P Mode';
                if (window.floraInstance) window.floraInstance.updateVisibility();
            },

            input: {
                p1: { move: new THREE.Vector2(), attack: false, charge: false },
                p2: { move: new THREE.Vector2(), attack: false, charge: false },
                p3: { move: new THREE.Vector2(), attack: false, charge: false },
                p4: { move: new THREE.Vector2(), attack: false, charge: false }
            },
            bullets: [],
            particles: [], // Array for simple particles
            pulseValue: 0, // 0 to 100
            comboActive: false,
            // Rhythm State
            rhythmTime: 0, // 0 to 1

            // Input Feedback
            showInputFeedback: (type) => { // 'p1', 'p2', 'duo'
                const container = document.getElementById('rhythm-helper');
                const el = document.createElement('div');
                el.className = `input-indicator indicator-${type}`;

                // Start Center
                el.style.left = '50%';
                el.style.top = '50%';
                el.style.marginTop = '-10px';
                el.style.marginLeft = '-10px';

                if (type === 'duo') {
                    el.style.width = '40px';
                    el.style.height = '40px';
                    el.style.marginTop = '-20px';
                    el.style.marginLeft = '-20px';
                }

                container.appendChild(el);

                // Calculate animation duration based on rhythm speed
                const cycleTime = CONFIG.combat.preFireDelay + CONFIG.combat.cooldown;
                // It travels 50% of the screen (50% -> 100%).
                const travelDuration = cycleTime / 2;

                // Animate
                requestAnimationFrame(() => {
                    // Move Right
                    el.style.transition = `left ${travelDuration}s linear`;
                    el.style.left = '100%';
                    el.style.opacity = '1';
                    el.style.transform = 'scale(1)';

                    // Fade out near end (at 80% of travel time)
                    setTimeout(() => {
                        el.style.transition = `left ${travelDuration}s linear, opacity 0.2s ease-out`;
                        el.style.opacity = '0';
                        setTimeout(() => el.remove(), 200);
                    }, travelDuration * 1000 * 0.8);
                });

                return el;
            },

            lastTime: 0
        };

        // --- Sound System (Synthesizer) ---
        const SoundSystem = {
            ctx: null,
            init: function () {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                } else if (this.ctx.state === 'suspended') {
                    this.ctx.resume();
                }
            },
            playOpenHiHat: function () {
                if (!this.ctx) return;
                // White noise buffer (Longer for Open HH)
                const bufferSize = this.ctx.sampleRate * 0.5; // 0.5s
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                // Filter Highpass (Metallic shimmery sound)
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 1000; // Lower than closed HH for fuller sound

                const gain = this.ctx.createGain();
                const t = this.ctx.currentTime;
                gain.gain.setValueAtTime(0.4, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3); // Long decay

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start();
            },
            playHiHat: function () {
                if (!this.ctx) return;
                // White noise buffer
                const bufferSize = this.ctx.sampleRate * 0.1; // 0.1s
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }

                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;

                // Filter Highpass
                const filter = this.ctx.createBiquadFilter();
                filter.type = 'highpass';
                filter.frequency.value = 5000;

                const gain = this.ctx.createGain();
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                noise.start();
            }
        };

        // --- Scene Setup ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 20, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Expose Camera mainly for UI lookAt
        window.camera = camera;

        // Lighting
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Ground Protocol Grid
        const gridHelper = new THREE.GridHelper(100, 100, 0x555555, 0x444444);
        scene.add(gridHelper);

        // --- Classes ---

        class Bullet {
            constructor(owner, position, direction, speed, life, gravity, size, stats = {}) {
                this.owner = owner;
                this.direction = direction.clone();
                this.velocity = this.direction.clone().multiplyScalar(speed);
                this.gravity = gravity;
                this.maxLife = life;
                this.lifeTimer = 0;
                this.markedForDeletion = false;

                // [New] Stats
                this.damage = stats.damage || 5;
                this.penetration = stats.penetration || 0;
                this.knockback = stats.knockback; // [New]
                this.hitEntities = new Set(); // Track unique entity IDs or objects to avoid hitting same target twice if frames overlap? 
                // Actually simpler: cooldown per target? Or just hit once.
                // For penetration, we MUST NOT hit the same entity every frame.


                // Color Logic
                let color;
                if (owner === 'merged' || owner === 'quad' || owner === 'trio' || owner === 'duo') color = 0xffff00;
                else if (CONFIG.visuals.colors[owner]) color = CONFIG.visuals.colors[owner];
                else color = 0xffff00;

                // Special Case: P4 bullet should be Cyan (fixed in previous step via CONFIG colors, but ensuring here)
                // Actually owner 'p4' will hit CONFIG.visuals.colors['p4'] which is Cyan.
                // But for 'quad', 'trio' etc we might want special colors? 
                // Usually Synergy = Yellow/Gold. 
                // Let's stick to Yellow for 'merged'/'quad'/'trio' types unless specified.

                let geo;
                this.isRotator = false;
                this.size = size; // Save size for trail particles
                this.hasTrail = (owner === 'quad');
                this.trailTimer = 0;

                if (owner === 'quad') {
                    // Quad: Sharp Octahedron (Diamond shape) - Looks aggressive
                    geo = new THREE.OctahedronGeometry(size, 0);
                    this.isRotator = true;
                    this.rotationSpeed = 8.0;
                } else if (owner === 'trio') {
                    // Trio: Icosahedron (Crystal shape) - Looks mystical
                    geo = new THREE.IcosahedronGeometry(size, 0);
                    this.isRotator = true;
                    this.rotationSpeed = 4.0;
                } else {
                    // Duo or Normal: Sphere
                    geo = new THREE.SphereGeometry(size);
                }

                // Material - Wireframe for Trio/Quad looks cool? Or Lambert?
                // Let's stick to Basic for brightness as requested (Yellow), maybe wireframe overlay?
                // User said "Visual distinction".
                // Let's keep it simple: BasicMaterial for maximum visibility.

                const mat = new THREE.MeshBasicMaterial({ color: color, wireframe: false });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);

                // Initial Random Rotation for non-spheres
                if (this.isRotator) {
                    this.mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                }

                scene.add(this.mesh);

                // Shadow
                const shadowGeo = new THREE.CircleGeometry(size, 8);
                const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
                this.shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadowMesh.rotation.x = -Math.PI / 2;
                this.shadowMesh.position.set(position.x, 0.02, position.z); // Slightly above ground
                scene.add(this.shadowMesh);
            }

            update(dt) {
                // Apply Gravity
                if (this.gravity !== 0) {
                    this.velocity.y -= this.gravity * dt;
                }

                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));

                // Update Shadow Position
                this.shadowMesh.position.x = this.mesh.position.x;
                this.shadowMesh.position.z = this.mesh.position.z;
                // Optional: Scale shadow based on height to give depth cue? 
                // Simple drop shadow is usually enough.

                // Life check
                this.lifeTimer += dt;
                if (this.lifeTimer >= this.maxLife) {
                    this.markedForDeletion = true;
                }

                // Floor check (Simple)
                if (this.mesh.position.y < 0) {
                    this.markedForDeletion = true;
                }

                // Visual Rotation for Trio/Quad
                if (this.isRotator) {
                    this.mesh.rotation.x += this.rotationSpeed * dt;
                    this.mesh.rotation.y += this.rotationSpeed * dt;
                }

                // Trail for Quad
                if (this.hasTrail) {
                    this.trailTimer += dt;
                    if (this.trailTimer > 0.05) { // Emit every 0.05s
                        this.trailTimer = 0;
                        // Spawn simple particle
                        // We need access to state.particles. state is global.
                        if (typeof state !== 'undefined') {
                            // Capture size in closure or use instance prop if accessible
                            // But here 'this' inside create function? No, arrow func inherits 'this' from update? 
                            // Actually 'update' is a method of Bullet instance, so 'this' is Bullet.
                            // But inside state.particles which is an object literal? No wait.
                            // The particle update function has 'this' as the particle object.
                            // So we need to capture Bullet's size in a variable for the closure.
                            const pSize = this.size;

                            state.particles.push({
                                life: 0.3, maxLife: 0.3,
                                mesh: (() => {
                                    const m = new THREE.Mesh(new THREE.BoxGeometry(pSize * 0.3, pSize * 0.3, pSize * 0.3), new THREE.MeshBasicMaterial({ color: 0xffff00, transparent: true, opacity: 0.5 }));

                                    m.position.copy(this.mesh.position);
                                    scene.add(m);
                                    return m;
                                })(),
                                velocity: new THREE.Vector3(0, 0, 0), // Stationary trail
                                update: function (dt) {
                                    this.life -= dt;
                                    const s = this.life / this.maxLife;
                                    this.mesh.scale.set(s, s, s);
                                    this.mesh.rotation.x += 5 * dt;
                                    if (this.life <= 0) { scene.remove(this.mesh); return false; }
                                    return true;
                                }
                            });
                        }
                    }
                }
            }

            destroy() {
                scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();

                scene.remove(this.shadowMesh);
                this.shadowMesh.geometry.dispose();
                this.shadowMesh.material.dispose();
            }
        }

        class Particle {
            constructor(position, color) {
                this.life = 0.5; // Seconds
                this.maxLife = 0.5;
                this.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 10
                );

                const geo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const mat = new THREE.MeshBasicMaterial({ color: color });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);

                scene.add(this.mesh);
            }

            update(dt) {
                this.life -= dt;
                this.mesh.position.add(this.velocity.clone().multiplyScalar(dt));
                this.mesh.rotation.x += dt * 5;
                this.mesh.rotation.y += dt * 5;

                // Scale down
                const s = this.life / this.maxLife;
                this.mesh.scale.set(s, s, s);

                if (this.life <= 0) {
                    scene.remove(this.mesh);
                    this.mesh.geometry.dispose();
                    this.mesh.material.dispose();
                    return false; // Dead
                }
                return true; // Alive
            }
        }

        class Vine {
            constructor(parent, index, total, radius) {
                this.mesh = new THREE.Group();
                parent.add(this.mesh);

                this.segments = [];
                const segmentCount = 6;
                const length = radius; // Use passed radius
                const segLen = length / segmentCount;

                // Create segments
                let parentObj = this.mesh;

                for (let i = 0; i < segmentCount; i++) {
                    const pivot = new THREE.Group();
                    pivot.position.z = i === 0 ? 0 : segLen;

                    const geo = new THREE.BoxGeometry(0.8, 0.8, segLen);
                    // Green gradient
                    const color = new THREE.Color().lerpColors(
                        new THREE.Color(0x228822),
                        new THREE.Color(0x88dd88),
                        i / (segmentCount - 1)
                    );
                    const mat = new THREE.MeshLambertMaterial({ color: color });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.z = segLen / 2; // Forward from pivot
                    mesh.castShadow = true;

                    pivot.add(mesh);
                    parentObj.add(pivot);

                    this.segments.push({ pivot: pivot, mesh: mesh });

                    // Next segment attaches to this pivot
                    parentObj = pivot;
                }

                // Initial Rotation
                this.baseAngle = (index / total) * Math.PI * 2;
                this.mesh.rotation.y = this.baseAngle;

                this.isActive = false;
                this.timer = 0;

                // Randomization Props
                this.rndSpeed = 0.5 + Math.random() * 1.5; // range 0.5 - 2.0
                this.rndPhase = Math.random() * 100;
                this.rndAmp = 0.8 + Math.random() * 0.4;   // range 0.8 - 1.2
            }

            setVisible(v) {
                this.mesh.visible = v;
            }

            update(dt, isSweeping) {
                this.timer += dt;

                if (isSweeping) {
                    // Chaotic Thrashing (Horizontal Mainly)
                    const baseSpeed = CONFIG.combo.vineSpeed * this.rndSpeed;

                    // 1. Root Rotation (Overall Sweep)
                    // Large amplitude sweep from base to cover wide area
                    // Use noise-like sum of sines
                    const t = this.timer * baseSpeed + this.rndPhase;

                    const sweep = Math.sin(t) * 1.5 + Math.sin(t * 0.3) * 0.5; // Wide angles
                    this.mesh.rotation.y = this.baseAngle + sweep * this.rndAmp;

                    // 2. Segment Wiggle (Whip effect)
                    this.segments.forEach((seg, i) => {
                        const segT = t - (i * 0.3); // Delay for wave

                        // Horizontal Wiggle (Strong)
                        seg.pivot.rotation.y = Math.sin(segT * 3.0) * (Math.PI / 4) * (1 + i * 0.2);

                        // Vertical (Keeping it FLAT as requested)
                        // Just a tiny breathing idle motion, near zero
                        seg.pivot.rotation.x = Math.sin(t * 2.0 + i) * 0.05;
                    });

                } else {
                    // Rumble (Pre-cast)
                    this.segments.forEach((seg, i) => {
                        seg.pivot.rotation.x = (Math.random() - 0.5) * 0.1;
                        // const jitter = (Math.random() - 0.5) * 0.1;
                        // seg.pivot.rotation.y = jitter; // Keep Y mostly stable in pre-cast?
                    });
                }
            }
            destroy() {
                this.segments.forEach(s => {
                    s.mesh.geometry.dispose();
                    s.mesh.material.dispose();
                });
                if (this.mesh.parent) this.mesh.parent.remove(this.mesh);
            }
        }

        // --- Level System ---
        class LevelManager {
            constructor(scene) {
                this.scene = scene;
                this.blocks = [];
                this.generateLevel();
            }

            generateLevel() {
                const count = 20;
                const range = 40;

                // Clear existing
                if (this.blocks) {
                    this.blocks.forEach(b => {
                        this.scene.remove(b.mesh);
                        b.mesh.geometry.dispose();
                        b.mesh.material.dispose();
                    });
                }
                this.blocks = [];
                const blockBoxes = []; // Cache Box3 for overlap check

                let attempts = 0;
                while (this.blocks.length < count && attempts < 200) {
                    attempts++;

                    // Random Size
                    const sx = 2 + Math.random() * 3;
                    const sy = 2 + Math.random() * 6; // Height
                    const sz = 2 + Math.random() * 3;

                    // Random Position (Avoid center 0,0)
                    const x = (Math.random() - 0.5) * range;
                    const z = (Math.random() - 0.5) * range;

                    // Distance check from center
                    if (x * x + z * z < 100) continue; // Min radius 10

                    // Overlap Check (AABB)
                    const tempBox = new THREE.Box3();
                    // Y is always sy/2 (on ground)
                    tempBox.min.set(x - sx / 2 - 0.5, 0, z - sz / 2 - 0.5); // Add spacing padding
                    tempBox.max.set(x + sx / 2 + 0.5, sy, z + sz / 2 + 0.5);

                    let overlap = false;
                    for (let box of blockBoxes) {
                        if (tempBox.intersectsBox(box)) {
                            overlap = true;
                            break;
                        }
                    }

                    if (overlap) continue;

                    // Valid Placement
                    const geo = new THREE.BoxGeometry(sx, sy, sz);
                    const mat = new THREE.MeshLambertMaterial({ color: 0x888888 });
                    const mesh = new THREE.Mesh(geo, mat);
                    mesh.position.set(x, sy / 2, z);
                    mesh.castShadow = true;
                    mesh.receiveShadow = true;
                    this.scene.add(mesh);

                    // HP Calculation
                    const volume = sx * sy * sz;
                    const maxHP = volume * CONFIG.stats.structureHPBase; // [Updated] Base Value

                    this.blocks.push({
                        mesh: mesh,
                        hp: maxHP,
                        maxHP: maxHP,
                        isDead: false,
                        flashTimer: 0,
                        id: Math.random().toString(36).substr(2, 9) // ID for bullet tracking
                    });
                    blockBoxes.push(tempBox);
                }
            }

            checkCollisions(bullets) {
                // Bullet vs Block
                const box = new THREE.Box3();
                bullets.forEach(b => {
                    if (b.markedForDeletion) return;
                    if (b.damage <= 0) return; // Spent bullet

                    for (let block of this.blocks) {
                        if (block.isDead) continue;

                        // Optimization: Check cooldown per bullet for this block?
                        // For now: Simple hit
                        box.setFromObject(block.mesh);
                        if (box.containsPoint(b.mesh.position)) {
                            // Hit!
                            // Check if bullet already hit this block (if we want to prevent multi-hit per frame? No, penetration handles flow)
                            // But usually a bullet hits a block and STOPS or goes through.
                            // If it hits, we decrement penetration.

                            // Prevent hitting same block multiple times?
                            if (b.hitEntities.has(block.id)) continue;

                            b.hitEntities.add(block.id);

                            // Damage Block
                            block.hp -= b.damage;
                            block.flashTimer = 0.1;

                            // Penetration Logic -> DISABLED FOR BLOCKS (Walls block bullets)
                            b.markedForDeletion = true; // Always stop on block collision
                            b.penetration = -1;

                            if (block.hp <= 0) {
                                block.isDead = true;
                                this.scene.remove(block.mesh);
                                block.mesh.geometry.dispose();
                                block.mesh.material.dispose();

                                // Spawn Debris
                                this.spawnDebris(block.mesh.position, block.mesh.scale);
                            }

                            if (b.markedForDeletion) break; // Bullet died
                        }
                    }
                });
            }

            update(dt) {
                // Update visuals (Flash)
                this.blocks.forEach(b => {
                    if (b.isDead) return;
                    if (b.flashTimer > 0) {
                        b.flashTimer -= dt;
                        b.mesh.material.emissive.setHex(b.flashTimer > 0 ? 0xff0000 : 0x000000);
                    }
                });
            }

            spawnDebris(pos, scale) {
                // Simple particles
                const count = 5;
                for (let i = 0; i < count; i++) {
                    const p = new Particle(pos, 0x555555);
                    state.particles.push(p);
                }
            }
        }


        // --- Helper: Health Bar ---
        class HealthBar {
            constructor(scene, yOffset, width = 1.5, height = 0.15) {
                this.group = new THREE.Group();
                this.yOffset = yOffset;
                this.initialWidth = width;

                // Attach to Scene (World Space) so rotation is independent of parent
                scene.add(this.group);

                // BG (Red)
                const bgGeo = new THREE.PlaneGeometry(width, height);
                const bgMat = new THREE.MeshBasicMaterial({ color: 0x550000, depthTest: false, transparent: true });
                this.bg = new THREE.Mesh(bgGeo, bgMat);
                this.bg.renderOrder = 999;
                this.group.add(this.bg);

                // FG (Green)
                const fgGeo = new THREE.PlaneGeometry(width, height);
                const fgMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, depthTest: false, transparent: true });
                this.fg = new THREE.Mesh(fgGeo, fgMat);
                this.fg.position.z = 0.01; // Front
                this.fg.renderOrder = 1000;
                this.group.add(this.fg);

                // Ensure render order if depthTest issue (optional)
            }

            update(position, current, max) {
                // Sync Position
                this.group.position.copy(position);
                this.group.position.y += this.yOffset;

                const pct = Math.max(0, current / max);
                this.fg.scale.x = pct;
                this.fg.position.x = (pct - 1) * this.initialWidth / 2;

                // Billboard (Screen Aligned)
                if (window.camera) {
                    this.group.quaternion.copy(window.camera.quaternion);
                }
            }

            destroy() {
                // Cleanup
                if (this.group.parent) this.group.parent.remove(this.group);
            }
        }

        // --- Enemy System ---
        class Enemy {
            constructor(manager, pos, config) {
                this.manager = manager;
                this.hp = config.hp;
                this.damage = config.damage;
                this.speed = config.speed;
                this.attackRange = config.attackRange;
                this.attackRate = config.attackRate;
                this.color = config.color;

                this.mesh = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 2.0, 0.8), // Taller (2.0 Height)
                    new THREE.MeshLambertMaterial({ color: this.color })
                );
                this.mesh.position.copy(pos);
                // Adjust Height visual center 
                // Box is 2.0 High. Center should be +1.0 from ground.
                this.mesh.position.y = 1.0;

                this.mesh.castShadow = true;
                manager.scene.add(this.mesh);

                // Shadow
                const shadowGeo = new THREE.CircleGeometry(0.6, 16);
                const shadowMat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.5 });
                this.shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                this.shadowMesh.rotation.x = -Math.PI / 2;
                this.shadowMesh.position.set(0, -0.98, 0); // Relative to mesh center (at 1.0). Shadow at 0.02.
                // Actually easier to add to scene and track position, OR add to mesh and offset y.
                // If added to mesh, if mesh rotates, shadow rotates (fine for circle).
                this.mesh.add(this.shadowMesh);

                this.attackTimer = 0;
                this.isDead = false;
                this.flashTimer = 0;
                this.knockbackVel = new THREE.Vector3(); // [New]

                // HP Bar
                this.maxHP = this.hp;
                this.hpBar = new HealthBar(this.manager.scene, 1.2); // Attached to scene, tracking mesh
            }

            takeDamage(amount, sourcePos, knockbackForce) {
                this.hp -= amount;
                this.flashTimer = 0.1;

                // Knockback Logic
                if (sourcePos) {
                    const dir = this.mesh.position.clone().sub(sourcePos).normalize();
                    dir.y = 0; // Flatten the force to horizontal plane
                    // Use passed force, or default base if not provided (fallback)
                    const force = (knockbackForce !== undefined) ? knockbackForce : amount * CONFIG.combat.knockbackBase;
                    this.knockbackVel.add(dir.multiplyScalar(force));
                }

                if (this.hp <= 0) this.die();
            }

            die() {
                this.isDead = true;
                this.manager.scene.remove(this.mesh);
                this.mesh.geometry.dispose();
                this.mesh.material.dispose();
                // Particles
                for (let i = 0; i < 8; i++) {
                    state.particles.push(new Particle(this.mesh.position, this.color));
                }
                // HP Bar Cleanup
                if (this.hpBar) this.hpBar.destroy();
            }

            update(dt, playerPos) {
                if (this.isDead) return;

                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Flash Logic
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // Movement & Attack
                const dist = this.mesh.position.distanceTo(playerPos);

                // Knockback Physics
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.mesh.position.y = 1.0; // Enforce floor level
                    this.knockbackVel.multiplyScalar(0.9); // Friction
                }

                if (dist > this.attackRange) {
                    // Chase
                    const dir = playerPos.clone().sub(this.mesh.position).normalize();
                    dir.y = 0; // Keep flat
                    this.mesh.position.add(dir.multiplyScalar(this.speed * dt));
                    this.mesh.lookAt(playerPos);
                } else {
                    // Attack
                    if (this.attackTimer <= 0) {
                        this.performAttack(playerPos);
                        this.attackTimer = this.attackRate;
                    }
                }
                if (this.attackTimer > 0) this.attackTimer -= dt;
            }

            performAttack(targetPos) {
                // Override
            }
        }

        class NinjaEnemy extends Enemy {
            constructor(manager, pos) {
                super(manager, pos, CONFIG.enemy.ninja);
                this.teleportCooldown = 0;
                this.warningTimer = 0;
                this.isWarning = false;
                this.recoveryTimer = 0; // [New]
                // Add Trails or visuals?
            }

            update(dt, playerPos) {
                if (this.isDead) return;
                // Base update (HP bar etc)
                super.update(dt, playerPos); // Wait, super.update handles movement...
                // We need to override movement if warning
            }

            update(dt, playerPos) {
                if (this.isDead) return;

                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Flash Logic
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // Knockback
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.mesh.position.y = 1.0; // Enforce floor level
                    this.knockbackVel.multiplyScalar(0.9);
                    return;
                }

                // Recovery State (Post-Attack Animation Lock)
                if (this.recoveryTimer > 0) {
                    this.recoveryTimer -= dt;
                    return; // Don't move
                }

                // Warning State (Pre-Attack)
                if (this.isWarning) {
                    this.warningTimer -= dt;
                    // Pulse or Indicator
                    this.mesh.rotation.y += 10 * dt; // Spin fast?

                    if (this.warningTimer <= 0) {
                        this.performAttack(playerPos);
                        this.isWarning = false;
                        this.teleportCooldown = 5.0; // Cooldown
                    }
                    return; // Don't move
                }

                if (this.teleportCooldown > 0) this.teleportCooldown -= dt;

                const dist = this.mesh.position.distanceTo(playerPos);

                // Teleport Logic
                if (dist < CONFIG.enemy.ninja.teleportDist && this.teleportCooldown <= 0) {
                    // Teleport BEHIND player
                    let backPos;
                    if (window.floraInstance) {
                        const fwd = window.floraInstance.getForwardVector().normalize();
                        backPos = playerPos.clone().sub(fwd.multiplyScalar(3.0));
                    } else {
                        backPos = playerPos.clone().add(new THREE.Vector3(3, 0, 0));
                    }

                    // Clamp to floor
                    backPos.y = 1.0;

                    // Visual: Teleport Effect (Old Position)
                    const smokeGeo = new THREE.SphereGeometry(1, 8, 8);
                    const smokeMat = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.8 });
                    const smoke = new THREE.Mesh(smokeGeo, smokeMat);
                    smoke.position.copy(this.mesh.position);
                    this.manager.scene.add(smoke);

                    // Animate Smoke Fade
                    let sOp = 0.8;
                    const animSmoke = () => {
                        sOp -= 0.05;
                        if (sOp <= 0) {
                            this.manager.scene.remove(smoke);
                            smoke.geometry.dispose();
                            smoke.material.dispose();
                            return;
                        }
                        smoke.material.opacity = sOp;
                        smoke.scale.multiplyScalar(1.1); // Expand
                        requestAnimationFrame(animSmoke);
                    };
                    animSmoke();

                    this.mesh.position.copy(backPos);

                    // Start Warning
                    this.isWarning = true;
                    this.warningTimer = CONFIG.enemy.ninja.warningTime;

                } else {
                    // Standard Chase
                    if (dist > this.attackRange) {
                        const dir = playerPos.clone().sub(this.mesh.position).normalize();
                        dir.y = 0;
                        this.mesh.position.add(dir.multiplyScalar(this.speed * dt));
                        this.mesh.lookAt(playerPos);
                    }
                    // No normal attack
                }
            }

            performAttack(playerPos) {
                // Reset Color
                this.mesh.material.color.setHex(this.color);

                // Always Play Visual (Commit to attack)
                // [Adjusted Size]: Inner 1, Outer 4 to match Range 4.0
                const slashGeo = new THREE.RingGeometry(1.0, 2.5, 32, 1, 0, Math.PI); // Semi-circle
                const slashMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
                const slash = new THREE.Mesh(slashGeo, slashMat);

                // Position and Orient
                slash.position.copy(this.mesh.position);
                slash.position.y = 1.0;
                slash.lookAt(playerPos);
                slash.rotateX(-Math.PI / 2); // Flat on ground
                slash.rotateZ(Math.PI);      // Flip 180 to face player correctly

                this.manager.scene.add(slash);

                // Animate Fade Out
                const startTime = Date.now();
                const duration = 200;

                const animateSlash = () => {
                    const elapsed = Date.now() - startTime;
                    if (elapsed > duration) {
                        this.manager.scene.remove(slash);
                        slash.geometry.dispose();
                        slash.material.dispose();
                        return;
                    }
                    slash.material.opacity = 1.0 - (elapsed / duration);
                    slash.scale.setScalar(1.0 + (elapsed / duration) * 0.5); // Expand
                    requestAnimationFrame(animateSlash);
                };
                animateSlash();

                // Damage Check (AOE in front)
                const slashRange = 4.0;
                if (this.mesh.position.distanceTo(playerPos) < slashRange) {
                    window.floraInstance.takeDamage(this.damage);
                }

                // Lock Movement
                this.recoveryTimer = 0.5;
            }
        }

        class TauntEnemy extends Enemy {
            constructor(manager, pos) {
                super(manager, pos, CONFIG.enemy.boss);
                this.targetPos = pos.clone();
                this.waitTime = 0;

                // Bigger Visuals
                this.mesh.scale.set(2.5, 2.5, 2.5);

                // Adjust HP Bar Offset for Size
                // Enemy default 1.2 is for height 2.0 (Top=2.0, Center=1.0. Offset from Ground=2.2)
                // Boss Scale 2.5. Height 5.0. Top = 5.0 (since pivot at bottom? No, pivot center).
                // Mesh pos is at Y=1.0. Geo height is 2.0.
                // Wait, mesh.position.y = 1.0 means center is at 1.0. Top is at 1.0 + 1.0 = 2.0.
                // If Scale 2.5, center is at 1.0. Top is 1.0 + 1.0*2.5 = 3.5.
                // So we need offset > 3.5 - 1.0 = 2.5 relative to center?
                // HP Bar update uses mesh.position (1.0).
                // Need offset 3.0?
                if (this.hpBar) {
                    this.hpBar.yOffset = 4.0; // Higher for Boss
                    // And maybe wider?
                    // Recreate? Or update scale? 
                    // Let's just update offset for now. Visual width is fine?
                    // Actually 1.5 width on giant boss looks tiny.
                    if (this.hpBar.destroy) this.hpBar.destroy();
                    this.hpBar = new HealthBar(this.manager.scene, 4.0, 4.0, 0.4);
                }
            }

            update(dt, playerPos) {
                if (this.isDead) return;

                // Flash
                if (this.flashTimer > 0) {
                    this.flashTimer -= dt;
                    this.mesh.material.emissive.setHex(this.flashTimer > 0 ? 0xffffff : 0x000000);
                }

                // HP Bar
                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Knockback
                if (this.knockbackVel.lengthSq() > 0.001) {
                    this.mesh.position.add(this.knockbackVel.clone().multiplyScalar(dt));
                    this.knockbackVel.multiplyScalar(0.9);
                }

                // AI: Random Walk with Collision Check
                if (this.waitTime > 0) {
                    this.waitTime -= dt;
                    return;
                }

                // If close to target, pick new one
                const dist = this.mesh.position.distanceTo(this.targetPos);
                if (dist < 1.0) {
                    this.pickNewTarget();
                } else {
                    const dir = this.targetPos.clone().sub(this.mesh.position).normalize();
                    const moveStep = dir.multiplyScalar(this.speed * dt);
                    const nextPos = this.mesh.position.clone().add(moveStep);

                    // Block Collision Check
                    let hitBlock = false;
                    if (state.levelManager) {
                        // Simple Point vs AABB (inflated) check
                        // Block radius ~2.5 (5x5 block). Boss Radius ~1.2 (Scale 2.5).
                        // Safe margin ~4.0 check
                        state.levelManager.blocks.forEach(b => {
                            if (hitBlock) return;
                            const dx = Math.abs(b.mesh.position.x - nextPos.x);
                            const dz = Math.abs(b.mesh.position.z - nextPos.z);
                            // Block is 5x5. Half=2.5. Boss Radius ~1.2.
                            // Total Radius ~3.7. Let's use 4.0 margin.
                            if (dx < 4.0 && dz < 4.0) {
                                hitBlock = true;
                            }
                        });
                    }

                    if (hitBlock) {
                        // Hit wall, immediately pick new target away from wall?
                        // Just picking random might pick into wall again.
                        // But for simplicity: Pick new target.
                        this.pickNewTarget();
                    } else {
                        this.mesh.position.add(moveStep);
                        this.mesh.lookAt(this.targetPos);
                    }
                }
            }

            pickNewTarget() {
                const angle = Math.random() * Math.PI * 2;
                const r = Math.random() * 20; // Wander area
                this.targetPos.set(Math.sin(angle) * r, 1, Math.cos(angle) * r);
                this.waitTime = 1.0 + Math.random() * 2.0;
            }

            die() {
                super.die();
                // VICTORY
                const div = document.createElement('div');
                div.style.position = 'absolute';
                div.style.top = '50%';
                div.style.left = '50%';
                div.style.transform = 'translate(-50%, -50%)';
                div.style.color = '#ffD700'; // Gold
                div.style.fontSize = '100px';
                div.style.fontFamily = 'Impact, sans-serif';
                div.style.textShadow = '0 0 30px black';
                div.style.zIndex = '9999';
                div.innerText = 'VICTORY!';
                document.body.appendChild(div);

                state.spawnerEnabled = false;

                // Kill all other enemies?
                this.manager.killAll();
            }
        }

        class EnemyManager {
            constructor(scene) {
                this.scene = scene;
                this.enemies = [];
                this.spawnTimer = 0;
                this.bossDelayTimer = 0; // [New]
                this.bossSpawned = false;
            }

            update(dt, playerPos) {
                // Spawning
                if (state.spawnerEnabled) {

                    // Check Enemy Limit
                    if (this.enemies.length < CONFIG.enemy.maxEnemies) {
                        this.spawnTimer += dt;

                        // Determine Rate based on Mode
                        const currentRate = (state.mode === 'quad') ? CONFIG.enemy.spawnRateQuad : CONFIG.enemy.spawnRateDuo;

                        if (this.spawnTimer >= currentRate) {
                            this.spawnTimer = 0;
                            this.spawnEnemy(playerPos);
                        }
                    } else {
                        // Limit Reached: Pause Timer (Optional: Reset? User said "Stop Timing")
                        // If we just stop adding dt, it effectively pauses.
                    }

                    // [New] Spawn Boss after delay
                    if (!this.bossSpawned) {
                        this.bossDelayTimer += dt;
                        if (this.bossDelayTimer >= CONFIG.enemy.boss.spawnDelay) {
                            this.bossSpawned = true;

                            // Find Safe Spawn Position (Avoid Blocks)
                            let spawnPos = new THREE.Vector3(0, 1, -10); // Try center-ish
                            let safe = false;
                            let attempts = 0;

                            while (!safe && attempts < 10) {
                                let hitBlock = false;
                                if (state.levelManager) {
                                    state.levelManager.blocks.forEach(b => {
                                        if (hitBlock) return;
                                        const dx = Math.abs(b.mesh.position.x - spawnPos.x);
                                        const dz = Math.abs(b.mesh.position.z - spawnPos.z);
                                        if (dx < 4.0 && dz < 4.0) hitBlock = true;
                                    });
                                }

                                if (!hitBlock) {
                                    safe = true;
                                } else {
                                    // Retry random
                                    const angle = Math.random() * Math.PI * 2;
                                    const r = 5 + Math.random() * 15;
                                    spawnPos.set(Math.sin(angle) * r, 1, Math.cos(angle) * r);
                                    attempts++;
                                }
                            }

                            const boss = new TauntEnemy(this, spawnPos);
                            this.enemies.push(boss);
                        }
                    }
                }

                // [Old Boss Spawn removed from here]

                // Update Enemies
                this.enemies.forEach(e => e.update(dt, playerPos));
                this.enemies = this.enemies.filter(e => !e.isDead);
            }

            spawnEnemy(playerPos) {
                // Random position outside radius
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 10;
                const x = Math.sin(angle) * dist;
                const z = Math.cos(angle) * dist;
                const pos = new THREE.Vector3(x, 1, z); // Y=1

                // Weighted Random Spawn
                const weights = [
                    { type: 'melee', weight: CONFIG.enemy.melee.spawnWeight },
                    { type: 'ranged', weight: CONFIG.enemy.ranged.spawnWeight },
                    { type: 'ninja', weight: CONFIG.enemy.ninja.spawnWeight || 0 }
                ];

                const totalWeight = weights.reduce((sum, item) => sum + item.weight, 0);
                let randomVal = Math.random() * totalWeight;
                let selectedType = 'melee';

                for (let item of weights) {
                    if (randomVal < item.weight) {
                        selectedType = item.type;
                        break;
                    }
                    randomVal -= item.weight;
                }

                let enemy;
                if (selectedType === 'melee') enemy = new MeleeEnemy(this, pos);
                else if (selectedType === 'ranged') enemy = new RangedEnemy(this, pos);
                else if (selectedType === 'ninja') enemy = new NinjaEnemy(this, pos);

                if (enemy) this.enemies.push(enemy);
            }

            spawnDummy(playerPos) {
                // Spawn 10 units in front
                const fwd = new THREE.Vector3(0, 0, 1); // Default if playerPos undefined?
                // But we have playerPos passed? Yes.
                // Need Window.floraInstance for true direction
                let spawnPos;
                if (window.floraInstance) {
                    const dir = window.floraInstance.getForwardVector().normalize();
                    spawnPos = window.floraInstance.mesh.position.clone().add(dir.multiplyScalar(8));
                } else {
                    spawnPos = new THREE.Vector3(0, 1, -10);
                }
                spawnPos.y = 1;

                const dummy = new DummyEnemy(this, spawnPos);
                this.enemies.push(dummy);
            }

            killAll() {
                this.enemies.forEach(e => e.die());
                this.enemies = [];
            }

            checkCollisions(bullets) {
                const box = new THREE.Box3();
                bullets.forEach(b => {
                    if (b.markedForDeletion || b.isEnemy) return; // Player bullets only
                    if (b.damage <= 0) return;

                    for (let e of this.enemies) {
                        if (e.isDead) continue;

                        // 2D Check (XZ Plane only for reliability)
                        // Bullet Radius ~ 0.2-0.6, Enemy Radius ~ 0.5 (box is 0.8 width)
                        // Let's use simple distance check
                        const distSq = (e.mesh.position.x - b.mesh.position.x) ** 2 + (e.mesh.position.z - b.mesh.position.z) ** 2;
                        const hitDist = 1.0 + b.size; // Generous hitbox

                        if (distSq < hitDist * hitDist) {

                            if (b.hitEntities.has(e.mesh.uuid)) continue;
                            b.hitEntities.add(e.mesh.uuid);

                            e.takeDamage(b.damage, b.mesh.position, b.knockback); // Pass knockback

                            // Penetration Logic
                            b.penetration--;
                            if (b.penetration < 0) {
                                b.markedForDeletion = true;
                            }

                            break;
                        }
                    }
                });
            }
        }

                        // Recoil Force
                        const force = stats.recoil * CONFIG.combat.recoilForce * recoilScale;
                        const recoilVec = finalDir.clone().normalize().multiplyScalar(-force);
                        // Add to velocity directly
                        this.velocity.add(recoilVec);

                };

                // Spawn Shockwave Helper
                const spawnShockwave = (waveConfig, damage) => {
                    // Shockwave Particles
                    const count = 20;
                    const angle = waveConfig.angle;
                    const baseDir = this.getForwardVector();

                    // Recalculate spawn position DYNAMICALLY - FROM FLOOR/CENTER
                    const currentSpawnPos = this.mesh.position.clone();
