                    // currentSpawnPos.add(this.getForwardVector().multiplyScalar(0.5)); // Optional forward offset?
                    // User said "Character Center", so maybe no offset or slight forward?
                    // "角色中心的靠近地板位置". Center is fine. Let's keep it centered or slightly forward to not clip self visually?
                    // Particles move fast, center is safe.

                    const waveSpeed = 20;
                    const waveLife = waveConfig.radius / waveSpeed;

                    // Visuals
                    // Visuals: Expanding Ring
                    const ringGeo = new THREE.RingGeometry(0.8, 1.0, 32); // Thick ring
                    const ringMat = new THREE.MeshBasicMaterial({
                        color: 0xffff00,
                        side: THREE.DoubleSide,
                        transparent: true,
                        opacity: 0.8
                    });
                    const waveMesh = new THREE.Mesh(ringGeo, ringMat);
                    waveMesh.position.copy(currentSpawnPos);
                    waveMesh.rotation.x = -Math.PI / 2; // Flat
                    scene.add(waveMesh);

                    state.particles.push({
                        mesh: waveMesh,
                        life: 0.3,
                        maxLife: 0.3,
                        targetScale: waveConfig.radius, // Base radius is 1.0 (outer), so scale to target
                        update: function (dt) {
                            this.life -= dt;
                            if (this.life <= 0) {
                                scene.remove(this.mesh);
                                this.mesh.geometry.dispose();
                                this.mesh.material.dispose();
                                return false;
                            }
                            const p = 1 - (this.life / this.maxLife);
                            const currentScale = 0.5 + (this.targetScale - 0.5) * p; // Start at 0.5 radius
                            this.mesh.scale.set(currentScale, currentScale, currentScale);
                            this.mesh.material.opacity = 0.8 * (1 - p);
                            return true;
                        }
                    });

                    // Damage Logic (Instant Cone Check)
                    // We check for enemies within radius and angle
                    if (state.enemyManager) {
                        state.enemyManager.enemies.forEach(e => {
                            if (e.isDead) return;

                            // Distance Check
                            const dx = e.mesh.position.x - currentSpawnPos.x;
                            const dz = e.mesh.position.z - currentSpawnPos.z;
                            const distSq = dx * dx + dz * dz;

                            if (distSq < waveConfig.radius * waveConfig.radius) {
                                // Angle Check
                                const toEnemy = new THREE.Vector3(dx, 0, dz).normalize();
                                const dot = toEnemy.dot(baseDir); // Dot Product
                                const threshold = Math.cos(angle / 2); // Threshold for half-angle

                                if (dot > threshold) {
                                    // Shockwave Damage + Knockback (from spawn center)
                                    // Use configured damage
                                    // Use configured damage and knockback
                                    e.takeDamage(waveConfig.damage || damage, currentSpawnPos, waveConfig.knockback);
                                }
                            }
                        });
                    }

                    // Damage Logic for Blocks (Optional: low damage to blocks? Or full?)
                    // Let's apply damage to blocks too for consistency
                    if (state.levelManager) {
                        state.levelManager.blocks.forEach(b => {
                            if (b.isDead) return;
                            const dx = b.mesh.position.x - currentSpawnPos.x;
                            const dz = b.mesh.position.z - currentSpawnPos.z;
                            const distSq = dx * dx + dz * dz;
                            if (distSq < waveConfig.radius * waveConfig.radius) {
                                const toBlock = new THREE.Vector3(dx, 0, dz).normalize();
                                const dot = toBlock.dot(baseDir);
                                if (dot > Math.cos(angle / 2)) {
                                    b.hp -= damage;
                                    b.flashTimer = 0.1;
                                    if (b.hp <= 0) {
                                        b.isDead = true;
                                        scene.remove(b.mesh);
                                        b.mesh.geometry.dispose(); b.mesh.material.dispose();
                                    }
                                }
                            }
                        });
                    }
                };

                if (type === 'quad') {
                    config = CONFIG.bullet.quad;
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    stats = { damage: config.damage, penetration: config.penetration, recoil: config.recoil, knockback: config.knockback };
                    direction = this.getForwardVector();

                    // Burst Fire 
                    for (let i = 0; i < config.burstCount; i++) {
                        // Recoil Decay: 100%, 50%, 25%...
                        const decay = Math.pow(0.5, i);
                        spawnBullet('quad', i * config.burstInterval, true, decay);
                    }
                    // Shockwave x3
                    for (let i = 0; i < 1; i++) {
                        setTimeout(() => spawnShockwave(config.shockwave, config.damage), i * config.burstInterval * 1000);
                    }
                } else if (type === 'trio') {
                    config = CONFIG.bullet.trio;
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    stats = { damage: config.damage, penetration: config.penetration, recoil: config.recoil, knockback: config.knockback };
                    direction = this.getForwardVector();

                    spawnBullet('trio');
                    spawnShockwave(config.shockwave, config.damage);
                } else if (type === 'duo') {
                    // Check Mode
                    if (state.mode === 'quad') {
                        config = CONFIG.bullet.ultraDuo; // Stronger
                    } else {
                        config = CONFIG.bullet.duo;
                    }
                    speed = config.speed;
                    life = config.life;
                    gravity = config.gravity;
                    size = config.size;
                    stats = { damage: config.damage, penetration: config.penetration, recoil: config.recoil, knockback: config.knockback };
                    direction = this.getForwardVector();
                    spawnBullet('duo');
                    if (config.shockwave) spawnShockwave(config.shockwave, config.damage);
                } else {
                    // Single
                    if (state.mode === 'quad') {
                        config = CONFIG.bullet.ultraSingle; // Stronger
                    } else {
                        config = CONFIG.bullet.single;
                    }

                    speed = config.speedMin + Math.random() * (config.speedMax - config.speedMin);
                    life = config.lifeMin + Math.random() * (config.lifeMax - config.lifeMin);
                    gravity = config.gravity;
                    size = config.size;
                    stats = { damage: config.damage, penetration: config.penetration, recoil: config.recoil, knockback: config.knockback };

                    // Spread
                    const spread = (Math.random() - 0.5) * config.spread;
                    direction = this.getForwardVector().applyAxisAngle(new THREE.Vector3(0, 1, 0), spread);

                    spawnBullet(type);
                }
            }

            activateCombo() {
                state.comboActive = true;

                // Initialize Combo State Machine
                this.comboState = 'precast';
                this.comboTimer = CONFIG.combo.preCastDelay;

                // Update Geometry/Visuals based on Mode
                const config = CONFIG.combo[state.mode];

                // 1. Update Ring Radius
                const r = config.radius;
                this.comboRing.geometry.dispose();
                this.comboRing.geometry = new THREE.RingGeometry(r - 0.5, r, 64);
                this.comboRing.geometry.rotateX(-Math.PI / 2);

                // Visuals Setup
                this.comboRing.visible = true;
                this.comboRing.material.opacity = 0.5;
                this.comboRing.scale.set(0, 0, 0);

                // Rebuild Vines Dynamically
                if (this.vines) this.vines.forEach(v => v.destroy());
                this.vines = [];

                for (let i = 0; i < config.vineCount; i++) {
                    // Pass radius explicitly
                    const vine = new Vine(this.comboGroup, i, config.vineCount, config.radius);
                    vine.setVisible(false); // Hide initially
                    vine.timer = 0;
                    this.vines.push(vine);
                }
            }

            update(dt) {
                // HP Bar
                if (this.hpBar) this.hpBar.update(this.mesh.position, this.hp, this.maxHP);

                // Damage Flash
                if (this.damageFlashTimer > 0) {
                    this.damageFlashTimer -= dt;
                    if (this.damageFlashTimer <= 0) {
                        // Restore colors
                        this.updateVisibility(); // Reset to base/dark colors (hacky but works)
                        // Actually we need to force reset materials in loop
                    } else {
                        // Flash Red
                        this.p1HeadPart.material.color.setHex(0xff0000);
                        this.p2HeadPart.material.color.setHex(0xff0000);
                        // ...
                    }
                }

                // --- Combo Skill State ---
                if (state.comboActive) {
                    this.comboTimer -= dt;

                    // 1. Pre-Cast Phase
                    if (this.comboState === 'precast') {
                        // Expand Ring Warning
                        const progress = 1.0 - (this.comboTimer / CONFIG.combo.preCastDelay);
                        this.comboRing.scale.set(progress, progress, progress);

                        // Flash Ring
                        this.comboRing.material.opacity = 0.5 + Math.sin(progress * 20) * 0.3;

                        if (this.comboTimer <= 0) {
                            // Transition to Active
                            this.comboState = 'active';
                            this.comboDotTimer = 0; // [New] Init DoT Timer

                            // Get config again
                            const config = CONFIG.combo[state.mode];
                            this.comboTimer = config.activeDuration;

                            // Visual Pop
                            this.comboRing.material.opacity = 0.8;
                            this.comboRing.scale.set(1, 1, 1);

                            // Show Vines
                            this.vines.forEach(v => v.setVisible(true));
                        }
                        return;
                    }
                    // 2. Active Phase
                    else if (this.comboState === 'active') {
                        const config = CONFIG.combo[state.mode];
                        // Update All Active Vines
                        this.vines.forEach(v => v.update(dt, true));

                        // Combo Damage Logic (AoE DoT)
                        // Accumulate Timer
                        if (!this.comboDotTimer) this.comboDotTimer = 0;
                        this.comboDotTimer += dt;

                        if (this.comboDotTimer > CONFIG.combo.dotInterval) {
                            this.comboDotTimer = 0; // Reset

                            // Apply Tick Damage
                            const damage = CONFIG.combo.dotDamage;

                            // Enemies
                            if (state.enemyManager) {
                                state.enemyManager.enemies.forEach(e => {
                                    if (e.isDead) return;
                                    // 2D Distance Check (XZ Plane) + Hit Margin
                                    const dx = e.mesh.position.x - this.mesh.position.x;
                                    const dz = e.mesh.position.z - this.mesh.position.z;
                                    const dist = Math.sqrt(dx * dx + dz * dz);

                                    if (dist < config.radius + 1.0) { // +1.0 for Enemy Radius overlap
                                        e.takeDamage(damage);
                                    }
                                });
                            }

                            // Blocks
                            if (state.levelManager) {
                                state.levelManager.blocks.forEach(b => {
                                    if (b.isDead) return;
                                    const dx = b.mesh.position.x - this.mesh.position.x;
                                    const dz = b.mesh.position.z - this.mesh.position.z;
                                    const dist = Math.sqrt(dx * dx + dz * dz);

                                    if (dist < config.radius + 2.0) { // +2.0 for Block Size overlap
                                        b.hp -= damage;
                                        b.flashTimer = 0.1;
                                        if (b.hp <= 0) {
                                            b.isDead = true;
                                            scene.remove(b.mesh);
                                            b.mesh.geometry.dispose(); b.mesh.material.dispose();
                                        }
                                    }
                                });
                            }
                        }

                        const remain = this.comboTimer / config.activeDuration;
                        this.comboRing.material.opacity = remain * 0.8;
                        if (this.comboTimer <= 0) {
                            state.comboActive = false;

                            // Start Cooldown
                            state.comboCooldown = state.comboCooldownMax;
                            state.pulse = 0; // Reset Pulse

                            // Hide visuals
                            this.comboRing.material.opacity = 0;
                            this.vines.forEach(v => v.setVisible(false));
                        }
                    }
                }

                // --- 4-Player Logic Setup ---
                const players = state.mode === 'quad' ? ['p1', 'p2', 'p3', 'p4'] : ['p1', 'p2'];

                // --- Charge Logic ---
                // Any member holding charge enters charge state
                const chargers = players.filter(p => state.input[p].charge);
                const chargeCount = chargers.length;

                // Pulse Meter Update
                let rate = -CONFIG.combo.decayRate;
                if (chargeCount >= 2) rate = CONFIG.combo.chargeRateDuo;
                else if (chargeCount === 1) rate = CONFIG.combo.chargeRateIndividual;

                state.pulseValue = Math.min(100, Math.max(0, state.pulseValue + rate * dt));
                state.pulse = state.pulseValue; // Keep state.pulse in sync with state.pulseValue

                // Trigger Combo?
                if (state.pulseValue >= 100 && !state.comboActive && state.comboCooldown <= 0) {
                    this.activateCombo();
                    return; // Start combo frame
                }

                // --- Rhythm UI Update ---
                const cycleTime = CONFIG.rhythm.beatInterval;
                const prevRhythm = state.rhythmTime;
                state.rhythmTime = (state.rhythmTime + (dt / cycleTime)) % 1.0;

                // Sound Triggers
                if (prevRhythm < 0.5 && state.rhythmTime >= 0.5) {
                    SoundSystem.playOpenHiHat();
                    // Character Bounce (Visual Beat)
                    this.pulseScale = 1.15; // Jump to 1.15x
                }
                if (state.rhythmTime < prevRhythm) SoundSystem.playHiHat();

                const cursor = document.getElementById('rhythm-cursor');
                const target = document.getElementById('rhythm-target');
                cursor.style.left = (state.rhythmTime * 100) + '%';

                // Dynamic Target Size based on Window
                const currentWindow = (state.mode === 'quad') ? CONFIG.combat.quadWindow : CONFIG.combat.duoWindow;
                const windowFraction = currentWindow / cycleTime; // e.g. 0.35 / 2.0 = 0.175

                // Visual Circle Size:
                // Range is +/- window/2. Total width = window.
                // Circle Diameter should represent the full window width relative to the timeline?
                // User said: "Circle intersection points = tolerance range". 
                // Line is 0..1. Center 0.5. Tolerance +/- w/2.
                // Intersection points are (0.5 - w/2) and (0.5 + w/2).
                // Distance between them is w.
                // So Circle Width should be w.
                const percentWidth = windowFraction * 100;
                target.style.width = percentWidth + '%';
                // Keep aspect ratio 1:1 using calculated pixel width relative to container or just use aspect-ratio css if supported
                // Since container is 500px, height needs to match.
                // Let's just use CSS 'aspect-ratio: 1'.
                // Update: Inline style for width, ensure CSS has aspect-ratio or handle height.
                // Simple hack: set height to 'auto' and use aspect-ratio in CSS, or calculate px.
                // Let's rely on CSS update in next step for aspect-ratio, or set height here if possible? 
                // Easier: target.style.height/width in px.
                const containerWidth = document.getElementById('rhythm-helper').clientWidth;
                // Visual Circle Size Adjustment (0.7x to match strict feel)
                const visualScale = 0.7;
                const pxSize = containerWidth * windowFraction * visualScale;
                target.style.width = pxSize + 'px';
                target.style.height = pxSize + 'px';

                // Color Feedback (Visual Only - Matches Visual Size)
                const distToCenter = Math.abs(state.rhythmTime - 0.5) * cycleTime;
                if (distToCenter <= (currentWindow * visualScale) / 2) {
                    target.style.border = '2px solid #ffff00'; // Yellow when in zone
                    target.style.transform = 'scale(1.1)';
                    cursor.style.backgroundColor = '#ffff00';
                } else {
                    target.style.border = '2px solid white';
                    target.style.transform = 'scale(1)';
                    cursor.style.backgroundColor = 'white';
                }

                // --- Combat Logic Updates ---

                // 1. Cooldown Management
                players.forEach(p => {
                    if (this.cooldowns[p] > 0) this.cooldowns[p] -= dt;
                });

                // 2. Input Detection (Fresh Press) & Buffer
                players.forEach(p => {
                    const isPress = state.input[p].attack && !this.lastAttackInput[p];
                    this.lastAttackInput[p] = state.input[p].attack;
                    const isCharging = state.input[p].charge;

                    // Trigger Check
                    const checkTrigger = () => {
                        if (this.bufferedInput[p] && this.cooldowns[p] <= 0) {
                            this.bufferedInput[p] = false;
                            return true;
                        }
                        if (isPress) {
                            if (this.cooldowns[p] <= 0) return true;
                            else if (this.cooldowns[p] <= CONFIG.combat.bufferWindow) {
                                this.bufferedInput[p] = true;
                                return false;
                            }
                        }
                        return false;
                    };

                    if (checkTrigger() && !isCharging && !this.isWindup[p]) {
                        this.isWindup[p] = true;
                        this.windupTimer[p] = CONFIG.combat.preFireDelay;

                        // Rhythm Check
                        const timeDiff = Math.abs(state.rhythmTime - 0.5) * cycleTime;
                        const validWindow = (state.mode === 'quad') ? CONFIG.combat.quadWindow : CONFIG.combat.duoWindow;
                        this.rhythmBonus[p] = timeDiff <= (validWindow / 2);

                        console.log(`${p.toUpperCase()} Rhythm: ${this.rhythmBonus[p]}`);

                        // Spawn Feedback Dot
                        if (this.activeIndicators[p]) this.activeIndicators[p].remove();
                        this.activeIndicators[p] = state.showInputFeedback(p);
                    }
                });

                // 3. Synergy Check
                // Find all players who are Winding Up AND have Valid Rhythm
                const readyPlayers = players.filter(p => this.isWindup[p] && this.rhythmBonus[p]);

                // Determine Synergy Level (4=Quad, 3=Trio, 2=Duo)
                // Only upgrade if we haven't already locked in a higher level?
                // Actually, dynamic upgrade is fine as long as we haven't fired.

                let synergyLevel = 0;
                let synergyName = '';

                if (readyPlayers.length === 4) { synergyLevel = 4; synergyName = 'quad'; }
                else if (readyPlayers.length === 3) { synergyLevel = 3; synergyName = 'trio'; }
                else if (readyPlayers.length === 2) { synergyLevel = 2; synergyName = 'duo'; }

                if (synergyLevel > 0) {
                    // Sync Timers: All ready players sync to the smallest timer (closest to fire)
                    const minTimer = Math.min(...readyPlayers.map(p => this.windupTimer[p]));
                    readyPlayers.forEach(p => this.windupTimer[p] = minTimer);

                    // Mark as Synergy Pending (to prevent single fire)
                    this.synergyPending = synergyLevel;
                    this.synergyType = synergyName;

                    // Update Visuals: Remove individual dots and show Synergy Dot
                    // Naive approach: Just remove all and show one big one if not already shown?
                    // Ideally we identify if this is a NEW synergy state.
                    // For now: Always refresh synergy feedback if changed

                    if (this.lastSynergyLevel !== synergyLevel) {
                        readyPlayers.forEach(p => {
                            if (this.activeIndicators[p]) { this.activeIndicators[p].remove(); this.activeIndicators[p] = null; }
                        });
                        // We might want to clear previous synergy dot if we upgraded (e.g. Duo -> Trio)
                        // But `showInputFeedback` just spawns a new one. 
                        // Let's just spawn the new one.
                        state.showInputFeedback('duo'); // Re-use 'duo' style or make new ones?
                        // Task says "reuse Duo bullet values" but for UI? 
                        // Let's allow 'duo' style for all synergies in UI for now, maybe scale it?
                    }
                }
                this.lastSynergyLevel = synergyLevel;

                // 4. Visuals & Logic Loop
                players.forEach(p => {
                    const isCharging = state.input[p].charge;

                    // Element Map
                    const partMap = { p1: this.p1Part, p2: this.p2Part, p3: this.p3Part, p4: this.p4Part };
                    const headMap = { p1: this.p1HeadPart, p2: this.p2HeadPart, p3: this.p3HeadPart, p4: this.p4HeadPart };
                    const baseMap = { p1: this.baseColorP1, p2: this.baseColorP2, p3: this.baseColorP3, p4: this.baseColorP4 };
                    const darkMap = { p1: this.darkColorP1, p2: this.darkColorP2, p3: this.darkColorP3, p4: this.darkColorP4 };

                    const part = partMap[p];
                    const headPart = headMap[p];

                    if (isCharging) {
                        const time = Date.now() * 0.005;
                        const hue = time % 1.0;
                        const rainbow = new THREE.Color().setHSL(hue, 1.0, 0.5);
                        part.material.color.copy(rainbow);
                        headPart.material.color.copy(rainbow);
                    }
                    else if (this.isWindup[p]) {
                        this.windupTimer[p] -= dt;

                        const base = baseMap[p];
                        const t = 1.0 - (this.windupTimer[p] / CONFIG.combat.preFireDelay);
                        const targetHex = this.rhythmBonus[p] ? 0xffff00 : 0xffffff;
                        const c = new THREE.Color().lerpColors(base, new THREE.Color(targetHex), t);

                        part.material.color.copy(c);
                        headPart.material.color.copy(c);

                        if (this.windupTimer[p] <= 0) {
                            // FIRE!
                            this.isWindup[p] = false;

                            // Check for Synergy Fire
                            // If I am part of the Ready Set, dealing with Synergy
                            if (this.synergyPending > 0 && readyPlayers.includes(p)) {
                                // Execute Synergy Shot ONCE per group
                                // Check if we are the "leader" (e.g. first in list of readyPlayers)
                                // OR check if synergyPending is still set.

                                if (this.synergyPending > 0) {
                                    this.shoot(this.synergyType);

                                    // Reset Synergy Logic
                                    const type = this.synergyType;
                                    this.synergyPending = 0;
                                    this.synergyType = '';
                                    this.lastSynergyLevel = 0;

                                    // Reset ALL ready players cooldowns
                                    readyPlayers.forEach(rp => {
                                        this.isWindup[rp] = false;
                                        this.cooldowns[rp] = CONFIG.combat.cooldown;
                                        // Slight extra delay for Quad? No, use standard.
                                    });
                                }
                            } else {
                                // Single Fire
                                this.shoot(p);
                                this.cooldowns[p] = CONFIG.combat.cooldown;
                            }
                        }
                    } else {
                        // Cooldown / Idle
                        const color = this.cooldowns[p] > 0 ? darkMap[p] : baseMap[p];
                        part.material.color.copy(color);
                        headPart.material.color.copy(color);
                    }
                });


                // 5. Movement Physics
                let totalInput = new THREE.Vector3();
                let totalRotationInput = new THREE.Vector3(); // [New] Separate rotation
                const activeDirs = []; // Track directions for Synergy Boost

                players.forEach(p => {
                    const moveInput = state.input[p].move;
                    const hasInput = moveInput.lengthSq() > 0.01;
                    const isCharging = state.input[p].charge;
                    // [New] Is Attacking? (Windup or Cooldown)
                    const isAttacking = this.isWindup[p] || this.cooldowns[p] > 0.05; // Small buffer for cooldown? Or just > 0.
                    // User said "Start of windup to end of cooldown".
                    // Windup sets isWindup=true. Cooldown sets cooldown>0. 
                    // Note: Cooldown starts exactly when Windup ends (in shoot()).
                    // So (isWindup || cooldown > 0) covers the whole period.

                    // Arrow Visualization
                    const arrowMap = { p1: this.p1Arrow, p2: this.p2Arrow, p3: this.p3Arrow, p4: this.p4Arrow };
                    const arrow = arrowMap[p];

                    if (hasInput && !isCharging) {
                        const inputVec = new THREE.Vector3(moveInput.x, 0, moveInput.y);
                        const dir = inputVec.clone().normalize();

                        // 1. Rotation: Always allowed if not charging
                        totalRotationInput.add(inputVec);

                        // 2. Movement: Allowed only if NOT Attacking
                        if (!isAttacking) {
                            totalInput.add(inputVec);
                            activeDirs.push(dir); // Store for check
                        }

                        // Arrow shows Input Direction (Rotation intent)
                        arrow.visible = true;
                        arrow.position.copy(this.mesh.position);
                        arrow.setDirection(dir);
                    } else {
                        arrow.visible = false;
                    }
                });

                // Check Synergy Boost (Any pair < 45 degrees)
                let speedMult = 1.0;
                if (activeDirs.length >= 2) {
                    for (let i = 0; i < activeDirs.length; i++) {
                        for (let j = i + 1; j < activeDirs.length; j++) {
                            const dot = activeDirs[i].dot(activeDirs[j]);
                            if (dot > 0.707) { // cos(45) ~ 0.707
                                speedMult = 1.5; // 50% Boost
                                break;
                            }
                        }
                        if (speedMult > 1.0) break;
                    }
                }

                const targetVel = new THREE.Vector3();
                if (totalInput.lengthSq() > 0.001) {
                    totalInput.normalize().multiplyScalar(CONFIG.movement.maxSpeed * speedMult);
                    if (state.comboActive && this.comboState === 'active') {
                        totalInput.multiplyScalar(CONFIG.combo.moveSpeedFactor);
                    }
                    targetVel.copy(totalInput);
                }

                // Apply Acceleration vs Friction
                const currentVel = this.velocity;
                const diff = targetVel.clone().sub(currentVel);
                const dist = diff.length();

                if (dist > 0.001) {
                    const isMoving = targetVel.lengthSq() > 0.001;
                    let changeRate = isMoving ? CONFIG.movement.acceleration : CONFIG.movement.friction;

                    // Smart Braking / Turning (Fix for weak excessive sliding against recoil)
                    // If we are inputting movement roughly opposite to current velocity, use Friction (Stronger)
                    if (isMoving && currentVel.dot(targetVel) < 0) {
                        changeRate = CONFIG.movement.friction + 20; // Extra grip for turning
                    }
                    const step = changeRate * dt;
                    if (dist < step) currentVel.copy(targetVel);
                    else currentVel.add(diff.normalize().multiplyScalar(step));
                }

                this.mesh.position.add(currentVel.clone().multiplyScalar(dt));

                // Player-Block Collision
                // Simple Circle-Box or Box-Box resolution
                // Player radius ~ 0.8
                if (state.levelManager) {
                    const pRadius = 0.8;
                    const pPos = this.mesh.position;

                    state.levelManager.blocks.forEach(b => {
                        if (b.isDead) return;

                        // AABB check first?
                        // Box Center logic
                        // b.mesh.position is center.
                        // b.mesh.geometry.parameters.width/height/depth
                        const width = b.mesh.geometry.parameters.width;
                        const depth = b.mesh.geometry.parameters.depth;

                        const minX = b.mesh.position.x - width / 2 - pRadius;
                        const maxX = b.mesh.position.x + width / 2 + pRadius;
                        const minZ = b.mesh.position.z - depth / 2 - pRadius;
                        const maxZ = b.mesh.position.z + depth / 2 + pRadius;

                        if (pPos.x > minX && pPos.x < maxX && pPos.z > minZ && pPos.z < maxZ) {
                            // Inside expanded bounds. Resolve.
                            // Find closest point on box clamp
                            const clampX = Math.max(b.mesh.position.x - width / 2, Math.min(pPos.x, b.mesh.position.x + width / 2));
                            const clampZ = Math.max(b.mesh.position.z - depth / 2, Math.min(pPos.z, b.mesh.position.z + depth / 2));

                            const diffX = pPos.x - clampX;
                            const diffZ = pPos.z - clampZ;
                            const distSq = diffX * diffX + diffZ * diffZ;

                            // Check against radius squared (allow small overlap for smooth sliding?)
                            if (distSq < pRadius * pRadius && distSq > 0.0001) {
                                const dist = Math.sqrt(distSq);
                                const pen = pRadius - dist;
                                const normalX = diffX / dist;
                                const normalZ = diffZ / dist;

                                // Push out
                                this.mesh.position.x += normalX * pen;
                                this.mesh.position.z += normalZ * pen;

                                // Kill velocity in normal direction?
                                // const vDot = this.velocity.x * normalX + this.velocity.z * normalZ;
                                // if (vDot < 0) {
                                //    this.velocity.x -= normalX * vDot;
                                //    this.velocity.z -= normalZ * vDot;
                                // }
                            }
                        }
                    });
                }

                // Rotation - FIXED
                // Rotate towards INPUT Direction (totalRotationInput), ignore recoil velocity
                // If no input, keep current rotation
                if (totalRotationInput.lengthSq() > 0.01) {
                    const targetAngle = Math.atan2(totalRotationInput.x, totalRotationInput.z);
                    const currentAngle = this.mesh.rotation.y;
                    let deltaAngle = targetAngle - currentAngle;
                    while (deltaAngle > Math.PI) deltaAngle -= Math.PI * 2;
                    while (deltaAngle < -Math.PI) deltaAngle += Math.PI * 2;
                    const rotStep = CONFIG.movement.rotationSpeed * dt;
                    if (Math.abs(deltaAngle) < rotStep) this.mesh.rotation.y = targetAngle;
                    else this.mesh.rotation.y += Math.sign(deltaAngle) * rotStep;
                }

                // Camera & Follow
                camera.position.x = this.mesh.position.x;
                camera.position.z = this.mesh.position.z + 10;
                camera.lookAt(this.mesh.position);
                if (this.comboGroup) this.comboGroup.position.copy(this.mesh.position);

                // Scale Decay Logic (Beat Bounce) - Global
                if (!this.pulseScale) this.pulseScale = 1.0;
                if (this.pulseScale > 1.0) {
                    this.pulseScale -= (this.pulseScale - 1.0) * 10.0 * dt; // Decay speed
                    if (this.pulseScale < 1.0) this.pulseScale = 1.0;
                }
                this.mesh.scale.set(this.pulseScale, this.pulseScale, this.pulseScale);

            }
        }

        // --- Input Handling ---

        function setupInputs() {
            // P1: Keyboard
            const keys = {};
            let mouseAttack = false;
            let mouseCharge = false;

            const initAudio = () => { SoundSystem.init(); window.removeEventListener('keydown', initAudio); window.removeEventListener('mousedown', initAudio); };

            window.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                SoundSystem.init();
            });
            window.addEventListener('keyup', (e) => keys[e.code] = false);

            window.addEventListener('mousedown', (e) => {
                SoundSystem.init();
                if (e.button === 0) mouseAttack = true;
                if (e.button === 2) mouseCharge = true;
            });
            window.addEventListener('mouseup', (e) => {
                if (e.button === 0) mouseAttack = false;
                if (e.button === 2) mouseCharge = false;
            });
            window.addEventListener('contextmenu', e => e.preventDefault());

            // Gamepad Support
            window.addEventListener("gamepadconnected", (e) => {
                console.log("Gamepad connected at index %d: %s. %d buttons, %d axes.",
                    e.gamepad.index, e.gamepad.id,
                    e.gamepad.buttons.length, e.gamepad.axes.length);
            });

            // Polling function
            state.pollInputs = () => {
                // Poll Gamepads
                const gamepads = navigator.getGamepads ? navigator.getGamepads() : [];

                // Update Cooldown State
                if (state.comboCooldown > 0) {
                    state.comboCooldown -= 0.016; // Approx per frame
                    if (state.comboCooldown < 0) state.comboCooldown = 0;

                    // Update UI
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.add('pulse-locked');
                    pulseBar.style.width = '100%'; // Full bar but gray
                    pulseBar.style.background = '#555'; // Gray
                    pulseText.innerText = `COOLDOWN: ${Math.ceil(state.comboCooldown)}`;
                } else {
                    const pulseDiv = document.getElementById('pulse-container-central');
                    const pulseBar = document.getElementById('pulse-bar');
                    const pulseText = document.getElementById('pulse-text');

                    pulseDiv.classList.remove('pulse-locked');
                    pulseBar.style.width = (state.pulse / state.maxPulse * 100) + '%';
                    pulseBar.style.background = 'linear-gradient(90deg, #ff00ff, #00ffff)';
                    pulseText.innerText = 'PULSE(Hold Skill Button)';
                }

                // --- P1 (Keyboard/Mouse) ---
                let vx = 0, vy = 0;
                if (keys['KeyW']) vy -= 1;
                if (keys['KeyS']) vy += 1;
                if (keys['KeyA']) vx -= 1;
                if (keys['KeyD']) vx += 1;
                state.input.p1.move.set(vx, vy).normalize();
                // P1 Attack: Mouse Left OR Key 1
                state.input.p1.attack = mouseAttack || keys['Digit1'];
                // Charge logic with cooldown check
                const p1RawCharge = mouseCharge || keys['ShiftLeft'];
                state.input.p1.charge = (state.comboCooldown <= 0) && p1RawCharge;

                // --- P2 (Gamepad 0) ---
                const gp2 = gamepads[0];
                if (gp2) {
                    const axisX = Math.abs(gp2.axes[0]) > 0.1 ? gp2.axes[0] : 0;
                    const axisY = Math.abs(gp2.axes[1]) > 0.1 ? gp2.axes[1] : 0;
                    state.input.p2.move.set(axisX, axisY);
                    if (state.input.p2.move.length() > 1) state.input.p2.move.normalize();

                    state.input.p2.attack = gp2.buttons[2].pressed; // West button (X/Square)
                    // Charge logic with cooldown check
                    const p2RawCharge = gp2.buttons[7].pressed; // RT/R2
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                } else {
                    // Debug Keys Arrows
                    let vx2 = 0, vy2 = 0;
                    if (keys['ArrowUp']) vy2 -= 1;
                    if (keys['ArrowDown']) vy2 += 1;
                    if (keys['ArrowLeft']) vx2 -= 1;
                    if (keys['ArrowRight']) vx2 += 1;
                    state.input.p2.move.set(vx2, vy2).normalize();
                    state.input.p2.attack = keys['Enter'] || keys['Digit2']; // Fixed: Added Digit2
                    // Charge logic with cooldown check
                    const p2RawCharge = keys['ShiftRight'];
                    state.input.p2.charge = (state.comboCooldown <= 0) && p2RawCharge;
                }
                if (keys['Digit2']) state.input.p2.attack = true;

                // --- P3 (Gamepad 1) ---
                const gp3 = gamepads[1];
                state.input.p3.charge = false; // Default
                state.input.p3.attack = false; // Default
                if (gp3) {
                    const axisX = Math.abs(gp3.axes[0]) > 0.1 ? gp3.axes[0] : 0;
                    const axisY = Math.abs(gp3.axes[1]) > 0.1 ? gp3.axes[1] : 0;
                    state.input.p3.move.set(axisX, axisY);
                    state.input.p3.attack = gp3.buttons[2].pressed; // West
                    const p3RawCharge = gp3.buttons[7].pressed; // RT
                    state.input.p3.charge = (state.comboCooldown <= 0) && p3RawCharge;
                }
                if (keys['Digit3']) state.input.p3.attack = true;

                // --- P4 (Gamepad 2) ---
                const gp4 = gamepads[2];
                state.input.p4.charge = false; // Default
                state.input.p4.attack = false; // Default
                if (gp4) {
                    const axisX = Math.abs(gp4.axes[0]) > 0.1 ? gp4.axes[0] : 0;
                    const axisY = Math.abs(gp4.axes[1]) > 0.1 ? gp4.axes[1] : 0;
                    state.input.p4.move.set(axisX, axisY);
                    state.input.p4.attack = gp4.buttons[2].pressed; // West
                    const p4RawCharge = gp4.buttons[7].pressed; // RT
                    state.input.p4.charge = (state.comboCooldown <= 0) && p4RawCharge;
                }
                if (keys['Digit4']) state.input.p4.attack = true;
            };
        }

        // --- Bullet Management ---
        function updateBullets(dt) {
            // Move and Clean
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                const b = state.bullets[i];
                b.update(dt);
                if (b.markedForDeletion) {
                    b.destroy();
                    state.bullets.splice(i, 1);
                }
            }
            // Merging Logic REMOVED (Replaced by Input-based Duo Shot)
        }

        // --- Main Loop ---

        const flora = new Flora();
        window.floraInstance = flora; // Global ref for state.setMode
        flora.updateVisibility(); // Init visibility

        document.getElementById('mode-toggle').addEventListener('click', () => {
            const newMode = state.mode === 'quad' ? 'duo' : 'quad';
            state.setMode(newMode);
        });

        // Spawner Toggle
        const spawnerBtn = document.getElementById('spawner-toggle');
        spawnerBtn.addEventListener('click', () => {
            state.spawnerEnabled = !state.spawnerEnabled;
            spawnerBtn.innerText = state.spawnerEnabled ? "Enemy Spawner: ON" : "Enemy Spawner: OFF";
            spawnerBtn.style.backgroundColor = state.spawnerEnabled ? "#aa4444" : "#44aa44";

            if (!state.spawnerEnabled) {
                if (state.enemyManager) state.enemyManager.killAll();
            }
        });

        // Dummy Toggle (Moved to Info Container)
        const dummyBtn = document.createElement('button');
        dummyBtn.id = 'dummy-toggle';
        dummyBtn.innerText = 'Spawn Dummy';
        // Style to match others (and Color Brown)
        dummyBtn.style.marginTop = '10px';
        dummyBtn.style.marginLeft = '10px';
        dummyBtn.style.pointerEvents = 'auto';
        dummyBtn.style.backgroundColor = '#aa8844';
        dummyBtn.style.color = 'white';

        document.getElementById('info').appendChild(dummyBtn);

        dummyBtn.addEventListener('click', () => {
            if (state.enemyManager && window.floraInstance) {
                state.enemyManager.spawnDummy(window.floraInstance.mesh.position);
            }
        });

        // Initialize Systems
        state.levelManager = new LevelManager(scene);
        state.enemyManager = new EnemyManager(scene);

        setupInputs();

        function animate(time) {
            requestAnimationFrame(animate);

            const dt = Math.min((time - state.lastTime) / 1000, 0.1);
            state.lastTime = time;

            flora.update(dt);
            flora.checkCollisions(state.bullets); // Player check logic

            state.pollInputs();
            // Update Systems
            if (state.levelManager) {
                state.levelManager.update(dt);
                state.levelManager.checkCollisions(state.bullets);
            }
            if (state.enemyManager) {
                state.enemyManager.update(dt, flora.mesh.position);
                state.enemyManager.checkCollisions(state.bullets);
            }

            // Update Bullets
            updateBullets(dt);

            // Update Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                const p = state.particles[i];
                if (!p.update(dt)) {
                    state.particles.splice(i, 1);
                }
            }

            // Update Pulse Bar
            const bar = document.getElementById('pulse-bar'); // Renamed to 'bar' to match original
            bar.style.width = state.pulseValue + '%';

            // Debug Info
            document.getElementById('debug').innerHTML = `
                P1: Atk=${state.input.p1.attack} Chg=${state.input.p1.charge ? 'ON' : 'OFF'}<br>
                P2: Atk=${state.input.p2.attack} Chg=${state.input.p2.charge ? 'ON' : 'OFF'}<br>
                P3: Atk=${state.input.p3.attack} Chg=${state.input.p3.charge ? 'ON' : 'OFF'}<br>
                P4: Atk=${state.input.p4.attack} Chg=${state.input.p4.charge ? 'ON' : 'OFF'}<br>
                Pulse: ${state.pulseValue.toFixed(1)}% | Bullets: ${state.bullets.length}
            `;

            renderer.render(scene, camera);
        }

        requestAnimationFrame(animate);

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
